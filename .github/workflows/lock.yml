name: Generate dependency lock

# 手动触发：在 ubuntu / py3.12 上把 requirements-core.txt 解析成【精确锁】(含传递依赖)，
# 提交 market-analysis/requirements-core.lock。
# 为何要 CI 侧生成：本地(Windows)的 pip freeze 会混进 Windows-only 包(pywin32 等)，
# 喂给 ubuntu CI 会装不上 —— 必须在 Linux 上解析。
#
# 生成后(可选，留给 Codex 判性价比)：把 refresh-data.yml 的安装步骤改成
#   pip install -r market-analysis/requirements-core.lock
# 即可彻底关闭"依赖漂移"这一类 CI 失败。当前 requirements-core.txt 的区间上界
# 已封死大版本破坏，本锁是防御纵深(连补丁/传递依赖也钉死)。
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dep-lock
  cancel-in-progress: false

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve & freeze core deps (Linux)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r market-analysis/requirements-core.txt
          L=market-analysis/requirements-core.lock
          echo "# Auto-generated $(date -u +%Y-%m-%dT%H:%MZ) by .github/workflows/lock.yml (ubuntu-latest / py3.12)" > "$L"
          echo "# 源: requirements-core.txt。要彻底防漂移，可把 refresh-data 的安装改为 'pip install -r $L'。" >> "$L"
          python -m pip freeze >> "$L"

      - name: Commit lock if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market-analysis/requirements-core.lock
          git diff --cached --quiet && { echo "lock unchanged"; exit 0; }
          git commit -m "chore: regenerate requirements-core.lock [skip ci]"
          # 防缩水门:push 前确认没把 origin 的 append-only 账本行挤掉(SPEC_LEDGER_GUARD)
          python tools/ci_ledger_guard.py && git push || (git pull --rebase --autostash origin main && python tools/ci_ledger_guard.py && git push)
