name: Quick quotes (intraday)

on:
  schedule:
    # 美东盘中每 10 分钟（13:30-20:00 UTC ≈ 夏令时 9:30-16:00 ET）。
    # 注：GitHub 定时高峰期可能延迟几分钟，10 分钟是名义节奏。
    - cron: "*/10 13-20 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

# 与 refresh-data 不同组：报价任务可被新实例顶掉（最新报价才有意义）
concurrency:
  group: quick-quotes
  cancel-in-progress: true

jobs:
  quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: market-analysis/requirements-core.txt

      - name: Install yfinance only
        # 与 requirements-core 同口径上界：防 yfinance 大版本破坏性变更悄悄进盘中任务
        run: pip install --quiet "yfinance>=0.2.40,<0.3"

      - name: Fetch quotes
        run: python market-analysis/scripts/quick_quotes.py

      - name: Staleness watchdog (卡住主动敲门：日读/周读/流水线超期 → Telegram，按日去重)
        # 刻意放在这里而非 refresh-data：流水线卡住时它自己不会跑，独立班次才看得见事故
        # (#100-104 时它就沉默了 5 班)。读已提交产物时间戳(=访客所见)；未配置 Telegram
        # 或发送失败均不阻断报价任务，前端"⚠疑似卡住"徽章仍兜底。
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python market-analysis/scripts/staleness_watchdog.py || echo "::warning::watchdog 异常(非致命)"

      - name: Commit & push (rebase-retry, races with refresh-data are expected)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/quotes.json market-analysis/web/quotes.json
          # watchdog 按日去重的状态 + 推送留痕(可能不存在/无变化，失败不阻断)
          git add market-analysis/data/watchdog_state.json market-analysis/web/telegram_status.json docs/telegram_status.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "quotes unchanged, skip commit"
            exit 0
          fi
          git commit -m "data: intraday quotes"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase
          done
          git push
