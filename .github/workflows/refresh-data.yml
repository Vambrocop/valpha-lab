name: Refresh market data

on:
  schedule:
    # 美股收盘后：21:30 UTC ≈ 美东 17:30（夏令时）/ 16:30（冬令时），周一至周五
    - cron: "30 21 * * 1-5"
    # 开盘前补一刀：13:00 UTC ≈ 美东 9:00，接住 Yahoo 迟到的日线
    - cron: "0 13 * * 1-5"
    # 盘中每 30 分钟刷新（14:00–20:30 UTC ≈ 美东 10:00–16:30），页面更接近实时
    - cron: "0,30 14-20 * * 1-5"
  workflow_dispatch: {}   # 手动触发按钮（Actions 页面随时点）

permissions:
  contents: write
  issues: write   # 信号告警建 Issue → GitHub 自动邮件通知

# 同一时间只跑一个实例：防止小时任务互相踩、与本地推送竞争
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (core pipeline only)
        run: pip install -r market-analysis/requirements-core.txt

      - name: Install browser audit dependencies
        # 仅全量刷新(盘前/盘后/手动)需要浏览器审计；盘中 30 分钟 light 跳过，省 Chromium 安装
        if: github.event.schedule != '0,30 14-20 * * 1-5'
        run: |
          python -m pip install "playwright>=1.40,<2"
          python -m playwright install --with-deps chromium

      - name: Run tests (gate — bad code must not publish data)
        run: python -m pytest market-analysis/tests -q

      # light 运行复用上次全量运行的 data/（学习LR/回测/长历史），
      # 否则 build_signals 退化到手设 LR，小时级信号会漂移
      - name: Restore data cache from last run
        uses: actions/cache@v4
        with:
          path: market-analysis/data
          key: market-data-${{ github.run_id }}
          restore-keys: market-data-

      - name: Run pipeline (intraday 30-min = light, pre-open/post-close = full)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # 取 FRED 全史(BAA10Y 信用利差等日频);未配置则脚本自动回退 graph CSV(~2年)
        run: |
          if [ "${{ github.event.schedule }}" = "0,30 14-20 * * 1-5" ]; then
            CMD="python market-analysis/scripts/run_all.py --light"
          else
            CMD="python market-analysis/scripts/run_all.py"
          fi
          # 瞬时网络/yfinance 抖动会让整条刷新失败、白丢本次调度 → 自动重试一次。
          # run_all 每步都重写产物(幂等)、末步 verify_output 仍把关 → 重试不会发布坏数据;
          # 真错(代码/数据问题)会两次都失败 → 仍正确地红，不被掩盖。
          $CMD || { echo "::warning::pipeline 首次失败，60s 后重试一次（疑似瞬时抓取抖动）"; sleep 60; $CMD; }

      - name: Signal alerts (state changes only)
        run: python market-analysis/scripts/alert_check.py

      - name: Browser site audit (desktop + mobile)
        # 同上门控：盘中 light 不跑（只改 quotes.json，布局不会回归；站点改动已由 site-audit.yml 覆盖）
        if: github.event.schedule != '0,30 14-20 * * 1-5'
        run: |
          python tools/site_audit.py --ci
          python tools/site_audit.py --mobile --ci

      - name: Open alert issue (GitHub emails you automatically)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f market-analysis/alert.md ]; then
            # label 不存在时 issue create 会整体失败且被 ||true 吞掉 → 先幂等建 label；
            # --assignee 保证触发"参与通知"邮件（仅靠 bot 建 issue 不一定发邮件）
            gh label create alert --color D93F0B --description "信号告警" || true
            gh issue create \
              --title "📣 信号告警 $(date -u +%Y-%m-%d)" \
              --body-file market-analysis/alert.md \
              --assignee Vambrocop \
              --label alert || true
            rm market-analysis/alert.md
          fi

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-refresh market data [skip ci]"
          # 远端可能有本地推送的新提交：rebase 后再推，失败重试一次
          git pull --rebase --autostash origin main || true
          git push || (git pull --rebase --autostash origin main && git push)
