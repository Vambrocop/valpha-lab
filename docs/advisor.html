<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valpha Allocator</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--amb:#d29922;--acc:#a371f7}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.6 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:16px;max-width:860px;margin:0 auto}
  h1{font-size:1.35rem;margin:.2em 0;display:inline-block}
  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .warn-banner{background:rgba(163,113,247,.12);border:1px solid var(--acc);border-radius:8px;padding:10px 12px;font-size:.86rem;margin:10px 0;color:#d2c2f5}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin:12px 0}
  label{color:var(--mut);font-size:.85rem}
  input[type=number]{background:#0d1117;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:6px 8px;width:120px;font-size:1rem}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .seg button{background:transparent;color:var(--mut);border:0;padding:7px 14px;cursor:pointer;font-size:.9rem}
  .seg button.on{background:var(--acc);color:#fff}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-top:8px}
  .stk{border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;background:#0d1117;transition:.12s}
  .stk.sel{border-color:var(--acc);background:rgba(163,113,247,.1)}
  .stk b{font-size:.95rem}.stk .sub{font-size:.74rem;color:var(--mut);margin-top:2px}
  .chip{display:inline-block;font-size:.66rem;padding:1px 5px;border-radius:4px;margin-right:3px}
  .hot{background:rgba(248,81,73,.18);color:#ff9b94}.calm{background:rgba(63,185,80,.16);color:#7ee787}
  .btn{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:1rem;cursor:pointer;margin-right:8px}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--fg)}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{text-align:right;padding:6px 8px;border-bottom:1px solid var(--border)}
  th:first-child,td:first-child{text-align:left}
  .bar{height:7px;background:var(--acc);border-radius:4px;display:inline-block;vertical-align:middle}
  .bill{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bill .b{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:10px}
  .bill .big{font-size:1.25rem;font-weight:700}
  .alert{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:10px 12px;margin:8px 0;font-size:.86rem;color:#ffb3ad}
  .mut{color:var(--mut);font-size:.8rem}.src{font-size:.74rem;color:var(--mut)}
</style>
</head>
<body>
<a href="index.html" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="warn-banner" data-i18n="warn"></div>
<div class="panel">
  <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end">
    <div><label data-i18n="l_amt"></label><br><input id="amt" type="number" value="10000" min="100" step="100"></div>
    <div><label data-i18n="l_fx"></label><br><input id="fx" type="number" value="0.65" min="0.1" max="1.5" step="0.01"></div>
    <div><label data-i18n="l_hz"></label><br>
      <span class="seg" id="hz">
        <button data-h="short" data-i18n="hz_s"></button>
        <button data-h="mid" class="on" data-i18n="hz_m"></button>
        <button data-h="long" data-i18n="hz_l"></button>
      </span></div>
  </div>
  <div style="margin-top:12px">
    <label data-i18n="l_pick"></label>
    <div style="float:right">
      <button class="btn ghost" id="rec" style="padding:5px 12px;font-size:.85rem" data-i18n="b_rec"></button>
      <button class="btn ghost" id="clr" style="padding:5px 12px;font-size:.85rem" data-i18n="b_clr"></button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <div style="margin-top:14px;text-align:center"><button class="btn" id="go" data-i18n="b_go"></button></div>
</div>
<div id="out"></div>
<div class="src" id="src"></div>
<div class="mut" data-i18n="foot" style="margin-top:18px;border-top:1px solid var(--border);padding-top:10px"></div>

<script>
const SNAP={"AAPL":{"label":"苹果","last":298.01,"vol":24.8,"chg1y":52.93,"maxdd":-81.8,"radar":{"动量":58,"稳健":85}},"MSFT":{"label":"微软","last":379.4,"vol":38.3,"chg1y":-20,"maxdd":-68.7,"radar":{"动量":12,"稳健":64}},"NVDA":{"label":"英伟达","last":210.69,"vol":45.3,"chg1y":46.39,"maxdd":-89.7,"radar":{"动量":54,"稳健":53}}};
const LIVE="https://vambrocop.github.io/valpha-lab/stocks.json";
const I18N={
  title:{zh:"🎲 Valpha 配置建议器 · 原型",en:"🎲 Valpha Allocator · prototype"},
  warn:{zh:"<b>出格区 · 教育演示。</b> 这是把诚实风险数据拼成一个配置示例的玩具，<b>不是个人理财建议</b>。股票会亏钱、过去涨不代表未来、配置逻辑是简化的。你是自己钱的唯一负责人。",
        en:"<b>Out-of-bounds zone · educational demo.</b> A toy that stitches honest risk data into a sample allocation — <b>not personal financial advice</b>. Stocks lose money, past gains ≠ future, the logic is simplified. You alone are responsible for your money."},
  l_amt:{zh:"投入金额（澳元 AUD）",en:"Amount (AUD)"},l_fx:{zh:"AUD→USD 汇率（估股数用）",en:"AUD→USD rate (share est.)"},l_hz:{zh:"持有期（决定风险容忍）",en:"Horizon (risk tolerance)"},
  hz_s:{zh:"短期",en:"Short"},hz_m:{zh:"约1年",en:"~1yr"},hz_l:{zh:"长期",en:"Long"},
  l_pick:{zh:"选股（点选；或让我推荐）",en:"Pick stocks (or let me recommend)"},b_rec:{zh:"💡 我推荐",en:"💡 Recommend"},b_clr:{zh:"清空",en:"Clear"},b_go:{zh:"算配置 →",en:"Allocate →"},
  c_stk:{zh:"股票",en:"Stock"},c_w:{zh:"权重",en:"Weight"},c_amt:{zh:"金额(AUD)",en:"AUD"},c_sh:{zh:"约股数",en:"~Shares"},c_vol:{zh:"波动",en:"Vol"},
  bill:{zh:"🧾 诚实账单（先看下跌，再决定）",en:"🧾 Honest bill (see the downside first)"},
  bvol:{zh:"粗略组合年化波动<br>(加权·偏高估)",en:"Rough portfolio vol<br>(weighted · overstated)"},bdd:{zh:"持仓里历史最深回撤",en:"Deepest drawdown held"},bconc:{zh:"最大单仓集中度",en:"Top position weight"},bhz:{zh:"持有期设定",en:"Horizon"},
  hl_s:{zh:"短期·避险",en:"Short·defensive"},hl_m:{zh:"约1年·中性",en:"~1yr·neutral"},hl_l:{zh:"长期·容忍波动",en:"Long·tolerant"},
  disc:{zh:"再说一遍：这是<b>教育演示</b>，不是叫你买。逆波动率只是一种简化分法，没考虑你的处境、税（澳洲 CGT）、汇率波动、个股基本面。亏了算你的——所以请只用你输得起的钱。",
        en:"Again: an <b>educational demo</b>, not a buy order. Inverse-vol is one simplified split; it ignores your situation, tax (AU CGT), FX swings, fundamentals. Losses are yours — use only money you can afford to lose."},
  empty:{zh:"先选至少一只股票。",en:"Pick at least one stock."},
  foot:{zh:"逻辑（简化、可解释）：<b>逆波动率配权</b>（波动越大配越少）× <b>持有期</b>（短期更避险 λ=2 / 长期更容忍 λ=0.5）。诚实账单的「历史最深回撤」是整段历史（含远古崩盘），组合波动是按权重加权的<b>偏高估</b>。追涨警告 = 动量极高(≥80)且稳健极低(≤30)。全是描述性，不预测未来。",
        en:"Logic (simple, explainable): <b>inverse-vol weighting</b> (more vol → less weight) × <b>horizon</b> (short=defensive λ=2 / long=tolerant λ=0.5). 'Deepest drawdown' is full-history (incl. ancient crashes); portfolio vol is a weighted <b>overstate</b>. Chase warning = Mom≥80 & Stab≤30. All descriptive, not predictive."}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
let DATA=SNAP,horizon="mid",sel=new Set(),fromRec=false;
const isHot=d=>(d.radar["动量"]||0)>=80&&(d.radar["稳健"]||50)<=30;
const nm=(s,d)=>LANG==="en"?s:`${esc(d.label)} <span class="mut">${s}</span>`;

async function tryLive(){
  try{const r=await fetch(LIVE,{cache:"no-store"});if(!r.ok)throw 0;const j=await r.json(),o={};
    for(const[s,x]of Object.entries(j.stocks||{})){const st=x.stats||{};o[s]={label:x.label||s,last:st.last,vol:st.vol20_ann,chg1y:st.chg_1y,maxdd:st.max_dd,radar:x.radar||{}};}
    if(Object.keys(o).length)DATA=o;}catch(e){}
  redraw();
}
function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}
function renderGrid(){
  $("grid").innerHTML=Object.entries(DATA).map(([s,d])=>{const hot=isHot(d);
    const yl=LANG==="en"?"1Y":"1年",vl=LANG==="en"?"vol":"波动",hc=LANG==="en"?"🔥chase":"🔥追涨",cc=LANG==="en"?"🏰steady":"🏰稳健";
    return `<div class="stk ${sel.has(s)?'sel':''}" data-s="${s}"><b>${LANG==="en"?s:esc(d.label)}</b> ${LANG==="en"?"":'<span class="mut">'+s+'</span>'}
      <div class="sub">${yl} ${d.chg1y>=0?'+':''}${(d.chg1y??0).toFixed(0)}% · ${vl} ${(d.vol??0).toFixed(0)}%</div>
      <div style="margin-top:3px">${hot?`<span class="chip hot">${hc}</span>`:''}${(d.radar["稳健"]||0)>=80?`<span class="chip calm">${cc}</span>`:''}</div></div>`;
  }).join("");
  document.querySelectorAll(".stk").forEach(el=>el.onclick=()=>{const s=el.dataset.s;sel.has(s)?sel.delete(s):sel.add(s);fromRec=false;renderGrid();});
}
function allocate(){
  const syms=[...sel];if(!syms.length)return null;
  const amt=+$("amt").value||0,fx=+$("fx").value||0.65,lam=horizon==="short"?2:horizon==="long"?0.5:1;
  const raw=syms.map(s=>Math.pow(1/Math.max(DATA[s].vol||30,1),lam)),sum=raw.reduce((a,b)=>a+b,0);
  const rows=syms.map((s,i)=>{const w=raw[i]/sum,audAmt=amt*w,sh=audAmt*fx/(DATA[s].last||1);return {s,d:DATA[s],w,audAmt,sh};}).sort((a,b)=>b.w-a.w);
  const portVol=rows.reduce((a,r)=>a+r.w*(r.d.vol||0),0),worst=rows.reduce((m,r)=>(r.d.maxdd||0)<m.dd?{dd:r.d.maxdd,s:r.d.label,t:r.s}:m,{dd:0,s:"",t:""}),maxW=rows[0].w,hots=rows.filter(r=>isHot(r.d));
  return {rows,amt,portVol,worst,maxW,hots};
}
function render(res){
  if(!res){$("out").innerHTML=`<div class="panel mut">${t("empty")}</div>`;return;}
  const fmt=n=>n.toLocaleString('en-AU',{maximumFractionDigits:0});
  const oT=LANG==="en"?`Suggested allocation (${res.rows.length} · A$${fmt(res.amt)})`:`建议配置（${res.rows.length} 只 · 共 A$${fmt(res.amt)}）`;
  let h=`<div class="panel"><h3 style="margin:.2em 0">${oT}</h3><table><thead><tr><th>${t("c_stk")}</th><th>${t("c_w")}</th><th>${t("c_amt")}</th><th>${t("c_sh")}</th><th>${t("c_vol")}</th></tr></thead><tbody>`;
  res.rows.forEach(r=>{h+=`<tr><td>${nm(r.s,r.d)}</td><td><span class="bar" style="width:${(r.w*60).toFixed(0)}px"></span> ${(r.w*100).toFixed(1)}%</td><td>A$${fmt(r.audAmt)}</td><td>${r.sh<1?r.sh.toFixed(2):fmt(r.sh)}</td><td>${(r.d.vol||0).toFixed(0)}%</td></tr>`;});
  h+=`</tbody></table></div>`;
  const hl=horizon==="short"?t("hl_s"):horizon==="long"?t("hl_l"):t("hl_m");
  const ddName=LANG==="en"?res.worst.t:res.worst.s;
  h+=`<div class="panel"><h3 style="margin:.2em 0">${t("bill")}</h3><div class="bill">
    <div class="b"><div class="mut">${t("bvol")}</div><div class="big">${res.portVol.toFixed(0)}%</div></div>
    <div class="b"><div class="mut">${t("bdd")}<br>(${esc(ddName)})</div><div class="big" style="color:var(--red)">${res.worst.dd.toFixed(0)}%</div></div>
    <div class="b"><div class="mut">${t("bconc")}</div><div class="big">${(res.maxW*100).toFixed(0)}%</div></div>
    <div class="b"><div class="mut">${t("bhz")}</div><div class="big">${hl}</div></div></div></div>`;
  if(res.hots.length){const names=res.hots.map(r=>LANG==="en"?r.s:esc(r.d.label)).join("、");
    h+=`<div class="alert">${LANG==="en"?`<b>⚠️ Chase warning:</b> you picked ${names} — extreme momentum but extreme volatility (Stab≤30). They've already surged; buying now = catching them high, big drawdown risk. Not 'never buy', just know what you're chasing.`:`<b>⚠️ 追涨警告：</b>你选了 ${names}——动量极高但波动极大（稳健≤30）。它们近期已大涨，<b>上车=接在高位</b>，回撤风险很大。不是不能买，是要清楚你在追什么。`}</div>`;}
  h+=`<div class="warn-banner">${t("disc")}</div>`;
  $("out").innerHTML=h;
}
function recommend(){
  fromRec=true;
  // 持有期改变选股口径：短期偏稳健、长期偏性价比/容忍动量
  const w=horizon==="short"?{st:1.5,va:1,ind:.5,mp:.35}:horizon==="long"?{st:.6,va:1.4,ind:.4,mp:0}:{st:1,va:1,ind:.5,mp:.15};
  const scored=Object.entries(DATA).map(([s,d])=>{const r=d.radar;return {s,score:w.st*(r["稳健"]||0)+w.va*(r["性价比"]||0)+w.ind*(r["独立性"]||0)-w.mp*Math.max(0,(r["动量"]||0)-50)};}).sort((a,b)=>b.score-a.score).slice(0,5);
  sel=new Set(scored.map(x=>x.s));renderGrid();render(allocate());
}
function redraw(){applyStatic();renderGrid();}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};redraw();render(allocate());};
$("hz").querySelectorAll("button").forEach(b=>b.onclick=()=>{horizon=b.dataset.h;$("hz").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));if(fromRec)recommend();else if(sel.size)render(allocate());});
$("go").onclick=()=>render(allocate());
$("rec").onclick=recommend;
$("clr").onclick=()=>{sel.clear();renderGrid();$("out").innerHTML="";};
tryLive();
</script>
</body>
</html>
