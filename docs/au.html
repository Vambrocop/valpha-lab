<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🇦🇺 澳洲市场概览 · AU market overview</title>
<link rel="stylesheet" href="vp.css">
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--amb:#d29922;--acc:#a371f7;--blu:#58a6ff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:1080px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  .tzbox{background:rgba(88,166,255,.08);border:1px solid var(--blu);border-radius:8px;padding:9px 12px;font-size:.82rem;margin:10px 0;color:#b7d4ff;line-height:1.5}
  .note{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:9px 12px;font-size:.84rem;margin:10px 0;color:#ffb3ad}
  .ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}
  .ov-card h3{margin:0 0 6px;font-size:.82rem;color:var(--mut);font-weight:600}
  .ov-card .big{font-size:1.55rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .ov-card .chg{font-size:.92rem;margin-top:4px}
  .ov-card .sub{font-size:.76rem;color:var(--mut);margin-top:6px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
  table{width:100%;border-collapse:collapse;font-size:.86rem;margin-top:6px}
  th,td{padding:5px 7px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
  th:nth-child(1),td:nth-child(1){text-align:left}
  th{position:sticky;top:0;background:#161b22;cursor:pointer;user-select:none;color:var(--mut);font-weight:600}
  th.s::after{content:" ▾"}
  tr:hover{background:rgba(163,113,247,.06)}
  .pos{color:var(--grn)} .neg{color:var(--red)}
  .tag{font-size:.66rem;padding:1px 4px;border-radius:4px;margin-left:3px;cursor:help}
  .shorth{background:rgba(210,153,34,.18);color:#e3b341}.idn{background:rgba(88,166,255,.18);color:#8ec3ff}
  .chkbtn{cursor:pointer;padding:1px 5px;border-radius:5px}
  .chkbtn:hover{background:rgba(163,113,247,.15)}
  .chkbtn:focus{outline:2px solid var(--acc);outline-offset:1px}
  .mut{color:var(--mut);font-size:.78rem;margin-top:14px;border-top:1px solid var(--border);padding-top:8px}
  #src{color:var(--mut);font-size:.78rem}
  #excl{font-size:.78rem;color:var(--mut);margin:6px 0}
  th:focus{outline:2px solid var(--acc);outline-offset:-2px}
  /* 🎯 荐股(独立计分·出格) —— 照 picks.html 骨架收窄,变量名与本页 :root 共用 */
  h2{font-size:1.05rem;margin:22px 0 4px;border-top:1px solid var(--border);padding-top:16px}
  h3{font-size:.92rem;margin:14px 0 4px}
  .pk-verdict{background:rgba(163,113,247,.12);border:2px solid var(--acc);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:.92rem;line-height:1.7}
  .pk-stats{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
  .pk-stat{flex:1 1 130px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center}
  .pk-stat .v{font-size:1.4rem;font-weight:800;line-height:1.15}.pk-stat .l{color:var(--mut);font-size:.72rem;margin-top:3px}
  .pk-launch{background:rgba(210,153,34,.1);border:1px solid var(--amb);border-radius:8px;padding:10px 13px;margin:10px 0;font-size:.85rem;color:#e8c96a;line-height:1.55}
  .pk-vbull{display:inline-block;font-size:.74rem;padding:1px 8px;border-radius:20px;border:1px solid rgba(63,185,80,.5);background:rgba(63,185,80,.12);color:var(--grn)}
  .pk-vbear{display:inline-block;font-size:.74rem;padding:1px 8px;border-radius:20px;border:1px solid rgba(248,81,73,.5);background:rgba(248,81,73,.12);color:var(--red)}
  .pk-badge{display:inline-block;font-size:.72rem;padding:1px 7px;border-radius:20px;border:1px solid var(--border);color:var(--mut)}
  #pkRecent th:first-child,#pkRecent td:first-child,#pkRecent th:nth-child(2),#pkRecent td:nth-child(2){text-align:left}
  .bt-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin:10px 0}
  .bt-meta{color:var(--mut);font-size:.78rem;line-height:1.65;margin:6px 0}
  .bt-meta b{color:var(--fg)}
  .bt-decl{margin:6px 0 0;padding-left:18px}.bt-decl li{margin:3px 0}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.15rem}table{font-size:.8rem}.ov-card .big{font-size:1.3rem}.pk-stat{flex:1 1 45%}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>

<div id="excl"></div>
<div id="src"></div>

<h2 data-i18n="pkH"></h2>
<p class="sub" style="color:var(--mut);font-size:.82rem;margin:0 0 8px;line-height:1.55" data-i18n="pkIntro"></p>

<div id="modal" role="dialog" aria-modal="true" aria-label="体检 / checkup" onclick="if(event.target===this)closeChk()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;align-items:center;justify-content:center;padding:16px"><div id="mbody" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:480px;width:100%;max-height:88vh;overflow:auto"></div></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/au_market.json";
const I18N={

        en:"<b>The board shows what already happened, survivors only (survivorship bias).</b> Names near the top now are this cycle's theme, <b>not a forecast</b>, past gains don't guarantee more. This is a purely descriptive page, not a stock pick — read the structure, don't chase."},

        en:"Click a header to sort. Data: live au_market.json — descriptive history, not a forecast, not advice. Independent AU section — not mixed with the US-stock ledger/benchmark."},

  fxsub:{zh:"1 AUD 兑 USD",en:"1 AUD in USD"},

  cn:{zh:"代码",en:"Ticker"},cp:{zh:"股价A$",en:"Price A$"},cd1:{zh:"昨日%",en:"1D%"},cw1:{zh:"近一周%",en:"1W%"},cm1:{zh:"近一月%",en:"1M%"},c6:{zh:"6月%",en:"6M%"},c1:{zh:"1年%",en:"1Y%"},cv:{zh:"波动%",en:"Vol%"},ctag:{zh:"标签",en:"Tags"},
  live:{zh:"实时 ✓",en:"Live ✓"},err:{zh:"拉不到 au_market.json——确认已部署。",en:"Can't load au_market.json — check deployment."},asof:{zh:"数据日",en:"as of"},

  chkVol:{zh:"年化波动",en:"Ann. vol"},chkDd:{zh:"历史最深回撤",en:"Max drawdown"},
  chkBeta:{zh:"β 对 ASX200",en:"β vs ASX200"},chkEvt:{zh:"EVT 尾部 ξ",en:"EVT tail ξ"},
  chkDep:{zh:"大盘解释度 R²",en:"Market R²"},chkLiq:{zh:"流动性(60日中位成交额)",en:"Liquidity (60d median $vol)"},
  chkConf:{zh:"20日收益 90% 区间",en:"20d return 90% band"},
  chkPat:{zh:"日历规律真伪",en:"Calendar patterns"},
  patNone:{zh:"无可靠规律(诚实结果:单股日历规律本就几乎测不出)",en:"No reliable pattern (honest: single-stock calendar effects rarely survive)"},
  liq_high:{zh:"高",en:"high"},liq_mid:{zh:"中",en:"mid"},liq_low:{zh:"低·点差/滑点风险",en:"low · spread/slippage risk"},liq_unknown:{zh:"未知",en:"unknown"},
  chkAsof:{zh:"体检数据日",en:"checkup as of"},
  chkFoot:{zh:"β/波动/回撤是风险特征、不是收益承诺;不含 franking(无可靠免费源,宁缺勿猜)。详见方法论页。",
           en:"β/vol/drawdown are risk traits, not return promises; franking excluded (no reliable free source). See methodology."},
  // ── 🎯 荐股(独立计分·出格·B3) ── 与美股 picks.html 同构,基准换 ^AXJO ──────
  pkH:{zh:"🎯 荐股(独立计分·出格)",en:"🎯 Stock picks (independent scoring · off-piste)"},
  pkIntro:{zh:"我们直接给这批 ASX50 精选股「看好 / 看淡」——规则透明可换（见下方「方法」），出榜次日入场、持有 20 个交易日、相对 ^AXJO 结算，append-only 写进<b>独立</b>公开账本（不与美股 picks.json 混，基准不同不可比）。非投资建议，敢喊也敢被记账。",
          en:"We make direct bull/bear calls on this ASX50-selected pool — the rule is transparent and swappable (see 'Method' below). Entry is the day after the pick, held 20 trading days, scored vs ^AXJO, written into an <b>independent</b> append-only ledger (never mixed with the US picks.json — different benchmark, not comparable). Not investment advice — we make the call AND let it be scored."},
  pkHRecent:{zh:"近期荐股（看好 / 看淡）",en:"Recent picks (bullish / bearish)"},
  pkSRecent:{zh:"按出榜日排序——大多还在「挂账」（20 个交易日没走完）。透明展示我们喊了哪些，不是「该买这些」。",
             en:"Sorted by pick date — most are still 'pending' (20-trading-day window not elapsed). Shown for transparency of what we called, not 'you should buy these'."},
  pkMoreExp:{zh:"方法 & 全部诚实免责（含股息口径不对称·franking·FMG 截断）",en:"Method & full honest disclaimers (dividend asymmetry · franking · FMG cutoff)"},
  pkSCall:{zh:"叫对率%",en:"call-right%"},pkSBull:{zh:"看好命中%",en:"bullish hit%"},pkSBear:{zh:"看淡命中%",en:"bearish hit%"},
  pkSBullEx:{zh:"看好平均叫对超额%",en:"bull mean call-excess%"},pkSBearEx:{zh:"看淡平均叫对超额%",en:"bear mean call-excess%"},
  pkSPend:{zh:"挂账(待结算)",en:"pending"},pkSDrop:{zh:"丢弃(退市/无价)",en:"dropped"},
  pkLaunch:{zh:"⏳ <b>还没有已结算战绩，正在累积。</b>每条荐股的 20 个交易日窗口要约 1 个月后才走完——首批数字届时才出现。现在只看得到「我们喊了哪些」（下表）。",
            en:"⏳ <b>No settled track record yet — accumulating.</b> Each pick's 20-trading-day window won't elapse for ~1 month. For now you can only see WHICH picks we called (table below)."},
  pkCTk:{zh:"代码",en:"Ticker"},pkCView:{zh:"观点",en:"Call"},pkCDate:{zh:"出榜日",en:"Pick date"},
  pkCMom:{zh:"6月动量",en:"6-mo mom"},pkCStat:{zh:"状态",en:"Status"},pkCEx:{zh:"叫对超额 vs ^AXJO",en:"Call-excess vs ^AXJO"},
  pkStSettled:{zh:"已结算",en:"settled"},pkStPending:{zh:"挂账",en:"pending"},pkStDropped:{zh:"已丢弃",en:"dropped"},
  pkVBull:{zh:"看好",en:"Bull"},pkVBear:{zh:"看淡",en:"Bear"},
  pkErr:{zh:"拉不到 au_picks.json——确认已部署 / 稍后再试。",en:"Can't load au_picks.json — check deployment / try later."},
  // 回测披露(容器+渲染;数据来自 au_pick_backtest.py 的 au_backtest.json——另一条建造线的产出)
  btH:{zh:"📜 回测披露(同一规则的历史轨迹)",en:"📜 Backtest disclosure (same-rule historical trace)"},
  btGenerating:{zh:"回测披露生成中——尚未拉到 au_backtest.json（数据/脚本仍在建造中）。",
                en:"Backtest disclosure is being generated — au_backtest.json not available yet (data/script still being built)."},
  btOverall:{zh:"总体",en:"Overall"},btByYear:{zh:"分年",en:"By year"},btMeta:{zh:"披露声明",en:"Disclosures"},
  btNCalls:{zh:"决策次数",en:"# decisions"},btNSettled:{zh:"已结算",en:"settled"},
  btHit:{zh:"总命中%",en:"overall hit%"},btHitBull:{zh:"看好命中%",en:"bullish hit%"},btHitBear:{zh:"看淡命中%",en:"bearish hit%"},
  btCeMean:{zh:"叫对超额均值%",en:"call-excess mean%"},btCeMedian:{zh:"叫对超额中位%",en:"call-excess median%"},
  btNDrop:{zh:"丢弃数",en:"dropped"},
  btYYear:{zh:"年份",en:"Year"},btYN:{zh:"决策数",en:"n"},btYHit:{zh:"命中%",en:"hit%"},btYCe:{zh:"平均叫对超额%",en:"mean call-excess%"},btYSel:{zh:"当年可选票数",en:"selectable"},
  btRule:{zh:"规则",en:"rule"},btHold:{zh:"持有",en:"hold"},btBench:{zh:"基准",en:"bench"},btPeriod:{zh:"期间",en:"period"},
  btFmg:{zh:"FMG 实证截断日",en:"FMG empirical cutoff"},btGen:{zh:"生成于",en:"generated"},
  btSurv:{zh:"幸存者偏差",en:"Survivorship bias"},btDiv:{zh:"股息口径顺风",en:"Dividend-convention tailwind"},
  btIndep:{zh:"非独立性",en:"Non-independence"},btPhase:{zh:"相位锁定",en:"Phase-lock"},btDesc:{zh:"描述性",en:"Descriptive only"},
  btErr:{zh:"拉不到 au_backtest.json。",en:"Can't load au_backtest.json."}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));  // 含单引号:🩺按钮把ticker放进单引号JS串(审计防御纵深)
const num=v=>(typeof v==="number"&&isFinite(v));
const sgn=v=>num(v)?((v>=0?"+":"")+v+"%"):"—";
const stripMd=s=>String(s==null?"":s).replace(/\*\*/g,"");
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
let DATA=null,CHK=null,PICKS=null,BT=null,sortCol="d1",dir=-1;   // CHK=au_checkup.json;PICKS=au_picks.json;BT=au_backtest.json(拉不到则显示"生成中")

function pn(v){if(v==null)return '<span class="mut">—</span>';return `<span class="${v>=0?'pos':'neg'}">${v>=0?'+':''}${v}</span>`;}

function applyStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));
  $("lang").textContent=LANG==="zh"?"EN":"中";
  document.documentElement.lang=LANG==="zh"?"zh-CN":"en";
  if(DATA&&DATA.note_tz){$("tzbox").innerHTML="🕒 "+esc(DATA.note_tz[LANG]||DATA.note_tz.zh||"");}
}

function ovCard(labelKey, subKey, d, priceRound){
  if(!d) return `<div class="ov-card vp-card"><h3>${t(labelKey)}</h3><div class="big mut">—</div></div>`;
  const chgv=d.d1;
  const asofTxt=(LANG==="en"?"as of ":"数据日 ")+esc(d.as_of||"");
  return `<div class="ov-card vp-card"><h3>${t(labelKey)}</h3>
    <div class="big">${d.p}</div>
    <div class="chg">${pn(chgv)}% <span class="mut" style="font-size:.78rem">${t("d1")}</span>
      &nbsp;·&nbsp; ${pn(d.w1)}% <span class="mut" style="font-size:.78rem">${t("w1")}</span>
      &nbsp;·&nbsp; ${pn(d.m1)}% <span class="mut" style="font-size:.78rem">${t("m1")}</span></div>
    <div class="sub">${t(subKey)} · ${asofTxt}</div></div>`;
}

function renderOverview(){
  if(!DATA){$("ov").innerHTML="";return;}
  const axjo=DATA.index&&DATA.index.AXJO, aord=DATA.index&&DATA.index.AORD, fx=DATA.audusd;
  $("ov").innerHTML =
    ovCard("secAxjo","benchmark",axjo) +
    ovCard("secAord","broadmkt",aord) +
    ovCard("secFx","fxsub",fx);
}

function tagOf(d){
  let x="";
  if(d.short_history){const nt=d.short_history_note&&d.short_history_note[LANG]?d.short_history_note[LANG]:(d.short_history_note?d.short_history_note.zh:"");x+=`<span class="tag shorth" title="${esc(nt)}">${t("short_tag")}</span>`;}
  if(d.identity_note){const nt=d.identity_note[LANG]||d.identity_note.zh;x+=`<span class="tag idn" title="${esc(nt)}">${t("id_tag")}</span>`;}
  return x;
}

function renderTable(){
  if(!DATA){return;}
  const stocks=DATA.stocks||[];
  const hasChk=!!(CHK&&CHK.tickers);
  const COLS=[["n","cn"],["p","cp"],["d1","cd1"],["w1","cw1"],["m1","cm1"],["c6","c6"],["c1","c1"],["v","cv"],["tag","ctag"]];
  if(hasChk)COLS.push(["chk","cchk"]);
  let rows=stocks.slice();
  rows.sort((a,b)=>{const x=a[sortCol],y=b[sortCol];if(x==null)return 1;if(y==null)return -1;
    return (typeof x==="number")?(y-x)*dir*-1:String(x).localeCompare(String(y),'zh')*dir*-1;});
  let h=`<caption style="caption-side:top;text-align:left;color:var(--mut);font-size:.82rem;padding:4px 0 8px;font-weight:600">${t("asx50")}</caption><thead><tr>`;
  COLS.forEach(([k,lk])=>{const on=k===sortCol;h+=`<th data-k="${k}" scope="col" tabindex="0" role="button" aria-sort="${on?(dir<0?'descending':'ascending'):'none'}" class="${on?'s':''}">${t(lk)}</th>`;});
  h+="</tr></thead><tbody>";
  rows.forEach(d=>{
    const chkBtn=(hasChk&&CHK.tickers[d.t]&&CHK.tickers[d.t].status==="ok")
      ?`<td><span class="chkbtn" role="button" tabindex="0" onclick="showChk('${esc(d.t)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showChk('${esc(d.t)}')}" title="${t('chkTitle')}">🩺</span></td>`
      :(hasChk?'<td><span class="mut">—</span></td>':'');
    h+=`<tr><td>${esc(d.n)}</td>
    <td>${d.p==null?'<span class="mut">—</span>':d.p}</td><td>${pn(d.d1)}</td><td>${pn(d.w1)}</td><td>${pn(d.m1)}</td>
    <td>${pn(d.c6)}</td><td>${pn(d.c1)}</td><td>${d.v==null?'<span class="mut">—</span>':d.v}</td>
    <td style="text-align:left">${tagOf(d)}</td>${chkBtn}</tr>`;});
  h+="</tbody>";$("tbl").innerHTML=h;
  $("tbl").querySelectorAll("th").forEach(th=>{const sort=()=>{const k=th.dataset.k;if(k===sortCol)dir*=-1;else{sortCol=k;dir=-1;}renderTable();};th.onclick=sort;th.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();sort();}};});
}

function renderExcl(){
  if(!DATA||!DATA.excluded||!DATA.excluded.length){$("excl").textContent="";return;}
  const items=DATA.excluded.map(x=>`${esc(x.name)} (${esc(x.ticker)}) — ${esc(x[LANG==="en"?"reason_en":"reason_zh"]||"")}`).join("; ");
  $("excl").textContent=`${t("excl")}: ${items}`;
}

function redraw(){applyStatic();renderOverview();renderTable();renderExcl();renderPicks();renderBacktest();
  $("src").textContent=(DATA?`${t("live")} ${(DATA.stocks||[]).length} · ${t("asof")} ${DATA.as_of||""}`:"");}

// ── 🎯 荐股(独立计分·B3) —— 数据=au_picks.json(拉不到则整段留空,不报错刷屏) ──────
function renderPicks(){
  if(!PICKS){$("pkVerdict").textContent="";$("pkStats").innerHTML="";$("pkLaunch").style.display="none";
    $("pkRecent").innerHTML="";$("pkCaveat").textContent="";$("pkSrc").textContent=t("pkErr");return;}
  const tr=PICKS.track_record||{};
  const bull=tr.bullish||{},bear=tr.bearish||{};
  const n=tr.n_settled||0;
  $("pkVerdict").innerHTML="🧭 "+esc(PICKS.verdict||"");
  const callHit=num(tr.call_hit_pct)?tr.call_hit_pct+"%":"—";
  const bullHit=num(bull.hit_pct)?bull.hit_pct+"%":"—";
  const bearHit=num(bear.hit_pct)?bear.hit_pct+"%":"—";
  const bullEx=sgn(bull.mean_call_excess_pct),bearEx=sgn(bear.mean_call_excess_pct);
  const bullExCls=num(bull.mean_call_excess_pct)?(bull.mean_call_excess_pct>=0?"pos":"neg"):"";
  const bearExCls=num(bear.mean_call_excess_pct)?(bear.mean_call_excess_pct>=0?"pos":"neg"):"";
  const pend=num(tr.n_pending)?tr.n_pending:"—";
  const dropPct=num(tr.dropped_pct)?tr.dropped_pct:0;
  const drop=(num(tr.n_dropped)?tr.n_dropped:0)+" ("+dropPct+"%)";
  $("pkStats").innerHTML=
     `<div class="pk-stat"><div class="v">${esc(callHit)}</div><div class="l">${t("pkSCall")}</div></div>`
    +`<div class="pk-stat"><div class="v" style="color:var(--grn)">${esc(bullHit)}</div><div class="l">${t("pkSBull")}</div></div>`
    +`<div class="pk-stat"><div class="v" style="color:var(--red)">${esc(bearHit)}</div><div class="l">${t("pkSBear")}</div></div>`
    +`<div class="pk-stat"><div class="v ${bullExCls}">${esc(bullEx)}</div><div class="l">${t("pkSBullEx")}</div></div>`
    +`<div class="pk-stat"><div class="v ${bearExCls}">${esc(bearEx)}</div><div class="l">${t("pkSBearEx")}</div></div>`
    +`<div class="pk-stat"><div class="v">${esc(String(pend))}</div><div class="l">${t("pkSPend")}</div></div>`
    +`<div class="pk-stat"><div class="v" style="color:var(--mut)">${esc(drop)}</div><div class="l">${t("pkSDrop")}</div></div>`;
  const lb=$("pkLaunch");
  if(n===0){lb.style.display="";lb.innerHTML=t("pkLaunch");}else{lb.style.display="none";}
  let h=`<tr><th>${t("pkCTk")}</th><th>${t("pkCView")}</th><th>${t("pkCDate")}</th><th>${t("pkCMom")}</th><th>${t("pkCStat")}</th><th>${t("pkCEx")}</th></tr>`;
  (PICKS.recent||[]).forEach(r=>{
    const isBull=r.view==="看好",isBear=r.view==="看淡";
    let vCell;
    if(isBull) vCell=`<span class="pk-vbull">${esc(LANG==="en"?t("pkVBull"):r.view)}</span>`;
    else if(isBear) vCell=`<span class="pk-vbear">${esc(LANG==="en"?t("pkVBear"):r.view)}</span>`;
    else vCell=`<span class="pk-badge">${esc(r.view||"—")}</span>`;
    const mom=sgn(r.mom_pct);
    let status,exCell;
    if(r.dropped){status=`<span class="pk-badge">${t("pkStDropped")}</span>`;exCell="—";}
    else if(r.settled){
      status=`<span class="pk-badge">${t("pkStSettled")}</span>`;
      if(num(r.call_excess_pct)){const cls=r.hit?"pos":"neg";exCell=`<span class="${cls}">${(r.call_excess_pct>=0?"+":"")+r.call_excess_pct}%</span>`;}else exCell="—";
    } else {status=`<span class="pk-badge">${t("pkStPending")}</span>`;exCell="—";}
    h+=`<tr><td>${esc(r.symbol||"—")}</td><td>${vCell}</td><td>${esc(r.pick_date||"—")}</td>`
      +`<td>${esc(mom)}</td><td>${status}</td><td>${exCell}</td></tr>`;
  });
  $("pkRecent").innerHTML=h;
  $("pkCaveat").textContent="⚠️ "+stripMd(PICKS.caveat||"");
  const gen=esc((PICKS.generated||"").slice(0,10));
  const hold=num(PICKS.hold_td)?PICKS.hold_td:20,bm=esc(PICKS.benchmark||"^AXJO");
  $("pkSrc").textContent=LANG==="en"
    ?`Source: ${esc(PICKS.source||"AU picks → forward public scoring")} · generated ${gen} · hold ${hold} trading days vs ${bm}`
    :`数据：${esc(PICKS.source||"澳股荐股 → 前向公开计分")} · 生成 ${gen} · 持有 ${hold} 交易日 vs ${bm}`;
}

// ── 📜 回测披露(容器+渲染;数据=au_backtest.json,来自另一条建造线 au_pick_backtest.py) ──
// 契约按 SPEC_AU_PICKS.md §2.3 推定字段名(overall/by_year/meta);实际产出若字段名有出入,
// 下面按存在性宽松取值+全部"—"兜底,不会因缺字段抛错——集成时如与实际 schema 不符,按此函数改字段名即可。
function renderBacktest(){
  const el=$("backtest-disclosure");
  if(!BT){el.innerHTML=`<div class="bt-card">⏳ ${t("btGenerating")}</div>`;return;}
  try{
    const ov=BT.overall||BT.summary||{};
    const meta=BT.meta||{};
    const years=BT.by_year||BT.yearly||BT.years||[];
    const pick=(o,...ks)=>{for(const k of ks){if(o&&o[k]!=null)return o[k];}return null;};
    const pct=v=>num(v)?v+"%":"—";
    let h=`<h3 style="margin-top:0">${t("btH")}</h3>`;
    h+=`<div class="bt-card"><b>${t("btOverall")}</b><div class="pk-stats" style="margin-top:8px">`
      +`<div class="pk-stat"><div class="v">${esc(pick(ov,"n_calls","n")??"—")}</div><div class="l">${t("btNCalls")}</div></div>`
      +`<div class="pk-stat"><div class="v">${esc(pick(ov,"n_settled")??"—")}</div><div class="l">${t("btNSettled")}</div></div>`
      +`<div class="pk-stat"><div class="v">${pct(pick(ov,"hit_pct","hit_rate_pct"))}</div><div class="l">${t("btHit")}</div></div>`
      +`<div class="pk-stat"><div class="v" style="color:var(--grn)">${pct(pick(ov,"hit_pct_bullish","bullish_hit_pct"))}</div><div class="l">${t("btHitBull")}</div></div>`
      +`<div class="pk-stat"><div class="v" style="color:var(--red)">${pct(pick(ov,"hit_pct_bearish","bearish_hit_pct"))}</div><div class="l">${t("btHitBear")}</div></div>`
      +`<div class="pk-stat"><div class="v">${pct(pick(ov,"call_excess_mean_pct","mean_call_excess_pct"))}</div><div class="l">${t("btCeMean")}</div></div>`
      +`<div class="pk-stat"><div class="v">${pct(pick(ov,"call_excess_median_pct","median_call_excess_pct"))}</div><div class="l">${t("btCeMedian")}</div></div>`
      +`<div class="pk-stat"><div class="v" style="color:var(--mut)">${esc(pick(ov,"n_dropped","dropped")??"—")}</div><div class="l">${t("btNDrop")}</div></div>`
      +`</div></div>`;
    if(years&&years.length){
      h+=`<div class="bt-card"><b>${t("btByYear")}</b><div style="overflow-x:auto"><table style="margin-top:8px"><thead><tr>`
        +`<th>${t("btYYear")}</th><th>${t("btYN")}</th><th>${t("btYHit")}</th><th>${t("btYCe")}</th><th>${t("btYSel")}</th></tr></thead><tbody>`;
      years.forEach(y=>{h+=`<tr><td style="text-align:left">${esc(pick(y,"year")??"—")}</td><td>${esc(pick(y,"n")??"—")}</td>`
        +`<td>${pct(pick(y,"hit_pct"))}</td><td>${pct(pick(y,"call_excess_mean_pct","mean_call_excess_pct"))}</td>`
        +`<td>${esc(pick(y,"n_selectable")??"—")}</td></tr>`;});
      h+="</tbody></table></div></div>";
    }
    const decls=[["btSurv","survivorship_note"],["btDiv","dividend_note"],["btIndep","non_independence_note"],
                 ["btPhase","phase_lock_note"],["btDesc","descriptive_note"]];
    let declItems=decls.map(([lk,fk])=>{const v=pick(meta,fk);return v?`<li><b>${t(lk)}：</b>${esc(v)}</li>`:"";}).filter(Boolean).join("");
    if(!declItems&&Array.isArray(meta.notes)) declItems=meta.notes.map(n=>`<li>${esc(n)}</li>`).join("");
    h+=`<div class="bt-card"><b>${t("btMeta")}</b>`
      +`<div class="bt-meta">${t("btRule")}: <b>${esc(pick(meta,"rule")||PICKS&&PICKS.pick_rule||"—")}</b>`
      +` · ${t("btHold")}: ${esc(pick(meta,"hold_td","hold")??"20")} · ${t("btBench")}: ${esc(pick(meta,"bench","benchmark")||"^AXJO")}`
      +(pick(meta,"period_start")?` · ${t("btPeriod")}: ${esc(pick(meta,"period_start"))} ~ ${esc(pick(meta,"period_end"))}`:"")
      +(pick(meta,"fmg_cutoff_date")?` · ${t("btFmg")}: ${esc(pick(meta,"fmg_cutoff_date"))}`:"")+`</div>`;
    if(declItems) h+=`<ul class="bt-decl bt-meta">${declItems}</ul>`;
    const genAt=esc((pick(meta,"generated")||BT.generated||"").slice(0,10));
    if(genAt) h+=`<div class="bt-meta">${t("btGen")} ${genAt}</div>`;
    h+="</div>";
    el.innerHTML=h;
  }catch(e){el.innerHTML=`<div class="bt-card">⏳ ${t("btGenerating")}</div>`;}
}
// ── 🩺 体检模态(数据=au_checkup.json;风险画像·非荐股非预测) ──────────────
function _kv(label,val){return `<div style="display:flex;justify-content:space-between;gap:12px;padding:3px 0;border-bottom:1px dashed var(--border)"><span class="mut" style="margin:0;border:0;padding:0">${label}</span><b style="font-variant-numeric:tabular-nums">${val}</b></div>`;}
function showChk(tk){
  const c=CHK&&CHK.tickers&&CHK.tickers[tk]; if(!c||c.status!=="ok")return;
  const zh=(LANG==="zh");
  let h=`<div style="display:flex;justify-content:space-between;align-items:baseline"><b style="font-size:1.02rem">${esc(c.name)} <span class="mut" style="margin:0;border:0;padding:0">${esc(tk)}</span></b><span class="chkbtn" role="button" tabindex="0" onclick="closeChk()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();closeChk()}" style="cursor:pointer" aria-label="关闭 / close">✕</span></div>
  <div class="mut" style="margin:4px 0 10px;border:0;padding:0">${t("chkTitle")}</div>`;
  h+=_kv(t("chkVol"), `${c.ann_vol_pct}%`);
  h+=_kv(t("chkDd"), `<span class="neg">${c.max_drawdown_pct}%</span>`);
  h+=_kv(t("chkBeta"), c.beta_axjo==null?"—":c.beta_axjo);
  const ev=c.evt||{}; if(ev.status==="ok")h+=_kv(t("chkEvt"), ev.xi);
  const md=c.market_dep||{}; if(md.status==="ok")h+=_kv(t("chkDep"), `${md.r2_pct}%`);
  const lq=c.liquidity||{};
  h+=_kv(t("chkLiq"), lq.status==="ok"?`${t("liq_"+lq.tier)} · A$${lq.median_daily_aud_m}M/d`:t("liq_unknown"));
  const cf=c.conformal||{}; if(cf.status==="ok")h+=_kv(t("chkConf"), `${cf.lower_pct}% ~ +${cf.upper_pct}%`);
  const pat=c.patterns||{};
  if(pat.status==="ok"){
    const vs=(pat.tests||[]).map(x=>x.verdict||"");
    const good=vs.some(v=>v==="real"||v==="hist_robust"||v==="faded");
    h+=_kv(t("chkPat"), good?esc(vs.join(", ")):`<span class="mut" style="margin:0;border:0;padding:0">${t("patNone")}</span>`);
  }
  const notes=[];
  if(c.short_history_note)notes.push(c.short_history_note[LANG]||c.short_history_note.zh);
  if(c.identity_note)notes.push(c.identity_note[LANG]||c.identity_note.zh);
  if(lq.status==="ok"&&lq.tier==="low")notes.push(zh?lq.note_zh:lq.note_en);
  notes.forEach(n=>{h+=`<div style="background:rgba(210,153,34,.12);border:1px solid var(--amb);border-radius:6px;padding:6px 9px;font-size:.78rem;margin-top:8px;color:#e3b341">⚠ ${esc(n)}</div>`;});
  h+=`<div class="mut" style="margin-top:10px;padding-top:8px">${t("chkFoot")} · ${t("chkAsof")} ${esc((CHK.generated||"").slice(0,10))}</div>`;
  $("mbody").innerHTML=h;$("modal").style.display="flex";
}
function closeChk(){$("modal").style.display="none";}
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&$("modal").style.display!=="none")closeChk();});

$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};redraw();};

// 相对优先 → github.io 兜底(与 discoveries/self_growing 同范式;本地/预览环境不再 404)
const g=u=>fetch(u,{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null);
async function load(){
  applyStatic();
  DATA=await g("au_market.json")||await g(LIVE);
  CHK=await g("au_checkup.json")||await g("https://vambrocop.github.io/valpha-lab/au_checkup.json");  // fail-soft:拉不到则无体检列
  PICKS=await g("au_picks.json")||await g("https://vambrocop.github.io/valpha-lab/au_picks.json");    // fail-soft:拉不到则该区显错误提示
  BT=await g("au_backtest.json")||await g("https://vambrocop.github.io/valpha-lab/au_backtest.json"); // fail-soft:拉不到则显"生成中"(回测由另一条建造线产出,暂缺是预期状态)
  renderPicks();renderBacktest();
  if(!DATA){
    $("src").textContent=t("err");
    const msg=LANG==="en"?"Failed to load — refresh later":"加载失败，请稍后刷新";
    $("tbl").innerHTML=`<tr><td colspan="9" style="text-align:center;padding:18px;color:var(--mut)">${msg}</td></tr>`;
    return;
  }
  if(!DATA.stocks||!DATA.stocks.length){
    const msg=LANG==="en"?"No data yet — check back soon":"暂无数据，稍后再试";
    $("tbl").innerHTML=`<tr><td colspan="9" style="text-align:center;padding:18px;color:var(--mut)">${msg}</td></tr>`;
    $("src").textContent="";
  }else{redraw();}
}
load();
</script>
