  .headline .amb{color:var(--amber)}
  .headline .gone{color:var(--mut)}

  .sub{color:var(--mut);font-size:.78rem;margin:0 0 8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 13px;border-left:3px solid var(--grn)}
  .card.faded{border-left-color:var(--amber)}
  .card.inconc{border-left-color:#8b949e}
  .pcard{cursor:pointer}
  .pcard .plain{font-weight:700;font-size:.96rem;color:var(--fg)}
  .pcard .why{font-size:.82rem;color:var(--mut);margin-top:4px;line-height:1.5}

// 注：凡不在 PLAIN_MAP、又非反弹/单月族的代号（如 overnight_mom_pos/dxy_rising/vix_backwardation 等），
// plainName() 一律回退到保留原代号 + ⚠️，绝不替它们编含义。
// 反弹族 pN_hM_index → 「指数大跌第N百分位后持有M天反弹」
function rebPlain(key){
  const m=/^p(\d+)_h(\d+)_(\w+)$/.exec(key||"");
  if(!m)return null;
  const idx=IDX_NAME[m[3]]?IDX_NAME[m[3]][LANG]:m[3];
  return LANG==="zh"
    ? `${idx}大跌（最猛 ${m[1]}% 那档）后持有 ${m[2]} 天反弹`
    : `${idx} bounce: hold ${m[2]} day(s) after a big drop (worst ${m[1]}% bucket)`;
}
// 单月族 monthof_N_index → 「N月效应·指数（机器逐月枚举）」——月份名含义明确，非杜撰
function monthPlain(key){
  const m=/^monthof_(\d+)_(\w+)$/.exec(key||"");
  if(!m)return null;
  const mn=MONTH_NAME[+m[1]]; if(!mn)return null;
  const idx=IDX_NAME[m[2]]?IDX_NAME[m[2]][LANG]:m[2];
  return LANG==="zh"
    ? `${mn[LANG]}效应·${idx}（机器逐月枚举）`
    : `${mn[LANG]} effect · ${idx} (machine month-by-month scan)`;
}
// 返回 {name, unsure} —— name=大白话；unsure=true 表示拿不准、已保留原代号
function plainName(c){
  const key=c.key||"";
  if(PLAIN_MAP[key])return {name:PLAIN_MAP[key][LANG],unsure:false};
  if(c.family==="rebound"){const r=rebPlain(key);if(r)return {name:r,unsure:false};}
  const mp=monthPlain(key);if(mp)return {name:mp,unsure:false};
  return {name:esc(key),unsure:true};  // 含义拿不准：保留原代号、调用处加 ⚠️ 标注
}
// 一句话「为什么」——按族给通用解释（不编具体方向）
function whyLine(c){
  if(c.family==="rebound")return t("pWhyRebound");
  if(c.family==="factor")return t("pWhyFactor");
  if(c.family==="regime")return t("pWhyRegime");
  if(c.family==="calendar")return t("pWhyCalendar");
  return t("pWhyGeneric");
}

                   en:"💡 Use: September has been weak (~−1.2%/yr) → consider trimming in September. Not advice · can be wrong."},
  golden_cross_sp500:{zh:"💡 怎么用：金叉（50 日线上穿 200 日线）= 趋势确认，之后偏强 → 可作顺势参考。非建议·会错。",
                      en:"💡 Use: golden cross (50d above 200d) = trend confirmation, tends to be stronger after → a with-trend reference. Not advice · can be wrong."}};

// ── 卡片渲染 ───────────────────────────────────────────────────────────
function pcard(c,cls){
  const pn=plainName(c);
  const fl=pn.unsure?` <span class="flag" title="含义拿不准，保留原代号 / meaning unclear, key kept">⚠️</span>`:"";
  const use=(c.verdict==="survive"&&USE_MAP[c.key])?`<div class="why" style="color:var(--grn);margin-top:3px">${USE_MAP[c.key][LANG]}</div>`:"";
  return `<div class="card pcard ${cls||""}" onclick="showAD('${esc(c.candidate_id)}')">
    <div class="plain">${pn.name}${fl}</div>
    <div class="why">${whyLine(c)}</div>${use}
    <div class="raw">${esc(c.key)} · <span style="color:var(--acc)">${t("dClick")}</span></div></div>`;
}

// ── 详情弹窗（逐窗口表 + 逐十年表，复用 self_growing.html 同款）────────────
function showAD(id){const c=ADC.find(x=>x.candidate_id===id);if(!c)return;
  const vl={survive:t("vSurvive"),faded:t("vFaded"),dead:t("vDead"),inconclusive:t("vInconc")}[c.verdict]||c.verdict;
  const pp=v=>v==null?"—":(+v).toPrecision(3);
  const wr=(c.windows||[]).map(w=>{
    const up=w.up_pct==null?"—":w.up_pct+"%",bs=w.base_pct==null?"—":w.base_pct+"%";
    const hi=(w.up_pct!=null&&w.base_pct!=null);
    const dp=hi?(w.up_pct>=w.base_pct?"var(--grn)":"var(--red)"):"var(--mut)";
    const ar=hi?(w.up_pct>=w.base_pct?"▲ ":"▼ "):"";  // 色盲安全:不只靠红绿，加箭头
    return `<tr><td style="padding:2px 0">${esc(w.label)}</td><td style="text-align:right;color:${dp};font-weight:600">${ar}${up}</td><td style="text-align:right;color:var(--mut)">${bs}</td><td style="text-align:right">${w.p==null?"—":w.p}</td><td style="text-align:right;color:var(--mut)">${w.n==null?"—":w.n}</td></tr>`;
  }).join("");
  const wt=wr?`<div style="font-size:.75rem;color:var(--acc);margin-top:12px">📊 ${esc(c.effect||"")}（${t("wMulti")}）</div>
    <table style="width:100%;font-size:.8rem;margin-top:3px;border-collapse:collapse">
      <tr style="color:var(--mut);border-bottom:1px solid var(--border)"><td>${t("wWin")}</td><td style="text-align:right">${t("wUp")}</td><td style="text-align:right">${t("wBase")}</td><td style="text-align:right">p</td><td style="text-align:right">n</td></tr>${wr}</table>
    <div style="font-size:.7rem;color:var(--mut);margin-top:5px">${t("wNote")}</div>`:"";
  // 逐十年:哪些年代灵、哪些年代死了(faded 规律一眼看出何时失效)
  const dr=(c.decades||[]).map(r=>{
    const ok=r.diff_pp>=0,dp=ok?"var(--grn)":"var(--red)",ar=ok?"▲ ":"▼ ";
    return `<tr><td style="padding:2px 0">${esc(r.decade)}</td><td style="text-align:right;color:${dp};font-weight:600">${ar}${r.up_pct}%</td><td style="text-align:right;color:var(--mut)">${r.base_pct}%</td><td style="text-align:right;color:${dp}">${ok?"+":""}${r.diff_pp}</td><td style="text-align:right;color:var(--mut)">${r.n}</td></tr>`;
  }).join("");
  const dt=dr?`<div style="font-size:.75rem;color:var(--acc);margin-top:12px">📅 ${t("dcTitle")}</div>
    <table style="width:100%;font-size:.8rem;margin-top:3px;border-collapse:collapse">
      <tr style="color:var(--mut);border-bottom:1px solid var(--border)"><td>${t("dcDecade")}</td><td style="text-align:right">${t("wUp")}</td><td style="text-align:right">${t("wBase")}</td><td style="text-align:right">${t("dcDiff")}</td><td style="text-align:right">n</td></tr>${dr}</table>
    <div style="font-size:.7rem;color:var(--mut);margin-top:5px">${t("dcNote")}</div>`:"";
  $("mbody").innerHTML=`<div style="font-weight:700;font-size:1.05rem;margin-bottom:8px">${esc(c.key)}</div>
    <div style="color:var(--mut);font-size:.85rem;line-height:1.9">
      ${t("dFam")}：<b style="color:var(--fg)">${esc(c.family)}</b> · ${t("dVerdict")}：<b style="color:${VCLR[c.verdict]||'var(--fg)'}">${vl}</b>${c.reason?` · ${esc(c.reason)}`:""}<br>
      ${t("dP")}：<b style="color:var(--fg)">${pp(c.p)}</b>（${t("dRecent")} ${pp(c.recent_p)}）· ${t("dModern")}：${esc(c.modern_status||"—")}
    </div>${wt}${dt}
    ${AD&&AD.caveat?`<div style="font-size:.68rem;color:var(--mut);margin-top:10px;border-top:1px solid var(--border);padding-top:7px;line-height:1.5">${esc(AD.caveat)}</div>`:""}
    <button onclick="closeD()" style="margin-top:14px;background:var(--acc);color:#fff;border:0;border-radius:8px;padding:7px 18px;cursor:pointer">${t("dClose")}</button>`;
  openModal();}
function closeD(){$("modal").style.display="none";if(window._mTrig&&window._mTrig.focus){try{window._mTrig.focus()}catch(e){}}}
function enhanceA11y(root){(root||document).querySelectorAll("[onclick]").forEach(el=>{if(el.tagName!=="BUTTON"&&!el.hasAttribute("tabindex")&&!el.hasAttribute("role")){el.tabIndex=0;el.setAttribute("role","button");}});}
function openModal(){window._mTrig=document.activeElement;const b=$("mbody");enhanceA11y(b);b.setAttribute("tabindex","-1");$("modal").style.display="flex";try{b.focus()}catch(e){}}

function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}

function render(){
  applyStatic();
  // 数据缺失/为空 → 优雅大白话兜底
  if(!AD||!AD.candidates||!AD.candidates.length){
    $("headline").innerHTML=t("empty");
    $("survivors").innerHTML=`<div class="mut">—</div>`;
    $("faded").innerHTML=`<div class="mut">—</div>`;
    $("inconc").innerHTML=`<div class="mut">—</div>`;
    $("dead").innerHTML=`<div class="mut">—</div>`;
    $("deadSummary").textContent="—";
    $("src").textContent=AD?"":t("err");
    return;
  }
  ADC=AD.candidates;
  const cs=ADC, s=AD.summary||{};
  const surv=cs.filter(c=>c.verdict==="survive");
  const faded=cs.filter(c=>c.verdict==="faded");
  const inconc=cs.filter(c=>c.verdict==="inconclusive");
  const dead=cs.filter(c=>c.verdict==="dead");
  const m=(s.m_total!=null?s.m_total:cs.length);
  const nS=(s.n_survive!=null?s.n_survive:surv.length);
  const nF=(s.n_faded!=null?s.n_faded:faded.length);
  const nI=(s.n_inconclusive!=null?s.n_inconclusive:inconc.length);
  const nD=(s.n_dead!=null?s.n_dead:dead.length);
  // ① 大白话领头句（0 存活时换诚实兜底句）
  if(nS===0){
    $("headline").innerHTML=t("noneSurv");
  } else if(LANG==="zh"){
    $("headline").innerHTML=`机器用严格统计测了 <b style="color:var(--fg)">${m}</b> 条规律：`
      +`<b>${nS}</b> 条扛住了、<span class="amb">${nF}</span> 条曾灵但现在淡了、`
      +`<span class="gone">${nI}</span> 条样本太小没定论，其余 <span class="gone">${nD}</span> 条没通过。`;
  } else {
    $("headline").innerHTML=`The machine ran <b style="color:var(--fg)">${m}</b> patterns through strict statistics: `
      +`<b>${nS}</b> held up, <span class="amb">${nF}</span> once worked but faded, `
      +`<span class="gone">${nI}</span> were too small to call, and the other <span class="gone">${nD}</span> didn't pass.`;
  }
  const ord=(a,b)=>((a.p==null?1:a.p)-(b.p==null?1:b.p));
  // ③ 活着的
  $("survivors").innerHTML=surv.length?[...surv].sort(ord).map(c=>pcard(c,"")).join(""):`<div class="mut">${t("noneSurv")}</div>`;
  // ④ 曾真现死
  $("faded").innerHTML=faded.length?[...faded].sort(ord).map(c=>pcard(c,"faded")).join(""):`<div class="mut">${t("noneFaded")}</div>`;
  // ⑤ 没定论
  $("inconc").innerHTML=inconc.length?[...inconc].sort(ord).map(c=>pcard(c,"inconc")).join(""):`<div class="mut">${t("noneInconc")}</div>`;
  // ⑥ 没通过（折叠·只放大白话名 chip + 计数）
  $("deadSummary").textContent=`${dead.length} ${t("deadCount")}`;
  $("dead").innerHTML=dead.length?[...dead].sort(ord).map(c=>{
    const pn=plainName(c);
    const fl=pn.unsure?" ⚠️":"";
    return `<span class="gchip" style="cursor:pointer" onclick="showAD('${esc(c.candidate_id)}')" title="${esc(c.key)} · p=${c.p==null?"—":(+c.p).toPrecision(2)}">${pn.name}${fl}</span>`;
  }).join(""):`<div class="mut">—</div>`;
  // 数据日 + 账本追踪天数
  const asof=AD.generated?`${t("asof")} ${esc(AD.generated.slice(0,10))}`:"";
  const led=(AD.days_tracked!=null)?` · 🌱 ${t("ledger")} ${AD.days_tracked}${t("days")}`:"";
  $("src").innerHTML=asof+led;
  enhanceA11y();
}

$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};render();};
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){if($("modal").style.display!=="none")closeD();return;}
  if(e.key==="Enter"||e.key===" "){const a=document.activeElement;if(a&&a.getAttribute&&a.getAttribute("role")==="button"&&a.tagName!=="BUTTON"){e.preventDefault();a.click();}}
});
(async()=>{applyStatic();
  $("survivors").innerHTML='<div class="skel"></div><div class="skel"></div>';
  $("faded").innerHTML='<div class="skel"></div>';
  $("inconc").innerHTML='<div class="skel"></div>';
  // 相对优先 → 失败再 github.io 兜底
  const g=u=>fetch(u,{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null);
  AD=await g(AUTODISC_LOCAL);
  if(!AD)AD=await g(AUTODISC_FALLBACK);
  render();})();
</script>
</body>
</html>
