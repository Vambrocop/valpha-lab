<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📚 证据库总览 · 已测规律</title>
<link rel="stylesheet" href="vp.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:900px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  .note{background:rgba(198,120,221,.1);border:1px solid var(--acc);border-radius:8px;padding:10px 13px;font-size:.85rem;margin:12px 0;color:#e0d2f5;line-height:1.6}
  .card{display:block;text-decoration:none;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--acc);border-radius:10px;padding:12px 14px;margin:10px 0;color:var(--fg);transition:.14s}
  .card:hover{border-color:var(--acc);transform:translateY(-1px)}
  .card .nm{font-weight:700;font-size:1rem}
  .card .fam{font-size:.7rem;color:var(--acc);border:1px solid var(--acc);border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle}
  .card .sc{color:var(--mut);font-size:.78rem;margin-top:3px}
  .card .ev{font-size:.84rem;margin-top:5px}
  .card .vd{font-size:.82rem;margin-top:4px;color:#d2c2f5}
  .card .go{color:var(--acc);font-size:.76rem;margin-top:4px}
  .mut{color:var(--mut);font-size:.76rem;margin-top:16px;border-top:1px solid var(--border);padding-top:8px;line-height:1.6}
  #src{color:var(--mut);font-size:.78rem;margin-top:6px}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.12rem}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<p data-i18n="intro" style="color:var(--mut);font-size:.85rem;margin:6px 0"></p>
<div class="note" id="note"></div>
<div id="list"></div>
<div id="src"></div>
<div class="mut" data-i18n="foot"></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/evidence.json";
const I18N={
  title:{zh:"📚 证据库总览 · 已测规律",en:"📚 Evidence ledger · tested rules"},
  intro:{zh:"全站每个「规律族」一张卡，强制带 适用条件 + 证据 + 裁决 + 详情链接——没证据不进库。点卡进详情。",
         en:"Every tested 'rule family' as one card with scope + evidence + verdict + a link — no rule without evidence. Tap a card for detail."},
  go:{zh:"点开看详情 →",en:"open detail →"},
  foot:{zh:"诚实立场:大多数民间「规律」测下来是噪声/已淡/不可靠,真存活的极少且都标不确定性。非荐股·会错·过去≠未来。",
        en:"Honest stance: most folk 'patterns' test out as noise / faded / unreliable; the few survivors all carry uncertainty tags. Not advice."},
  err:{zh:"拉不到 evidence.json——确认已部署。",en:"Can't load evidence.json — check deployment."},asof:{zh:"更新",en:"updated"}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh";try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}
function render(d){
  applyStatic();
  $("note").textContent="🧭 "+(d.note||"");
  $("list").innerHTML=(d.rows||[]).map(r=>
    `<a class="card" href="${esc(r.link||'#')}">`
    +`<div><span class="nm">${esc(r.name)}</span><span class="fam">${esc(r.family)}</span></div>`
    +`<div class="sc">📍 ${esc(r.scope)}</div>`
    +`<div class="ev">📊 ${esc(r.evidence)}</div>`
    +`<div class="vd">🧭 ${esc(r.verdict)}</div>`
    +`<div class="go">${t("go")}</div></a>`).join("");
  $("src").textContent=`${t("asof")} ${esc((d.generated||"").slice(0,10))} · ${d.n} 族`;
}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};if(window._d)render(window._d);};
(async()=>{applyStatic();
  try{const r=await fetch(LIVE,{cache:"no-store"});if(!r.ok)throw 0;window._d=await r.json();render(window._d);}
  catch(e){$("note").textContent=t("err");}
})();
</script>
<script src="vp_gloss.js" data-autoscan></script>
</body>
</html>
