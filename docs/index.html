<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valpha Lab</title>
<link rel="stylesheet" href="vp.css">
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--amb:#d29922;--acc:#a371f7;--blu:#58a6ff}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 500px at 50% -200px,rgba(163,113,247,.10),transparent),var(--bg);color:var(--fg);font:15px/1.6 var(--font-sys);padding:18px;max-width:960px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:1.7rem;margin:.1em 0;font-weight:800;letter-spacing:.5px}
  h1 .hex{color:var(--acc)}
  .tag{color:var(--mut);font-size:.9rem}
  #lang{margin-left:auto;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.84rem}
  .hero{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;background:linear-gradient(135deg,rgba(163,113,247,.13),rgba(88,166,255,.06));border:1px solid var(--acc);border-radius:14px;padding:16px 18px;margin:16px 0}
  .hero canvas{display:block}
  .hero-lbl{font-size:.74rem;letter-spacing:.4px}
  .hero-stance{font-size:1.95rem;font-weight:800;line-height:1.05;margin-top:2px;font-variant-numeric:tabular-nums}
  .hero-call{font-size:1.05rem;margin-top:5px}
  .hero-read{font-size:.86rem;color:#d8e0ea;margin-top:9px;line-height:1.5}
  .hero-tilt{font-size:.82rem;color:var(--mut);margin-top:7px}
  .hero-acct{display:inline-block;margin-top:10px;font-size:.8rem;color:var(--acc-strong,#b483ff);text-decoration:none;border:1px solid var(--acc-line,rgba(163,113,247,.45));border-radius:20px;padding:3px 12px;transition:background .14s,border-color .14s}
  .hero-acct:hover{background:var(--acc-weak,rgba(163,113,247,.14));border-color:var(--acc)}
  .hero-acct:focus-visible{box-shadow:var(--ring,0 0 0 3px rgba(163,113,247,.40))}
  @media(max-width:560px){.hero{grid-template-columns:1fr;text-align:center}.hero-stance{font-size:1.65rem}.hero canvas{margin:0 auto}.hero-acct{margin-left:auto;margin-right:auto}}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin:14px 0}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rad,12px);padding:14px;box-shadow:var(--shadow,0 1px 2px rgba(0,0,0,.30),0 4px 16px rgba(0,0,0,.42))}
  .card h3{margin:0 0 8px;font-size:.92rem;color:var(--mut);font-weight:600}
  .big{font-size:1.6rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .pill{display:inline-block;font-size:.72rem;padding:2px 8px;border-radius:20px;margin:2px 3px 2px 0;background:#0d1117;border:1px solid var(--border);color:var(--mut)}
  .facts{list-style:none;padding:0;margin:0;font-size:.88rem}
  .facts li{padding:4px 0;border-bottom:1px solid var(--border)}.facts li:last-child{border:0}
  .tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:16px 0}
  .tool{display:block;text-decoration:none;background:var(--panel);border:1px solid var(--border);border-radius:var(--rad,12px);padding:16px;color:var(--fg);transition:border-color .14s,transform .14s,box-shadow .14s}
  .tool:hover{border-color:var(--acc-line,rgba(163,113,247,.45));transform:translateY(-2px);box-shadow:0 2px 4px rgba(0,0,0,.30),0 8px 24px rgba(0,0,0,.46)}
  .tool:focus-visible{box-shadow:var(--ring,0 0 0 3px rgba(163,113,247,.40))}
  .tool .ico{font-size:1.5rem}.tool .nm{font-weight:700;margin-top:4px}.tool .ds{color:var(--mut);font-size:.78rem;margin-top:2px}
  /* ── tool-grid group sub-headers (subtler than .section-hd) ── */
  .grp-hd{font-size:.7rem;font-weight:700;letter-spacing:.5px;color:var(--mut);opacity:.7;margin:16px 0 7px;text-transform:uppercase}
  .grp-hd:first-child{margin-top:4px}
  /* ── featured card: the scorecard / 战绩墙 (the moat) — highlighted ── */
  .tool-feat{border-color:var(--acc);background:linear-gradient(135deg,rgba(163,113,247,.14),rgba(88,166,255,.05))}
  .tool-feat .nm{color:var(--acc-strong,#b483ff)}
  .mut{color:var(--mut)}.note{color:var(--amb);font-size:.8rem}
  footer{color:var(--mut);font-size:.78rem;margin-top:20px;border-top:1px solid var(--border);padding-top:10px}
  /* ── baseline: quiet strip, not competing with hero ── */
  .baseline{background:transparent;border:none;border-top:1px solid rgba(88,166,255,.15);padding:6px 0;font-size:.8rem;margin:0 0 16px;color:rgba(207,227,255,.55)}
  /* ── section headings ── */
  .section-hd{font-size:.72rem;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--mut);margin:20px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border);opacity:.75}
  /* ── lighter card weight inside glance grid ── */
  .cards .card{border-color:rgba(48,54,61,.65)}
  .cards .card h3{font-size:.82rem;color:rgba(157,167,179,.75)}
  @media(max-width:560px){body{padding:12px}h1{font-size:1.32rem}.cards,.tools{gap:9px}.cards{grid-template-columns:1fr}.tools{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}}

  /* ── Onboarding overlay (ob- namespace) ── */
  #ob-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px}
  #ob-backdrop.ob-hidden{display:none}
  #ob-card{background:var(--panel);border:1px solid var(--acc);border-radius:16px;max-width:480px;width:100%;padding:24px 22px 20px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  #ob-title{font-size:1.12rem;font-weight:800;margin:0 0 16px;color:var(--acc)}
  .ob-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
  .ob-num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:rgba(163,113,247,.2);border:1px solid var(--acc);color:var(--acc);font-weight:700;font-size:.82rem;display:flex;align-items:center;justify-content:center}
  .ob-text{font-size:.88rem;line-height:1.6;color:var(--fg)}
  .ob-actions{display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap}
  #ob-dismiss{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:.9rem;font-weight:700;cursor:pointer}
  #ob-dismiss:hover{opacity:.88}
  #ob-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--mut);font-size:1.2rem;cursor:pointer;line-height:1;padding:2px 6px}
  #ob-close:hover{color:var(--fg)}
  /* persistent guide button in header */
  #ob-guide-btn{background:none;border:1px solid var(--border);border-radius:50%;width:28px;height:28px;color:var(--mut);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.14s;align-self:center}
  #ob-guide-btn:hover{border-color:var(--acc);color:var(--acc)}
  @media(max-width:480px){#ob-card{padding:18px 14px 16px}#ob-title{font-size:1rem}.ob-text{font-size:.84rem}}
</style>
</head>
<body>
<header>
  <h1><span class="hex">⬡</span> Valpha Lab</h1>
  <span class="tag" data-i18n="tag"></span>
  <button id="ob-guide-btn" aria-label="新手指南 / Guide" title="新手指南 / Guide">?</button>
  <button id="lang" aria-label="切换语言 / switch language"></button>
</header>
<div id="todayline" style="font-size:.8rem;color:var(--mut);margin:3px 0 0;font-variant-numeric:tabular-nums"></div>

<!-- Onboarding overlay -->
<div id="ob-backdrop" class="ob-hidden" role="dialog" aria-modal="true" aria-labelledby="ob-title">
  <div id="ob-card">
    <button id="ob-close" aria-label="关闭 / Close">&#x2715;</button>
    <div id="ob-title"></div>
    <div class="ob-step"><div class="ob-num">①</div><div class="ob-text" id="ob-s1"></div></div>
    <div class="ob-step"><div class="ob-num">②</div><div class="ob-text" id="ob-s2"></div></div>
    <div class="ob-step"><div class="ob-num">③</div><div class="ob-text" id="ob-s3"></div></div>
    <div class="ob-actions">
      <button id="ob-dismiss"></button>
    </div>
  </div>
</div>

<!-- HERO: primary content — the one thing a first-time visitor should see first -->
<div class="hero" id="hero">
  <div><canvas id="gauge" width="240" height="140" aria-label="今日倾向仪表"></canvas></div>
  <div>
    <div class="hero-lbl mut" data-i18n="heroLbl"></div>
    <div class="hero-stance" id="h-stance">—</div>
    <div class="hero-call" id="h-call"></div>
    <div class="hero-read" id="h-read"></div>
    <div class="hero-tilt" id="h-tilt"></div>
    <!-- D2 微图表:倾向分30日走势(composite_read.json history·纯历史读数·中性色不造信号感) -->
    <div style="margin-top:7px"><div class="mut" id="h-trendlbl" style="font-size:.68rem;margin-bottom:2px"></div><div id="h-trend" style="display:inline-block;max-width:100%"></div></div>
    <a class="hero-acct" href="scorecard.html" id="h-acct"></a>
  </div>
</div>

<!-- quiet supporting info: freshness + baseline — de-emphasised, below hero -->
<div id="freshness" style="font-size:.74rem;color:var(--mut);margin:4px 0 2px;opacity:.85"></div>
<div class="baseline" data-i18n="baseline"></div>

<!-- 📊 At-a-glance cards: secondary content, grouped under a clear label -->
<div class="section-hd" data-i18n="sec_glance"></div>
<div class="cards">
  <div class="card"><h3 data-i18n="c_sig"></h3>
    <div class="big" id="sig">—</div>
    <div class="note" id="signote"></div></div>
  <div class="card"><h3 data-i18n="c_env"></h3>
    <div id="env" style="font-size:.9rem">—</div>
    <div class="mut" id="envas" style="font-size:.76rem;margin-top:6px"></div></div>
  <div class="card"><h3 data-i18n="c_dig"></h3>
    <ul class="facts" id="dig"></ul></div>
  <div class="card"><h3 data-i18n="c_paper"></h3>
    <div id="paper" style="font-size:.92rem"></div>
    <div class="note" id="papernote" style="margin-top:6px"></div></div>
  <div class="card"><h3 data-i18n="c_heat"></h3>
    <div id="heat" style="font-size:.95rem">—</div>
    <div class="note" id="heatnote" style="margin-top:6px"></div></div>
  <div class="card"><h3 data-i18n="c_bottom"></h3>
    <div id="bottom" style="font-size:.95rem;line-height:1.65">—</div></div>
</div>

<!-- 🧰 Tools grid (grouped into labeled categories) -->
<div class="section-hd" data-i18n="sec_tools"></div>
<div id="tools"></div>

<!-- 📉 极端下跌反弹信号 card（ovr- namespace · 公开战绩 · 诚实计分）-->
<div class="card" id="ovr-card" style="margin:14px 0;display:none">
  <h3 style="color:var(--mut);font-size:.92rem;font-weight:600;margin:0 0 8px" data-i18n="c_ovr"></h3>
  <div id="ovr-main" style="font-size:.92rem;line-height:1.65"></div>
  <div id="ovr-score" style="font-size:.82rem;color:var(--mut);margin-top:6px"></div>
  <div id="ovr-caveat" style="font-size:.75rem;color:var(--amb);margin-top:6px;line-height:1.4"></div>
</div>

<!-- 本周回顾 card（llm_weekly — grounded · 诚实 · 每周 append 计分）-->
<div class="card" id="weekly-card" style="margin:14px 0;display:none">
  <h3 id="weekly-title" style="color:var(--mut);font-size:.92rem;font-weight:600;margin:0 0 8px"></h3>
  <div id="weekly-text" style="font-size:.88rem;line-height:1.65;color:var(--fg)"></div>
  <div id="weekly-meta" style="font-size:.76rem;color:var(--mut);margin-top:8px"></div>
  <div style="font-size:.75rem;color:var(--amb);margin-top:6px;line-height:1.4" id="weekly-caveat"></div>
</div>

<!-- 本月回顾 card（llm_monthly — grounded · 诚实 · 月末生成 · 月级 append 计分）-->
<div class="card" id="monthly-card" style="margin:14px 0;display:none">
  <h3 id="monthly-title" style="color:var(--mut);font-size:.92rem;font-weight:600;margin:0 0 8px"></h3>
  <div id="monthly-text" style="font-size:.88rem;line-height:1.65;color:var(--fg)"></div>
  <div id="monthly-meta" style="font-size:.76rem;color:var(--mut);margin-top:8px"></div>
  <div style="font-size:.75rem;color:var(--amb);margin-top:6px;line-height:1.4" id="monthly-caveat"></div>
</div>

<footer data-i18n="foot"></footer>

<script src="vp_spark.js"></script>

function drawGauge(score){
  const cv=$("gauge"); if(!cv) return;
  const ctx=cv.getContext("2d"),dpr=window.devicePixelRatio||1,W=cv.clientWidth||240,H=140;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H-22,R=Math.min(W/2-16,H-34),A=s=>Math.PI+(s+1)/2*Math.PI;
  const zone=(s0,s1,c)=>{ctx.beginPath();ctx.lineWidth=14;ctx.strokeStyle=c;ctx.arc(cx,cy,R,A(s0),A(s1));ctx.stroke();};
  zone(-1,-0.13,"#f85149");zone(-0.13,0.13,"#6e7681");zone(0.13,1,"#3fb950");
  if(score!=null){const th=A(Math.max(-1,Math.min(1,score)));
    ctx.beginPath();ctx.lineWidth=3;ctx.strokeStyle="#e6edf3";ctx.moveTo(cx,cy);ctx.lineTo(cx+(R-4)*Math.cos(th),cy+(R-4)*Math.sin(th));ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,5,0,6.29);ctx.fillStyle="#e6edf3";ctx.fill();}

function _daysAgo(iso){ const t=Date.parse(iso); return isNaN(t)?null:Math.floor((Date.now()-t)/86400000); }
function _curMonthStr(){ const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0"); }
// 日读时间戳:总显示"数据截至"(透明·用户长期关注实时性),>4天=错过多个交易日(容长周末)才橙色告警。
function _readStamp(gen){
  if(!gen) return "";
  const ago=_daysAgo(gen);
  const lbl=LANG==="en"?`📅 as of ${esc(gen)}`:`📅 数据截至 ${esc(gen)}`;
  const warn=(ago!=null&&ago>4)?(LANG==="en"
    ?` · <b style="color:#f0883e">⚠ ${ago}d ago (daily should update each trading day — possibly stuck)</b>`
    :` · <b style="color:#f0883e">⚠ ${ago}天前(日读应每交易日更新·疑似卡住)</b>`):"";
  return `<div class="mut" style="font-size:.72rem;margin-top:.35rem">${lbl}${warn}</div>`;
}

// ── 本周回顾 card（llm_weekly — grounded · 诚实 · 每周 append 计分）────────
let WEEKLY=null;
function renderWeekly(){
  const card=$("weekly-card");
  if(!card) return;
  if(!WEEKLY||!WEEKLY.text){card.style.display="none";return;}
  card.style.display="";
  const title=$("weekly-title"),txt=$("weekly-text"),meta=$("weekly-meta"),cav=$("weekly-caveat");
  const wlabel=esc(WEEKLY.week_label||WEEKLY.week_of||"");
  if(title) title.textContent=LANG==="en"
    ?`📅 Weekly review · ${wlabel||"this week"}`
    :`📅 本周回顾 · ${wlabel}`;
  if(txt) txt.textContent=WEEKLY.text;  // LLM text — 已 esc 在服务端；不二次转义避免破坏中文
  const nd=WEEKLY.n_days!=null?`${WEEKLY.n_days}天数据`:"";
  const cov=WEEKLY.coverage?`（覆盖：${esc(WEEKLY.coverage)}）`:"";
  const wAgo=_daysAgo(WEEKLY.generated);
  const wStale=wAgo!=null && wAgo>7;   // 周报每周更新(正常≤7天:周五生成、下周五刷新);>7天=超一周=错过周期=疑似卡住
  let wMeta=LANG==="en"
    ?`Generated ${esc(WEEKLY.generated||"")} · ${nd}${cov}`
    :`生成时间 ${esc(WEEKLY.generated||"")} · ${nd}${cov}`;
  if(wStale) wMeta+=LANG==="en"
    ?` · <b style="color:#f0883e">⚠ ${wAgo}d ago · weekly should update weekly (possibly stuck)</b>`
    :` · <b style="color:#f0883e">⚠ ${wAgo} 天前 · 周报应每周更新(疑似卡住)</b>`;
  if(meta) meta.innerHTML=wMeta;   // generated/nd/cov 均 esc 或受控数值，无注入
  if(cav) cav.textContent=LANG==="en"
    ?"LLM plain-language summary grounded in real computed data. Not a prediction. We can be wrong. Past ≠ future. Appended to public weekly log."
    :(WEEKLY.caveat||"LLM 据本周真实算出因子生成；非预测、非荐股、会错，过去≠未来。已追加到公开周报计分。");
}

// ── 本月回顾 card（llm_monthly — grounded · 诚实 · 月末生成 · 月级 append 计分）────────
let MONTHLY=null;
function renderMonthly(){
  const card=$("monthly-card");
  if(!card) return;
  if(!MONTHLY||!MONTHLY.text){card.style.display="none";return;}
  card.style.display="";
  const title=$("monthly-title"),txt=$("monthly-text"),meta=$("monthly-meta"),cav=$("monthly-caveat");
  const mlabel=esc(MONTHLY.month_label||MONTHLY.month||"");
  const mPrior=MONTHLY.month && MONTHLY.month<_curMonthStr();   // 报告月早于当前月=上月报告(月末生成的正常态)
  if(title) title.textContent=LANG==="en"
    ?`🗓️ ${mPrior?"Last month's review":"Monthly review"} · ${mlabel||"this month"}`
    :`🗓️ ${mPrior?"上月回顾":"本月回顾"} · ${mlabel}`;
  if(txt) txt.textContent=MONTHLY.text;  // LLM text — 已 esc 在服务端；不二次转义避免破坏中文
  const nd=MONTHLY.n_days!=null?`${MONTHLY.n_days}天数据`:"";
  let mMeta=LANG==="en"
    ?`Generated ${esc(MONTHLY.generated||"")} · ${nd}`
    :`生成时间 ${esc(MONTHLY.generated||"")} · ${nd}`;
  if(mPrior) mMeta+=LANG==="en"
    ?` · <span style="color:var(--muted)">monthly report is generated at month-end; ${_curMonthStr()} updates then</span>`
    :` · <span style="color:var(--muted)">月报月末生成，${_curMonthStr()} 报告将于月末更新</span>`;
  if(meta) meta.innerHTML=mMeta;   // generated/nd 均 esc 或受控，无注入
  if(cav) cav.textContent=LANG==="en"
    ?"LLM plain-language monthly summary grounded in real computed data. Not a prediction. We can be wrong. Past ≠ future. Appended to public monthly log."
    :(MONTHLY.caveat||"LLM 据本月真实算出因子生成；非预测、非荐股、会错，过去≠未来。已追加到公开月报计分。");
}
(async()=>{
  paint();
  [SIG,REG,DIG,PAPER,V150,CR,OUT,LLM,WEEKLY,OVR,MONTHLY]=await Promise.all([get("signals.json"),get("market_regime.json"),get("digest.json"),get("paper.json"),get("valpha150.json"),get("composite_read.json"),get("outlook.json"),get("llm_read.json"),get("llm_weekly.json"),get("overreaction_signal.json"),get("llm_monthly.json")]);
  paint();
  renderWeekly();
  renderMonthly();
  renderOVR();
  // Error state: if all critical data sources failed, show a friendly inline notice
  if(!SIG&&!REG&&!DIG&&!CR&&!V150){
    const msg=LANG==="en"?"Failed to load — refresh later":"加载失败，请稍后刷新";
    $("sig").textContent=msg;$("env").textContent=msg;
  }
})();
