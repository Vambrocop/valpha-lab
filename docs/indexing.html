   zh_risk:"最宽分散，小盘波动略大",en_risk:"Widest diversification; small-cap segment adds some extra volatility"}
];

/* ——— 崩盘记录 ——— */
const CRASHES=[
  {yr:"2000–02",name_zh:"科网泡沫",name_en:"Dot-com bust",sp_drop:"S&P −49%",nd_drop:"纳指 −83%",nd_en:"Nasdaq −83%",rec_zh:"S&P 约 7 年恢复",rec_en:"S&P ~7 yr recovery"},
  {yr:"2008–09",name_zh:"金融危机",name_en:"Global financial crisis",sp_drop:"S&P −57%",nd_drop:"纳指 −55%",nd_en:"Nasdaq −55%",rec_zh:"S&P 约 5 年恢复",rec_en:"S&P ~5 yr recovery"},
  {yr:"2020",name_zh:"疫情冲击",name_en:"COVID crash",sp_drop:"S&P −34%",nd_drop:"纳指 −32%",nd_en:"Nasdaq −32%",rec_zh:"约 5 个月快速恢复（历史罕见）",rec_en:"~5 months — unusually fast recovery"},
  {yr:"2022",name_zh:"加息周期",name_en:"Rate-hike cycle",sp_drop:"S&P −25%",nd_drop:"纳指 −35%",nd_en:"Nasdaq −35%",rec_zh:"约 2 年恢复",rec_en:"~2 yr recovery"}
];

const $=id=>document.getElementById(id);
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;

function applyStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));
  $("lang").textContent=LANG==="zh"?"EN":"中";
  document.documentElement.lang=LANG==="zh"?"zh-CN":"en";
}

function renderWhy(){
  const CARDS=["w1","w2","w3","w4"];
  $("why-grid").innerHTML=CARDS.map(c=>`<div class="card">
    <h2>${t(c+"t")}</h2>
    <p class="sub">${t(c+"s")}</p>
    <p>${t(c+"h")}</p>
  </div>`).join("");
}

function renderIdxTable(){
  const zh=LANG==="zh";
  const hdr=zh
    ? `<tr><th>指数</th><th>追踪什么</th><th>美国代码</th><th>澳洲 ASX 版</th><th>费率量级</th><th>集中度特征</th></tr>`
    : `<tr><th>Index</th><th>Tracks</th><th>US tickers</th><th>ASX version</th><th>Fee range</th><th>Concentration</th></tr>`;
  const rows=IDX.map(r=>`<tr>
    <td><b>${zh?r.zh_name:r.en_name}</b></td>
    <td style="font-size:.82rem">${zh?r.zh_track:r.en_track}</td>
    <td><b>${zh?r.zh_us:r.en_us}</b></td>
    <td>${zh?r.zh_asx:r.en_asx}</td>
    <td style="font-size:.8rem;color:var(--mut)">${zh?r.zh_fee:r.en_fee}</td>
    <td style="font-size:.82rem">${zh?r.zh_conc:r.en_conc}</td>
  </tr>`).join("");
  $("idx-table").innerHTML=`<table class="compare">${hdr}${rows}</table>`;
}

function renderDCA(){
  const zh=LANG==="zh";
  const rows=[
    [t("dca_r1_d"),t("dca_r1_a"),t("dca_r1_b")],
    [t("dca_r2_d"),t("dca_r2_a"),t("dca_r2_b")],
    [t("dca_r3_d"),t("dca_r3_a"),t("dca_r3_b")],
    [t("dca_r4_d"),t("dca_r4_a"),t("dca_r4_b")]
  ];
  $("dca-table").innerHTML=`<table class="compare">
    <tr><th>${t("dca_h1")}</th><th>✅ ${t("dca_h2")}</th><th>📅 ${t("dca_h3")}</th></tr>
    ${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}
  </table>`;
}

function renderCrash(){
  $("crash-list").innerHTML=CRASHES.map(c=>`<div class="crash-item">
    <div class="yr">${esc(c.yr)}</div>
    <div class="nm">${LANG==="zh"?esc(c.name_zh):esc(c.name_en)}</div>
    <div class="drop">${esc(c.sp_drop)}</div>
    <div class="drop" style="font-size:.88rem">${LANG==="zh"?esc(c.nd_drop):esc(c.nd_en)}</div>
    <div class="rec">${LANG==="zh"?esc(c.rec_zh):esc(c.rec_en)}</div>
  </div>`).join("");
}

function renderAU(){
  const steps=["au1","au2","au3","au4","au5","au6"];
  $("au-steps").innerHTML=steps.map((k,i)=>`<div class="step">
    <div class="num">${i+1}</div>
    <div class="body">${t(k)}</div>
  </div>`).join("");
}

function redraw(){applyStatic();renderWhy();renderIdxTable();renderDCA();renderCrash();renderAU();}

$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG);}catch(e){}redraw();};

/* ——— 可选：拉标普/纳指参考点位 ——— */
(async()=>{
  redraw();
  try{
    const r=await fetch("https://vambrocop.github.io/valpha-lab/signals.json",{cache:"no-store"});
    if(!r.ok)throw new Error("not ok");
    const d=await r.json();
    /* signals.json 中找 sp500_close 和 nasdaq_close 字段；键名以实际为准 */
    const sp=d.sp500_close||d.spx_close||d.latest_sp500||null;
    const nd=d.nasdaq_close||d.ndx_close||d.latest_nasdaq||null;
    if(sp||nd){
      const fmt=v=>v?Number(v).toLocaleString():"—";
      const tpl=t("livebar_ok").replace("{sp}",fmt(sp)).replace("{nd}",fmt(nd));
      $("live-bar").innerHTML=tpl;
    } else {
      $("live-bar").innerHTML=t("livebar_err");
    }
  }catch(e){
    $("live-bar").innerHTML=t("livebar_err");
  }
})();
</script>
<script src="vp_gloss.js" data-autoscan></script>
</body>
</html>
