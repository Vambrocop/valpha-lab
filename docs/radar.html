<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valpha Radar</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#8b949e;--acc:#a371f7}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.55 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:16px;max-width:1040px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .note{background:rgba(163,113,247,.1);border:1px solid var(--acc);border-radius:8px;padding:9px 12px;font-size:.84rem;margin:10px 0;color:#d2c2f5}
  .bar{margin:10px 0;font-size:.85rem;color:var(--mut)}
  .bar button{background:transparent;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;margin:2px;cursor:pointer;font-size:.82rem}
  .bar button.on{background:var(--acc);color:#fff;border-color:var(--acc)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:10px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
  .card h3{margin:2px 0;font-size:.98rem}
  .card .sub{font-size:.74rem;color:var(--mut)}
  .card .tag{font-size:.66rem;padding:1px 5px;border-radius:4px}
  .hot{background:rgba(248,81,73,.18);color:#ff9b94}
  .calm{background:rgba(63,185,80,.16);color:#7ee787}
  .mut{color:var(--mut);font-size:.8rem;margin-top:14px;border-top:1px solid var(--border);padding-top:8px}
</style>
</head>
<body>
<button id="lang"></button>
<h1 data-i18n="title"></h1>
<div class="note" data-i18n="note"></div>
<div class="bar"><span data-i18n="sortby"></span>
  <button data-k="" class="on" data-i18n="d_def"></button>
  <button data-k="动量" data-i18n="d_mom"></button>
  <button data-k="稳健" data-i18n="d_sta"></button>
  <button data-k="性价比" data-i18n="d_val"></button>
  <button data-k="反弹空间" data-i18n="d_reb"></button>
  <span id="src" style="margin-left:10px"></span>
</div>
<div class="grid" id="grid"></div>
<div class="mut" data-i18n="foot"></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/stocks.json";
const DIMS=["动量","趋势","稳健","性价比","独立性","反弹空间"];
const DIM_EN={"动量":"Mom","趋势":"Trend","稳健":"Stab","性价比":"Value","独立性":"Indep","反弹空间":"Rebound"};
const I18N={
  title:{zh:"📡 Valpha 雷达图 · 原型",en:"📡 Valpha Radar · prototype"},
  note:{zh:"<b>描述性体检，非预测、非买卖信号。</b>6 维各 0–100：<b>动量</b>(近1年涨)、<b>趋势</b>(均线排列)、<b>稳健</b>(低波动=高分)、<b>性价比</b>(风险调整收益)、<b>独立性</b>(与纳指低相关=高分)、<b>反弹空间</b>(越靠一年低位越高)。一眼看「性格」，而非「该不该买」。",
        en:"<b>A descriptive checkup — not a forecast or a buy signal.</b> 6 axes, each 0–100: <b>Mom</b>(1Y gain), <b>Trend</b>(MA stack), <b>Stab</b>(low vol=high), <b>Value</b>(risk-adj return), <b>Indep</b>(low corr to Nasdaq=high), <b>Rebound</b>(near 1Y low=high). See the 'character', not 'should I buy'."},
  sortby:{zh:"排序：",en:"Sort: "},d_def:{zh:"默认",en:"Default"},d_mom:{zh:"动量",en:"Momentum"},d_sta:{zh:"稳健",en:"Stability"},d_val:{zh:"性价比",en:"Value"},d_reb:{zh:"反弹空间",en:"Rebound"},
  foot:{zh:"🔥追涨风险=动量≥80且稳健≤30；🏰稳健=稳健≥80。数据：实时 stocks.json，过去≠未来。",
        en:"🔥chase-risk = Mom≥80 & Stab≤30; 🏰steady = Stab≥80. Data: live stocks.json — past ≠ future."},
  live:{zh:"实时 ✓",en:"Live ✓"},err:{zh:"拉不到实时数据——确认 Pages 已部署。",en:"Can't load live data — check Pages deployment."}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG=localStorage.getItem("valpha_lang")||"zh";
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
let STOCKS={},sortKey="";

function radarSVG(radar,size){
  const cx=size/2,cy=size/2,R=size*0.34,ang=i=>-Math.PI/2+i*Math.PI/3;let g="";
  [0.25,0.5,0.75,1].forEach(f=>{const ring=DIMS.map((_,i)=>`${(cx+R*f*Math.cos(ang(i))).toFixed(1)},${(cy+R*f*Math.sin(ang(i))).toFixed(1)}`).join(" ");g+=`<polygon points="${ring}" fill="none" stroke="#30363d" stroke-width="0.5"/>`;});
  DIMS.forEach((d,i)=>{g+=`<line x1="${cx}" y1="${cy}" x2="${(cx+R*Math.cos(ang(i))).toFixed(1)}" y2="${(cy+R*Math.sin(ang(i))).toFixed(1)}" stroke="#30363d" stroke-width="0.5"/>`;});
  const pts=DIMS.map((d,i)=>{const r=(radar[d]||0)/100*R;return `${(cx+r*Math.cos(ang(i))).toFixed(1)},${(cy+r*Math.sin(ang(i))).toFixed(1)}`;}).join(" ");
  g+=`<polygon points="${pts}" fill="rgba(163,113,247,.32)" stroke="#a371f7" stroke-width="1.4"/>`;
  DIMS.forEach((d,i)=>{const lx=cx+(R+14)*Math.cos(ang(i)),ly=cy+(R+14)*Math.sin(ang(i)),lbl=LANG==="en"?DIM_EN[d]:d;
    g+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="8" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">${lbl}</text>`;});
  return `<svg viewBox="0 0 ${size} ${size}" width="100%" style="max-width:172px">${g}</svg>`;
}
function render(){
  let items=Object.entries(STOCKS);
  if(sortKey)items.sort((a,b)=>(b[1].radar[sortKey]||0)-(a[1].radar[sortKey]||0));
  $("grid").innerHTML=items.map(([s,d])=>{
    const r=d.radar||{},hot=(r["动量"]||0)>=80&&(r["稳健"]||50)<=30,calm=(r["稳健"]||0)>=80,
      nm=LANG==="en"?s:`${esc(d.label)} <span class="sub">${s}</span>`,
      vl=LANG==="en"?"vol":"波动",yl=LANG==="en"?"1Y":"1年";
    return `<div class="card"><h3>${nm}</h3>${radarSVG(r,170)}
      <div class="sub">${yl} ${d.chg1y>=0?'+':''}${(d.chg1y??0).toFixed(0)}% · ${vl} ${(d.vol??0).toFixed(0)}%</div>
      <div>${hot?'<span class="tag hot">🔥</span>':''}${calm?'<span class="tag calm">🏰</span>':''}</div></div>`;
  }).join("");
}
function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";localStorage.setItem("valpha_lang",LANG);applyStatic();render();$("src").textContent=Object.keys(STOCKS).length?`${t("live")}（${Object.keys(STOCKS).length}）`:"";};
document.querySelectorAll(".bar button[data-k]").forEach(b=>b.onclick=()=>{sortKey=b.dataset.k;document.querySelectorAll(".bar button[data-k]").forEach(x=>x.classList.toggle("on",x===b));render();});
async function load(){
  applyStatic();
  try{
    const r=await fetch(LIVE,{cache:"no-store"});if(!r.ok)throw 0;
    const j=await r.json();
    for(const[s,o]of Object.entries(j.stocks||{})){const st=o.stats||{};STOCKS[s]={label:o.label||s,chg1y:st.chg_1y,vol:st.vol20_ann,radar:o.radar||{}};}
    $("src").textContent=`${t("live")}（${Object.keys(STOCKS).length}）`;render();
  }catch(e){$("src").textContent=t("err");}
}
load();
</script>
</body>
</html>
