<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自生长 · Self-growing</title>
<link rel="stylesheet" href="vp.css">
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--acc:#a371f7;--amber:#e3a008}
  *{box-sizing:border-box}
  :focus-visible{outline:2px solid var(--acc);outline-offset:2px}
  [role=button]{cursor:pointer}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .skel{height:42px;border-radius:10px;margin:0;background:linear-gradient(90deg,var(--panel) 25%,var(--border) 37%,var(--panel) 63%);background-size:400% 100%;animation:sk 1.4s ease infinite}
  @keyframes sk{0%{background-position:100% 0}100%{background-position:-100% 0}}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:1080px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .lead{color:var(--mut);font-size:.9rem;margin:8px 0 4px}
  .note{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:9px 12px;font-size:.84rem;margin:10px 0;color:#ffb3ad}
  .hero{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;margin:14px 0}
  .hero .b{flex:1 1 150px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .hero .big{font-size:2.2rem;font-weight:800;line-height:1.1}
  .hero .l{color:var(--mut);font-size:.78rem;margin-top:4px}
  .arrow{display:flex;align-items:center;font-size:1.5rem;color:var(--mut)}
  h2{font-size:1.05rem;margin:22px 0 4px}
  .sub{color:var(--mut);font-size:.78rem;margin:0 0 8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 13px;border-left:3px solid var(--grn)}
  .card .lab{font-weight:700;font-size:.92rem}
  .card .meta{font-size:.74rem;color:var(--mut);margin-top:3px}
  .card.decayed{border-left-color:var(--amber)}
  .dbadge{font-size:.72rem;background:rgba(227,160,8,.16);color:var(--amber);border:1px solid var(--amber);border-radius:5px;padding:1px 5px;margin-left:5px}
  .grave{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .gchip{font-size:.76rem;color:var(--mut);background:#0d1117;border:1px dashed var(--border);border-radius:6px;padding:3px 8px;opacity:.8}
  .fam{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .fbar{font-size:.78rem;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:5px 9px}
  .fbar b{color:var(--grn)}
  .verdict{background:rgba(163,113,247,.08);border:1px solid var(--acc);border-radius:8px;padding:10px 12px;font-size:.86rem;margin:14px 0;color:#d2c2f5}
  .headline{font-size:1.05rem;line-height:1.7;margin:6px 0 12px;color:var(--fg)}
  .headline b{color:var(--grn)}
  .headline .amb{color:var(--amber)}
  .headline .gone{color:var(--mut)}
  .honest{background:var(--surface-2,#1b222c);border:1px solid var(--border);border-left:3px solid var(--acc);border-radius:8px;padding:9px 12px;font-size:.84rem;color:var(--mut);margin:0 0 4px}
  .pcard .plain{font-weight:700;font-size:.96rem;color:var(--fg)}
  .pcard .why{font-size:.82rem;color:var(--mut);margin-top:4px;line-height:1.5}
  .pcard .raw{font-size:.72rem;color:var(--mut);margin-top:6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;opacity:.7}
  .pcard .flag{color:var(--amber)}
  .mut{color:var(--mut);font-size:.78rem;margin-top:18px;border-top:1px solid var(--border);padding-top:8px}
  #src{color:var(--mut);font-size:.78rem}
  .kbstrip{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 12px}
  .kbcell{flex:1 1 88px;background:var(--surface-2,#1b222c);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
  .kbv{font-size:1.5rem;font-weight:800;line-height:1.1}
  .kbl{font-size:.72rem;color:var(--mut);margin-top:2px}
  .pcard .dbadge{font-size:.68rem;font-weight:700;border-radius:6px;padding:1px 6px;margin-left:4px;vertical-align:middle}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.15rem}.hero .big{font-size:1.7rem}.kbv{font-size:1.25rem}}
</style>
</head>

<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="lead" data-i18n="lead"></div>

<!-- ① 大白话结果（领头）：先说我们测了几条、几条扛住了 -->
<h2 data-i18n="hResults" style="margin-top:16px"></h2>
<p class="headline" id="headline"></p>
<div class="honest" data-i18n="honest"></div>

<!-- ② 扛住检验的规律（大白话名 + 一句话） -->
<h2 data-i18n="hKept"></h2>
<p class="sub" data-i18n="sKept"></p>
<div class="grid" id="survivors"></div>

<!-- ②.5 样本外确认 · 知识库生长（门4 OOS：扛住检验的规律进入第二关，只认注册日之后的新数据） -->
<h2 data-i18n="hOOS" style="margin-top:22px"></h2>
<p class="sub" data-i18n="sOOS"></p>
<div class="honest" data-i18n="oosHonest"></div>
<div id="kbStrip" class="kbstrip"></div>
<div class="grid" id="kbQueue"></div>
<details class="vp-more" id="kbHistWrap" style="margin-top:10px;display:none"><summary data-i18n="hKbHist"></summary><div id="kbHist" style="margin-top:8px"></div></details>

<!-- ③ 曾灵但现在淡了（短列表） -->
<h2 data-i18n="hFadedList"></h2>
<p class="sub" data-i18n="sFadedList"></p>
<div class="grid" id="fadedList"></div>

<div class="note" data-i18n="note" style="margin-top:18px"></div>

<!-- ④ 专业细节（折叠）：FDR / p 值 / 三态 / 分母 / 校验全在这里，没删 -->
<details class="vp-more" style="margin-top:18px"><summary data-i18n="more_expert"></summary>
  <div style="margin-top:10px">
    <div class="hero" id="hero"></div>
    <div class="verdict" id="verdict"></div>

    <h3 data-i18n="hReg" style="font-size:1rem;margin:20px 0 4px"></h3>
    <p class="sub" data-i18n="sReg"></p>
    <div class="grid" id="registry"></div>

    <details class="vp-more"><summary data-i18n="more_fam"></summary>
      <div class="fam" id="families" style="margin-top:8px"></div>
    </details>

    <h3 data-i18n="hGrave" style="font-size:1rem;margin:20px 0 4px"></h3>
    <p class="sub" data-i18n="sGrave"></p>
    <div class="grave" id="graveyard"></div>

    <h3 data-i18n="hAuto" style="font-size:1rem;margin:20px 0 4px"></h3>
    <p class="sub" data-i18n="sAuto"></p>
    <div id="autoSummary" class="sub"></div>
    <div class="grave" id="autodisc"></div>

    <h3 data-i18n="hFlicker" style="font-size:1rem;margin:22px 0 4px"></h3>
    <p class="sub" data-i18n="sFlicker"></p>
    <div id="flkStrip" class="kbstrip"></div>
    <div id="flkList"></div>
    <div class="honest" data-i18n="flkCaveat" style="margin-top:8px"></div>
  </div>
</details>

<div id="src"></div>
<div class="mut" data-i18n="foot"></div>
<div id="modal" role="dialog" aria-modal="true" aria-label="详情 / detail" onclick="if(event.target===this)closeD()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;align-items:center;justify-content:center;padding:16px"><div id="mbody" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:460px;width:100%"></div></div>

  sOOS:{zh:"扛住全样本检验只是第一关。第二关是<b>样本外确认</b>：每条规律注册当天盖一个不可改的日期戳（锚点），引擎只拿锚点<b>之后</b>的新数据复算——锚点写死，谁也没法事后挪靶。锚后仍成立 → 自动进知识库；翻盘 → 自动降级。<b>这才是真·自生长：知识随证据前向累积而长/缩。</b>",

// 注：凡不在 PLAIN_MAP、又非反弹族的代号（如 overnight_mom_pos/dxy_rising/vix_backwardation 等），
// plainName() 一律回退到保留原代号 + ⚠️，绝不替它们编含义。
// 反弹族 pN_hM_index → 「指数大跌第N百分位后持有M天反弹」
function rebPlain(key){
  const m=/^p(\d+)_h(\d+)_(\w+)$/.exec(key||"");
  if(!m)return null;
  const idx=IDX_NAME[m[3]]?IDX_NAME[m[3]][LANG]:m[3];
  return LANG==="zh"
    ? `${idx}大跌（最猛 ${m[1]}% 那档）后持有 ${m[2]} 天反弹`
    : `${idx} bounce: hold ${m[2]} day(s) after a big drop (worst ${m[1]}% bucket)`;
}
// 机器逐月扫 monthof_N_index → 「机器逐月扫·N月·指数」（含义明确：该月 vs 其余是否异常）
const MONTHS_ZH=["一","二","三","四","五","六","七","八","九","十","十一","十二"];
function monthofPlain(key){
  const m=/^monthof_(\d+)_(\w+)$/.exec(key||"");
  if(!m)return null;
  const idx=IDX_NAME[m[2]]?IDX_NAME[m[2]][LANG]:m[2];const mo=+m[1];
  return LANG==="zh"?`机器逐月扫·${MONTHS_ZH[mo-1]||mo}月·${idx}（该月是否异常）`
                    :`Machine month-sweep · month ${mo} · ${idx} (is this month anomalous)`;
}
// 返回 {name, unsure} —— name=大白话；unsure=true 表示拿不准、已保留原代号
function plainName(c){
  const key=c.key||"";
  if(PLAIN_MAP[key])return {name:PLAIN_MAP[key][LANG],unsure:false};
  if(c.family==="rebound"){const r=rebPlain(key);if(r)return {name:r,unsure:false};}
  const mp=monthofPlain(key);if(mp)return {name:mp,unsure:false};
  return {name:esc(key),unsure:true};  // 含义拿不准：保留原代号、调用处加 ⚠️ 标注
}
// 一句话「为什么」——按族给通用解释（不编具体方向）
function whyLine(c){
  if(c.family==="rebound")return t("pWhyRebound");
  if(c.family==="factor")return t("pWhyFactor");
  if(c.family==="calendar")return t("pWhyCalendar");
  return t("pWhyGeneric");
}

function pcard(c){
  const pn=plainName(c);
  const fl=pn.unsure?` <span class="flag" title="含义拿不准，保留原代号 / meaning unclear, key kept">⚠️</span>`:"";
  const use=(c.verdict==="survive"&&USE_MAP[c.key])?`<div class="why" style="color:var(--grn);margin-top:3px">${USE_MAP[c.key][LANG]}</div>`:"";
  return `<div class="card pcard" style="cursor:pointer" onclick="showAD('${esc(c.candidate_id)}')">
    <div class="plain">${pn.name}${fl}</div>
    <div class="why">${whyLine(c)}</div>${use}
    <div class="raw">${esc(c.key)} · <span style="color:var(--acc)">${t("dClick")}</span></div></div>`;
}
function renderResults(){
  // 数据缺失/为空 → 优雅大白话兜底
  if(!AD||!AD.candidates||!AD.candidates.length){
    $("headline").innerHTML=t("hlEmpty");
    $("survivors").innerHTML=`<div class="mut">—</div>`;
    $("fadedList").innerHTML=`<div class="mut">—</div>`;
    return;
  }
  const cs=AD.candidates, s=AD.summary||{};
  const surv=cs.filter(c=>c.verdict==="survive");
  const faded=cs.filter(c=>c.verdict==="faded");
  const m=(s.m_total!=null?s.m_total:cs.length);
  const nS=(s.n_survive!=null?s.n_survive:surv.length);
  const nF=(s.n_faded!=null?s.n_faded:faded.length);
  const nI=(s.n_inconclusive!=null?s.n_inconclusive:cs.filter(c=>c.verdict==="inconclusive").length);
  const nD=(s.n_dead!=null?s.n_dead:cs.filter(c=>c.verdict==="dead").length);
  // 大白话领头句（0 存活时换诚实兜底句）
  if(nS===0){
    $("headline").innerHTML=t("hlNone");
  } else if(LANG==="zh"){
    $("headline").innerHTML=`我们用严格统计测了 <b style="color:var(--fg)">${m}</b> 条民间/季节性规律：`
      +`<b>${nS}</b> 条扛住了检验、<span class="amb">${nF}</span> 条曾灵但现在淡了、`
      +`<span class="gone">${nI}</span> 条样本太小下不了结论、其余 <span class="gone">${nD}</span> 条没通过。`;
  } else {
    $("headline").innerHTML=`We ran <b style="color:var(--fg)">${m}</b> folk / seasonal patterns through strict statistics: `
      +`<b>${nS}</b> held up, <span class="amb">${nF}</span> once worked but faded, `
      +`<span class="gone">${nI}</span> were too small to call, and the other <span class="gone">${nD}</span> didn't pass.`;
  }
  const ord=(a,b)=>(a.p-b.p);
  $("survivors").innerHTML=surv.length?[...surv].sort(ord).map(pcard).join(""):`<div class="mut">${t("noneKept")}</div>`;
  $("fadedList").innerHTML=faded.length?[...faded].sort(ord).map(pcard).join(""):`<div class="mut">${t("noneFaded")}</div>`;
}

    +(AD.days_tracked?` · 🌱 ${t("adLedger")} ${AD.days_tracked}${t("adDays")}`:"");

  openModal();}
function closeD(){$("modal").style.display="none";if(window._mTrig&&window._mTrig.focus){try{window._mTrig.focus()}catch(e){}}}
function enhanceA11y(root){(root||document).querySelectorAll("[onclick]").forEach(el=>{if(el.tagName!=="BUTTON"&&!el.hasAttribute("tabindex")&&!el.hasAttribute("role")){el.tabIndex=0;el.setAttribute("role","button");}});}
function openModal(){window._mTrig=document.activeElement;const b=$("mbody");enhanceA11y(b);b.setAttribute("tabindex","-1");$("modal").style.display="flex";try{b.focus()}catch(e){}}
function showFam(fam){const cs=CLAIMS.filter(c=>c.family===fam);if(!cs.length)return;
  $("mbody").innerHTML=`<div style="font-weight:700;font-size:1.05rem;margin-bottom:10px">${esc(fam)}（${cs.filter(c=>c.survive_by_10).length}/${cs.length} ${t("hSurv")}）</div>
    <div style="font-size:.85rem;line-height:1.6;max-height:50vh;overflow:auto">${cs.sort((a,b)=>(a.p||1)-(b.p||1)).map(c=>`<div onclick="showD(${CLAIMS.indexOf(c)})" style="cursor:pointer;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:${c.survive_by_10?'var(--grn)':'var(--mut)'}">${c.survive_by_10?'✓':'✗'}</span> ${esc(c.label)} <span style="color:var(--mut)">p=${c.p==null?'—':(+c.p).toPrecision(2)}</span></div>`).join("")}</div>
    <button onclick="closeD()" style="margin-top:14px;background:var(--acc);color:#fff;border:0;border-radius:8px;padding:7px 18px;cursor:pointer">${t("dClose")}</button>`;
  openModal();}

function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}

// ── 样本外确认 · 知识库（门4 OOS）渲染 ──
function oosBadge(s){const c=OOS_CLR[s]||"#8b949e";const lbl=(OOS_LABEL[s]||{})[LANG]||s;
  return `<span class="dbadge" style="background:${c}22;color:${c};border:1px solid ${c}66">${lbl}</span>`;}
function kbStat(label,val,clr){return `<div class="kbcell"><div class="kbv" style="color:${clr}">${esc(val)}</div><div class="kbl">${esc(label)}</div></div>`;}
function kbQueueCard(c,mn){
  const pn=plainName(c);
  const fl=pn.unsure?` <span class="flag" title="含义拿不准 / meaning unclear">⚠️</span>`:"";
  const use=USE_MAP[c.key]?`<div class="why" style="color:var(--grn);margin-top:3px">${USE_MAP[c.key][LANG]}</div>`:"";
  const prog=(c.oos_n!=null)?` · ${t("kbOosN")}: ${esc(c.oos_n)}/${esc(mn)}`:"";
  return `<div class="card pcard" style="cursor:pointer" onclick="showAD('${esc(c.candidate_id)}')">
    <div class="plain">${pn.name}${fl} ${oosBadge(c.oos_status)}</div>
    <div class="why">${t("kbWaiting")}</div>${use}
    <div class="raw">${esc(c.key)} · ${t("kbAnchor")} ${esc(c.anchor_date||"—")}${prog}</div></div>`;
}
function kbMemberCard(m){
  const pn=plainName(m);
  return `<div class="card pcard" style="border-left:3px solid var(--grn);cursor:pointer" onclick="showAD('${esc(m.candidate_id)}')">
    <div class="plain">🏅 ${pn.name}</div>
    <div class="why">${t("kbMember")}</div>
    <div class="raw">${esc(m.key)} · ${t("kbSince")} ${esc(m.since||"—")} · oos_p=${m.oos_p==null?"—":esc(m.oos_p)}</div></div>`;
}
function kbHistRow(r){
  const promote=r.action==="promote";const act=promote?t("kbPromote"):t("kbDemote");
  const clr=promote?"var(--grn)":"var(--amber)";
  return `<div style="font-size:.8rem;color:var(--mut);padding:4px 0;border-bottom:1px solid var(--border)">
    <span style="color:${clr};font-weight:700">${promote?"▲":"▼"} ${act}</span> · ${esc(r.date||"")} · ${esc(r.key||"")}
    <span style="opacity:.75"> · ${esc(r.trigger||"")}</span></div>`;
}
function renderKB(){
  const strip=$("kbStrip");if(!strip)return;
  if(!KB){strip.innerHTML=`<div class="mut">${t("kbErr")}</div>`;$("kbQueue").innerHTML="";return;}
  const s=KB.summary||{},mn=KB.min_oos_n||30;
  strip.innerHTML=[
    kbStat(t("kbInKb"),s.in_kb||0,"var(--grn)"),
    kbStat(t("kbQueueN"),s.queue||0,"var(--acc)"),
    kbStat(t("kbConfirmed"),s.confirmed||0,"var(--grn)"),
    kbStat(t("kbOverturned"),s.overturned||0,"var(--amber)"),
    kbStat(t("kbDays"),KB.days_since_anchor==null?"—":KB.days_since_anchor,"var(--fg)")
  ].join("");
  const members=KB.members||[],queue=KB.queue||[];
  const cards=members.map(kbMemberCard).join("")+queue.map(c=>kbQueueCard(c,mn)).join("");
  $("kbQueue").innerHTML=cards||`<div class="mut">${t("kbEmpty")}</div>`;
  const h=KB.history||[];
  if(h.length){$("kbHistWrap").style.display="";$("kbHist").innerHTML=h.map(kbHistRow).join("");}
  else{$("kbHistWrap").style.display="none";}
}
// ── 防闪烁稳定度（P-B）渲染 ──
function renderFlicker(){
  const strip=$("flkStrip");if(!strip)return;
  if(!FLK){strip.innerHTML=`<div class="mut">—</div>`;$("flkList").innerHTML="";return;}
  const s=FLK.summary||{};
  strip.innerHTML=[
    kbStat(t("flkSnap"),FLK.n_snapshots==null?"—":FLK.n_snapshots,"var(--fg)"),
    kbStat(t("flkFlicker"),s.n_boundary_flicker||0,"var(--amber)"),
    kbStat(t("flkStable"),s.n_stable||0,"var(--grn)"),
    kbStat(t("flkSpan"),FLK.span_days==null?"—":FLK.span_days,"var(--fg)")
  ].join("");
  const bad=(FLK.candidates||[]).filter(c=>c.boundary_flicker);
  $("flkList").innerHTML = bad.length
    ? `<div style="margin-top:8px"><div class="sub" style="color:var(--amber)">${t("flkBoundary")}</div>`
      + bad.map(c=>{const pn=plainName(c);const fl=pn.unsure?' ⚠️':'';
          return `<div class="raw" style="padding:3px 0;border-bottom:1px solid var(--border)">${pn.name}${fl} · ${esc(c.flips)} ${t("flkFlips")} · ${t("flkStableDays")} ${esc(c.stable_days)} · <span style="color:${VCLR[c.latest_verdict]||'var(--mut)'}">${esc(c.latest_verdict)}</span></div>`;}).join("")
      + `</div>`
    : `<div class="mut" style="margin-top:6px">${t("flkNone")}</div>`;
}
function render(){
  applyStatic();
  renderResults();
  renderKB();
  renderFlicker();
  renderAD();
  if(!D){$("src").textContent=t("err");return;}
  const m=D.m_total||0, surv=D.n_survive_by_10||0, luck=Math.round(m*ALPHA);
  $("hero").innerHTML=`
    <div class="b"><div class="big">${m}</div><div class="l">${t("hTested")}</div></div>
    <div class="arrow">▶</div>
    <div class="b"><div class="big" style="color:var(--amber)">~${luck}</div><div class="l">${t("hLuck")}</div></div>
    <div class="arrow">▶</div>
    <div class="b"><div class="big" style="color:var(--grn)">${surv}</div><div class="l">${t("hSurv")}</div></div>`;
  $("verdict").innerHTML=D.verdict?esc(D.verdict):"";
  const claims=D.claims||[]; CLAIMS=claims; DECAY={}; if(PLAC&&PLAC.tests)PLAC.tests.forEach(tt=>{if(tt.recent_significant===false)DECAY[tt.panel]=true;});
  const reg=claims.filter(c=>c.survive_by_10), grave=claims.filter(c=>!c.survive_by_10), decay=DECAY;
  $("registry").innerHTML=reg.map(c=>{const dead=decay[c.label];
    return `<div class="card${dead?' decayed':''}" style="cursor:pointer" onclick="showD(${claims.indexOf(c)})"><div class="lab">${esc(c.label)}${dead?`<span class="dbadge">${t("decayed")}</span>`:""}</div>
    <div class="meta">${esc(c.family)} · p=${c.p==null?"—":(+c.p).toPrecision(2)}${dead?` · ${t("decaynote")}`:c.survive_bonferroni_05?" · 连最严的 Bonferroni 都过":""} · <span style="color:var(--acc)">${t("dClick")}</span></div></div>`;}).join("")||`<div class="mut">—</div>`;
  $("families").innerHTML=(D.by_family||[]).map(f=>`<span class="fbar" style="cursor:pointer" onclick="showFam('${esc(f.family)}')">${esc(f.family)}: <b>${f.n_survive_by_10}</b>/${f.n}</span>`).join("");
  $("graveyard").innerHTML=grave.map(c=>`<span class="gchip" style="cursor:pointer" onclick="showD(${claims.indexOf(c)})" title="${esc(c.family)} p=${c.p==null?"—":(+c.p).toPrecision(2)}">${esc(c.label)}</span>`).join("")||`<div class="mut">—</div>`;
  $("src").textContent=D.generated?`${t("asof")} ${esc(D.generated.slice(0,10))}`:"";
  enhanceA11y();
}

$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};render();};
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){if($("modal").style.display!=="none")closeD();return;}
  if(e.key==="Enter"||e.key===" "){const a=document.activeElement;if(a&&a.getAttribute&&a.getAttribute("role")==="button"&&a.tagName!=="BUTTON"){e.preventDefault();a.click();}}
});
(async()=>{applyStatic();
  $("survivors").innerHTML='<div class="skel"></div><div class="skel"></div>';
  $("fadedList").innerHTML='<div class="skel"></div>';
  $("registry").innerHTML='<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
  $("autodisc").innerHTML='<div class="skel" style="height:64px;width:100%"></div>';
  $("kbQueue").innerHTML='<div class="skel"></div><div class="skel"></div>';
  const g=u=>fetch(u,{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null);
  [D,PLAC,AD]=await Promise.all([g(LIVE),g(PLACEBO),g(AUTODISC)]);
  KB=await g(KB_LOCAL)||await g(KB_FALLBACK);
  FLK=await g("flicker.json")||await g("https://vambrocop.github.io/valpha-lab/flicker.json");
  render();})();
</script>
<script src="vp_gloss.js" data-autoscan></script>
</body>
