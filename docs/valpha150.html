<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valpha150</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--acc:#a371f7}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:1080px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .note{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:9px 12px;font-size:.84rem;margin:10px 0;color:#ffb3ad}
  .chips{margin:10px 0;font-size:.8rem}
  .chip{display:inline-block;padding:3px 9px;border-radius:12px;margin:2px;cursor:pointer;border:1px solid var(--border);background:#161b22;color:var(--fg)}
  .chip.on{outline:2px solid var(--acc)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
  table{width:100%;border-collapse:collapse;font-size:.86rem;margin-top:6px}
  th,td{padding:5px 7px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
  th:nth-child(1),td:nth-child(1),th:nth-child(2),td:nth-child(2){text-align:left}
  th{position:sticky;top:0;background:#161b22;cursor:pointer;user-select:none;color:var(--mut);font-weight:600}
  th.s::after{content:" ▾"}
  tr:hover{background:rgba(163,113,247,.06)}
  .pos{color:var(--grn)} .neg{color:var(--red)}
  .tag{font-size:.66rem;padding:1px 4px;border-radius:4px;margin-left:3px}
  .hot{background:rgba(248,81,73,.18);color:#ff9b94}.risk{background:rgba(210,153,34,.18);color:#e3b341}.calm{background:rgba(63,185,80,.16);color:#7ee787}
  .mut{color:var(--mut);font-size:.78rem;margin-top:14px;border-top:1px solid var(--border);padding-top:8px}
  #src{color:var(--mut);font-size:.78rem}
  th:focus{outline:2px solid var(--acc);outline-offset:-2px}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.15rem}table{font-size:.8rem}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="note" data-i18n="note"></div>
<div class="chips" id="chips"></div>
<div style="overflow-x:auto"><table id="tbl"></table></div>
<div id="src"></div>
<div class="mut" data-i18n="foot"></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/valpha150.json";
const SEC={"半导体":"#a371f7","科技":"#58a6ff","通信服务":"#56d4dd","可选消费":"#e3a008","必需消费":"#3fb950","医疗":"#2dd4bf","金融":"#d4a017","工业":"#8b949e","能源":"#f85149","公用":"#a3b18a","材料":"#7d8590","房地产":"#f778ba"};
const SEC_EN={"半导体":"Semis","科技":"Tech","通信服务":"Comms","可选消费":"Cons.Disc.","必需消费":"Staples","医疗":"Health","金融":"Financials","工业":"Industrials","能源":"Energy","公用":"Utilities","材料":"Materials","房地产":"Real Estate"};
const I18N={
  title:{zh:"🛰️ Valpha150 大盘 · 原型",en:"🛰️ Valpha150 Board · prototype"},
  note:{zh:"<b>涨幅榜 = 已经涨过的 + 只含当前在册的（幸存者偏差）。</b>上榜 ≠ 该买——半导体此刻霸榜是这一波的主题，<b>不代表未来</b>，高涨幅往往伴随高回撤。看结构，别照单追涨。",
        en:"<b>A gainers board = what already rose, survivors only (survivorship bias).</b> On the list ≠ buy it — semis topping it now is this cycle's theme, <b>not the future</b>; big gains usually carry big drawdowns. Read the structure, don't chase."},
  foot:{zh:"点列头排序。🔥6月涨≥50% · ⚠️波动≥70% · 🏰波动≤25%。数据：实时 valpha150.json，描述性历史、非预测。",
        en:"Click a header to sort. 🔥6M≥50% · ⚠️vol≥70% · 🏰vol≤25%. Data: live valpha150.json — descriptive history, not a forecast."},
  cn:{zh:"名称",en:"Name"},csec:{zh:"板块",en:"Sector"},c6:{zh:"6月%",en:"6M%"},c1:{zh:"1年%",en:"1Y%"},cv:{zh:"波动%",en:"Vol%"},cfh:{zh:"距52周高%",en:"vs 52W%"},ctag:{zh:"标签",en:"Tags"},
  all:{zh:"全部",en:"All"},live:{zh:"实时 ✓",en:"Live ✓"},err:{zh:"拉不到 valpha150.json——确认已部署。",en:"Can't load valpha150.json — check deployment."},asof:{zh:"数据日",en:"as of"}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
let DATA=[],sortCol="c6",dir=-1,filt="";

function tagOf(d){let x="";if((d.c6??0)>=50)x+='<span class="tag hot">🔥</span>';if((d.v??0)>=70)x+='<span class="tag risk">⚠️</span>';if((d.v??99)<=25)x+='<span class="tag calm">🏰</span>';return x;}
function pn(v){if(v==null)return '<span class="mut">—</span>';return `<span class="${v>=0?'pos':'neg'}">${v>=0?'+':''}${v}</span>`;}
function secName(s){return LANG==="en"?(SEC_EN[s]||s):s;}
function nm(d){return LANG==="en"?d.t:`${esc(d.n)} <span class="mut">${d.t}</span>`;}

function applyStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));
  $("lang").textContent=LANG==="zh"?"EN":"中";
  document.documentElement.lang=LANG==="zh"?"zh-CN":"en";
}
function render(){
  const COLS=[["n","cn"],["sec","csec"],["c6","c6"],["c1","c1"],["v","cv"],["fh","cfh"],["tag","ctag"]];
  let rows=DATA.filter(d=>!filt||d.sec===filt);
  rows.sort((a,b)=>{const x=a[sortCol],y=b[sortCol];if(x==null)return 1;if(y==null)return -1;
    return (typeof x==="number")?(y-x)*dir*-1:String(x).localeCompare(String(y),'zh')*dir*-1;});
  let h="<thead><tr>";
  COLS.forEach(([k,lk])=>{const on=k===sortCol;h+=`<th data-k="${k}" scope="col" tabindex="0" role="button" aria-sort="${on?(dir<0?'descending':'ascending'):'none'}" class="${on?'s':''}">${t(lk)}</th>`;});
  h+="</tr></thead><tbody>";
  rows.forEach(d=>{h+=`<tr><td>${nm(d)}</td>
    <td><span class="dot" style="background:${SEC[d.sec]||'#888'}"></span>${esc(secName(d.sec))}</td>
    <td>${pn(d.c6)}</td><td>${pn(d.c1)}</td><td>${d.v==null?'<span class="mut">—</span>':d.v}</td><td>${pn(d.fh)}</td>
    <td style="text-align:left">${tagOf(d)}</td></tr>`;});
  h+="</tbody>";$("tbl").innerHTML=h;
  $("tbl").querySelectorAll("th").forEach(th=>{const sort=()=>{const k=th.dataset.k;if(k===sortCol)dir*=-1;else{sortCol=k;dir=-1;}render();};th.onclick=sort;th.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();sort();}};});
}
function chips(){
  const cnt={};DATA.forEach(d=>cnt[d.sec]=(cnt[d.sec]||0)+1);
  let h=`<span class="chip ${filt===''?'on':''}" data-s="">${t("all")} ${DATA.length}</span>`;
  Object.keys(SEC).forEach(s=>{if(cnt[s])h+=`<span class="chip ${filt===s?'on':''}" data-s="${s}"><span class="dot" style="background:${SEC[s]}"></span>${esc(secName(s))} ${cnt[s]}</span>`;});
  $("chips").innerHTML=h;
  $("chips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{filt=c.dataset.s;chips();render();});
}
function redraw(){applyStatic();chips();render();}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};redraw();
  $("src").textContent=(DATA.length?`${t("live")} ${DATA.length} · ${t("asof")} ${window._gen||""}`:"");};

async function load(){
  applyStatic();
  try{
    const r=await fetch(LIVE,{cache:"no-store"});if(!r.ok)throw 0;
    const j=await r.json();DATA=j.stocks||[];window._gen=j.generated;
    $("src").textContent=`${t("live")} ${DATA.length} · ${t("asof")} ${j.generated}`;
    chips();render();
  }catch(e){$("src").textContent=t("err");}
}
load();
</script>
</body>
</html>
