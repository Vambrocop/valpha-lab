<style>

  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .banner{background:linear-gradient(135deg,#7d1128 0%,#5b21b6 100%);border:2px solid #f85149;border-radius:12px;padding:14px 16px;margin:12px 0 18px;font-size:.92rem;line-height:1.55;box-shadow:0 0 0 1px rgba(248,81,73,.25),0 8px 24px rgba(123,17,40,.35)}
  .banner b{color:#fff}
  .banner .big{font-size:1.05rem;font-weight:700;color:#fff;display:block;margin-bottom:5px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin:14px 0}
  .card h2{font-size:1.02rem;margin:0 0 4px}
  .card .sub{color:var(--mut);font-size:.8rem;margin-bottom:10px}
  .huge{font-size:2.6rem;font-weight:800;line-height:1.1;margin:6px 0}
  .huge.up{color:var(--grn)} .huge.down{color:var(--red)}
  .pill{display:inline-block;padding:3px 11px;border-radius:14px;font-size:.82rem;border:1px solid var(--border);background:#0d1117;margin:2px 4px 2px 0}
  .pill.up{border-color:var(--grn);color:#7ee787}.pill.down{border-color:var(--red);color:#ff9b94}
  .honest{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:8px 11px;font-size:.8rem;margin-top:10px;color:#ffb3ad}
  .grid{display:flex;flex-wrap:wrap;gap:12px}
  .grid .col{flex:1 1 240px}
  .lst{list-style:none;padding:0;margin:6px 0 0}
  .lst li{padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .lst li:last-child{border-bottom:none}
  .sym{font-weight:700}
  .pos{color:var(--grn)} .neg{color:var(--red)}
  .reason{color:var(--mut);font-size:.76rem;text-align:right;flex:1}
  .stat{display:flex;gap:18px;flex-wrap:wrap;margin:8px 0}
  .stat .b{font-size:1.5rem;font-weight:800}
  .stat .l{color:var(--mut);font-size:.74rem}
  .scorerow{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
  .sq{width:16px;height:16px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem}
  .sq.hit{background:rgba(63,185,80,.22);color:#7ee787}.sq.miss{background:rgba(248,81,73,.2);color:#ff9b94}
  .mut{color:var(--mut);font-size:.78rem;margin-top:18px;border-top:1px solid var(--border);padding-top:8px}
  #src{color:var(--mut);font-size:.78rem;margin-top:4px}
  .err{color:var(--red);font-size:.82rem}
  /* autodiscovery rebound table */
  .rb-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.82rem}
  .rb-table th{text-align:left;color:var(--mut);font-weight:600;padding:5px 8px;border-bottom:1px solid var(--border)}
  .rb-table td{padding:5px 8px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:top}
  .rb-table tr:last-child td{border-bottom:none}
  .v-survive{color:#7ee787}.v-faded{color:#e3b341}.v-dead{color:var(--mut)}.v-inconclusive{color:#8b949e}
  /* macro narrative card */
  .macro-disclaimer{background:rgba(163,113,247,.12);border:1px solid var(--acc);border-radius:8px;padding:8px 11px;font-size:.78rem;color:#c9b1f7;margin-bottom:12px}
  .macro-item{border-bottom:1px solid var(--border);padding:10px 0}
  .macro-item:last-child{border-bottom:none}
  .macro-item .mi-title{font-weight:700;font-size:.9rem;margin-bottom:3px}
  .macro-item .mi-thesis{font-size:.82rem;color:var(--fg);margin-bottom:4px}
  .macro-item .mi-verdict{font-size:.78rem;color:#ffb3ad;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:6px;padding:4px 9px;display:inline-block;margin-top:2px}

  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

var num=function(v,d){d=d==null?2:d;return(v==null||isNaN(v))?'—':Number(v).toFixed(d);};
var pct=function(v){return(v==null||isNaN(v))?'—':((v>=0?'+':'')+Number(v).toFixed(1)+'%');};

var DATA={};

function renderBet(){
  var s=DATA.signals;
  if(!s){$('betBody').innerHTML='<div class="err">'+t('err')+'</div>';return;}
  var p=s.latest_prob, up=(p||0)>0.5;
  var date=(s.indices&&s.indices.NASDAQ&&s.indices.NASDAQ.date)||s.generated||'';
  var callCls=up?'up':'down', call=up?t('bullCall'):t('bearCall');
  var note=s.model_status_note||'';
  $('betBody').innerHTML=
    '<div class="huge '+callCls+'">'+esc(call)+'</div>'+
    '<div>'+
      '<span class="pill '+callCls+'">'+t('prob')+' '+(p==null?'—':(p*100).toFixed(1)+'%')+'</span>'+
      '<span class="pill">'+t('tier')+' '+esc(String(s.latest_tier==null?'—':s.latest_tier))+'</span>'+
      '<span class="pill">'+t('asof')+' '+esc(date)+'</span>'+
    '</div>'+
    (note?'<div class="honest"><b>'+t('betHonest')+'</b>'+esc(note)+'</div>':'');
}

/* key → 大白话映射
   格式：p{N}_h{M}_{index}
   p{N}  = 跌破第N百分位日
   h{M}  = 持有M日
   nasdaq / sp500 = 纳指 / 标普
*/
function keyToLabel(key, lang){
  if(!key)return esc(String(key));
  var m=String(key).match(/^p(\d+)_h(\d+)_(nasdaq|sp500)$/i);
  if(!m)return esc(key);
  var pN=m[1], hM=m[2], idx=m[3].toLowerCase();
  if(lang==='zh'){
    var idxZh=idx==='nasdaq'?'纳指':'标普';
    return idxZh+' 跌破第'+pN+'百分位日 → 持有'+hM+'日';
  } else {
    var idxEn=idx==='nasdaq'?'NASDAQ':'S&P500';
    return idxEn+' below p'+pN+' → hold '+hM+' day'+(hM==='1'?'':'s');
  }
}

function verdictClass(v){
  if(!v)return '';
  var vl=String(v).toLowerCase();
  if(vl==='survive')return 'v-survive';
  if(vl==='faded')return 'v-faded';
  if(vl==='dead')return 'v-dead';
  if(vl==='inconclusive')return 'v-inconclusive';
  return '';
}

function verdictLabel(v){
  if(!v)return '—';
  var vl=String(v).toLowerCase();
  if(vl==='survive')return t('rbSurvive');
  if(vl==='faded')return t('rbFaded');
  if(vl==='dead')return t('rbDead');
  if(vl==='inconclusive')return t('rbInconclusive');
  return esc(v);
}

/* 排序权：survive > faded > inconclusive > dead */
function verdictOrder(v){
  if(!v)return 99;
  var vl=String(v).toLowerCase();
  if(vl==='survive')return 0;
  if(vl==='faded')return 1;
  if(vl==='inconclusive')return 2;
  if(vl==='dead')return 3;
  return 99;
}

function renderBounce(){
  var ad=DATA.autodiscovery;
  if(!ad){
    $('bounceBody').innerHTML='<div class="err">'+t('rbUnavail')+'</div>';
    return;
  }
  var candidates=ad.candidates||[];
  var items=candidates.filter(function(c){return (c.family||'').toLowerCase()==='rebound';});
  if(!items.length){
    $('bounceBody').innerHTML='<div class="err">'+t('rbUnavail')+'</div>';
    return;
  }
  // 排序：verdict 顺序，同 verdict 内 p 值升序
  items=items.slice().sort(function(a,b){
    var od=verdictOrder(a.verdict)-verdictOrder(b.verdict);
    if(od!==0)return od;
    var pa=parseFloat(a.p)||1, pb=parseFloat(b.p)||1;
    return pa-pb;
  });
  var rows=items.map(function(c){
    var vc=verdictClass(c.verdict);
    var vl=verdictLabel(c.verdict);
    var pFull=c.p==null?'—':Number(c.p).toFixed(4);
    var pRecent=c.recent_p==null?'—':Number(c.recent_p).toFixed(4);
    return '<tr>'+
      '<td>'+keyToLabel(c.key, LANG)+'</td>'+
      '<td>'+esc(pFull)+'</td>'+
      '<td>'+esc(pRecent)+'</td>'+
      '<td class="'+vc+'">'+vl+'</td>'+
      '</tr>';
  }).join('');
  $('bounceBody').innerHTML=
    '<table class="rb-table">'+
      '<thead><tr>'+
        '<th>'+t('rbColConfig')+'</th>'+
        '<th>'+t('rbColP')+'</th>'+
        '<th>'+t('rbColRecentP')+'</th>'+
        '<th>'+t('rbColVerdict')+'</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>'+
    '<div class="honest">'+t('rbHonest')+'</div>';
}

  function li(arr){
    return (arr||[]).map(function(x){
      return '<li>'+
        '<span class="sym">'+esc(x.symbol)+'</span>'+
        '<span class="'+(((x.mom_pct||0)>=0)?'pos':'neg')+'">'+pct(x.mom_pct)+'</span>'+
        '<span class="reason">'+esc(x.reason||'')+'</span>'+
        '</li>';
    }).join('');
  }
  $('pickBody').innerHTML=
    '<div class="grid">'+
      '<div class="col"><div class="pill up">'+t('bullish')+'</div>'+
        '<ul class="lst">'+(li(ol.bullish)||'<li class="mut">—</li>')+'</ul></div>'+
      '<div class="col"><div class="pill down">'+t('bearish')+'</div>'+
        '<ul class="lst">'+(li(ol.bearish)||'<li class="mut">—</li>')+'</ul></div>'+
    '</div>'+
    (ol.disclaimer?'<div class="honest">'+esc(ol.disclaimer)+'</div>':'');
}

function renderTip(){
  var tj=DATA.tipjar;
  if(!tj){$('tipBody').innerHTML='<div class="err">'+t('err')+'</div>';return;}
  var lat=tj.latest||{};
  var callTxt=lat.call==='UP'?t('up'):lat.call==='DOWN'?t('down'):esc(String(lat.call==null?'—':lat.call));
  var rec=(tj.recent||[]).slice(-12);
  var squares=rec.map(function(x){
    return '<span class="sq '+(x.hit?'hit':'miss')+'" title="'+esc(x.as_of||'')+': '+esc(String(x.call))+'→'+esc(String(x.actual))+'">'+  (x.hit?'✓':'✗')+'</span>';
  }).join('');
  $('tipBody').innerHTML=
    '<div class="stat">'+
      '<div><div class="b">'+num(tj.hit_rate,1)+'%</div><div class="l">'+t('hitRate')+'</div></div>'+
      '<div><div class="b">'+num(tj.hit_rate_last20,1)+'%</div><div class="l">'+t('hitLast20')+'</div></div>'+
      '<div><div class="b">'+esc(String(tj.n_scored==null?'—':tj.n_scored))+'</div><div class="l">'+t('nScored')+'</div></div>'+
      '<div><div class="b '+(lat.call==='UP'?'pos':lat.call==='DOWN'?'neg':'')+'">'+callTxt+'</div><div class="l">'+t('latestCall')+' '+esc(lat.as_of||'')+'</div></div>'+
    '</div>'+
    '<div class="l mut" style="margin-top:6px">'+t('recent12')+'</div>'+
    '<div class="scorerow">'+squares+'</div>'+
    (tj.caveat?'<div class="honest">'+esc(tj.caveat)+'</div>':'');
}

function renderMacro(){
  var items=MACRO_ITEMS[LANG]||MACRO_ITEMS.zh;
  var disclaimerZh='野蛮推测 · 多为未验证民间叙事 · 娱乐非建议';
  var disclaimerEn='Wild speculation · mostly unverified folk narratives · entertainment, not advice';
  var disclaimer=LANG==='zh'?disclaimerZh:disclaimerEn;
  var html='<div class="macro-disclaimer">⚠️ '+esc(disclaimer)+'</div>';
  html+=items.map(function(item){
    return '<div class="macro-item">'+
      '<div class="mi-title">'+esc(item.title)+'</div>'+
      '<div class="mi-thesis">'+esc(item.thesis)+'</div>'+
      '<div class="mi-verdict">🔍 '+esc(item.verdict)+'</div>'+
      '</div>';
  }).join('');
  $('macroBody').innerHTML=html;
}

function renderAll(){
  applyStatic();
  renderBet();
  renderBounce();
  renderPicks();
  renderTip();
  renderMacro();
  var g=(DATA.signals&&DATA.signals.generated)||(DATA.outlook&&DATA.outlook.generated)||'';
  $('src').textContent=g?(t('src')+' '+g):'';
}

$('lang').onclick=function(){
  LANG=LANG==='zh'?'en':'zh';
  try{localStorage.setItem('valpha_lang',LANG);}catch(e){}
  renderAll();
};

function fetchJSON(name){
  try{
    return fetch(BASE+name,{cache:'no-store'}).then(function(r){
      if(!r.ok)return null;
      return r.json().catch(function(){return null;});
    }).catch(function(){return null;});
  }catch(e){return Promise.resolve(null);}
}

function load(){
  applyStatic();
  Promise.all([
    fetchJSON('signals.json'),
    fetchJSON('autodiscovery.json'),
    fetchJSON('outlook.json'),
    fetchJSON('tipjar.json')
  ]).then(function(results){
    DATA={signals:results[0],autodiscovery:results[1],outlook:results[2],tipjar:results[3]};
    renderAll();
  });
}
load();
</script>
<script src="vp_gloss.js" data-autoscan></script>
</body>
</html>
