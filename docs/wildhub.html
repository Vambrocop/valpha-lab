<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 野蛮专区 · Wild Zone Hub</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--acc:#a371f7}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.55 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:16px;max-width:980px;margin:0 auto}
  h1{font-size:1.5rem;margin:.2em 0;display:inline-block;font-weight:800}
  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .banner{background:linear-gradient(135deg,#7d1128 0%,#5b21b6 100%);border:2px solid #f85149;border-radius:12px;padding:14px 16px;margin:12px 0 18px;font-size:.92rem;line-height:1.55;box-shadow:0 0 0 1px rgba(248,81,73,.25),0 8px 24px rgba(123,17,40,.35)}
  .banner b{color:#fff}
  .banner .big{font-size:1.05rem;font-weight:700;color:#fff;display:block;margin-bottom:5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin:16px 0}
  .tile{display:block;text-decoration:none;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:12px;padding:15px 16px;color:var(--fg);transition:.14s}
  .tile:hover{border-color:var(--acc);transform:translateY(-2px)}
  .tile .ico{font-size:1.6rem}.tile .nm{font-weight:700;margin-top:5px;font-size:1.02rem}.tile .ds{color:var(--mut);font-size:.8rem;margin-top:3px}
  .tile .soon{color:var(--mut);opacity:.7}.tile.soon{border-left-color:var(--mut);opacity:.78;cursor:default}
  .mut{color:var(--mut);font-size:.8rem;margin-top:18px;border-top:1px solid var(--border);padding-top:10px}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.25rem}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="banner">
  <span class="big" data-i18n="bannerBig"></span>
  <span data-i18n="bannerBody"></span>
</div>
<div class="grid" id="grid"></div>
<div class="mut" data-i18n="foot"></div>

<script>
const $=id=>document.getElementById(id);
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
const I18N={
  title:{zh:"🔥 野蛮专区",en:"🔥 Wild Zone"},
  bannerBig:{zh:"出格区 · 这里大胆、敢给倾向，但全透明、非投资建议。",
             en:"Out-of-bounds zone · bold, willing to lean, but fully transparent — not investment advice."},
  bannerBody:{zh:"全站其余守「测风险不测方向」；<b>这里是授权的例外</b>：把诚实证据大胆摊开、敢给当下倾向与原始规律——但每条都标好<b>样本/置信/可用度</b>，<b>会亏钱、过去≠未来</b>。当真你就输了，当参考你来判断。",
              en:"The rest of the site measures risk, not direction; <b>this is the authorized exception</b>: evidence laid bare, willing to give a current tilt and raw patterns — each tagged with <b>sample size / confidence / usability</b>. You <b>can lose money, past ≠ future</b>. Take it as gospel and you lose; take it as a reference and you judge."},
  foot:{zh:"出格区各页均为描述性/加权读数，非预测、非荐股；倾向与规律均标注不确定性，已公开计分可追责。",
        en:"All pages here are descriptive / weighted reads — not forecasts or advice; tilts and patterns carry uncertainty tags and are publicly scored for accountability."},
  // tiles
  read:{zh:"综合读数",en:"Composite Read"},read_d:{zh:"把诚实证据加权成「当下倾向」+ 因子全透明 + 公开计分",en:"evidence weighted into a current tilt + transparent factors + public scoring"},
  cyc:{zh:"周期与季节性",en:"Cycles & Seasonality"},cyc_d:{zh:"原始计数+校正前p+校正后裁决 三层；大选/季节性/世界杯",en:"raw counts + pre/post-FDR, 3 layers; election / seasonal / World Cup"},
  inst:{zh:"即时野押",en:"Instant Plays"},inst_d:{zh:"今日大胆一押·博反弹12配置·macro狂想·个股看好看淡·玩具战绩",en:"bold bet · 12-config bounce · macro · stock bull/bear · toy scorecard"},
  adv:{zh:"配置建议器",en:"Allocator"},adv_d:{zh:"输入金额/持有期→逆波动率配置 + 诚实账单(先看下跌)",en:"amount/horizon → inverse-vol allocation + honest bill (downside first)"},
  pool:{zh:"任意代码快查",en:"Any-ticker quick check"},pool_d:{zh:"150外任意美股尽力快查·动量/波动/回撤(出格池首发,第三方数据·澳洲直连)",en:"any US ticker beyond the 150 · momentum/vol/drawdown (pool v1, third-party data · AU direct)"}
};
const TILES=[
  ["read","🧠","composite.html"],["cyc","🔄","seasonal.html"],["inst","🔥","wild.html"],
  ["adv","🎲","advisor.html"],["pool","🔍","ticker.html"]
];
function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}
function render(){
  applyStatic();
  $("grid").innerHTML=TILES.map(([k,ico,href])=>{
    const inner=`<div class="ico">${ico}</div><div class="nm">${t(k)}</div><div class="ds">${t(k+"_d")}</div>`;
    return href?`<a class="tile" href="${href}">${inner}</a>`:`<div class="tile soon">${inner}</div>`;
  }).join("");
}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};render();};
render();
</script>
</body>
</html>
