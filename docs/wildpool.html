<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>D·A 出格池 Wild Pool</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--acc:#c678dd;--warn:#e3a008}
  *{box-sizing:border-box}
  :focus-visible{outline:2px solid var(--acc);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .skel{height:30px;border-radius:8px;margin:7px 0;background:linear-gradient(90deg,var(--panel) 25%,var(--border) 37%,var(--panel) 63%);background-size:400% 100%;animation:sk 1.4s ease infinite}
  @keyframes sk{0%{background-position:100% 0}100%{background-position:-100% 0}}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:1080px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  #lang{float:right;background:var(--panel);border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .wild-warn{background:rgba(198,120,221,.12);border:2px solid var(--acc);border-radius:8px;padding:10px 14px;font-size:.84rem;margin:10px 0;color:#e0baff;line-height:1.6}
  .wild-warn strong{color:#c678dd}
  .chips{margin:10px 0;font-size:.8rem}
  .chip{display:inline-block;padding:3px 9px;border-radius:12px;margin:2px;cursor:pointer;border:1px solid var(--border);background:var(--panel);color:var(--fg)}
  .chip.on{outline:2px solid var(--acc)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
  table{width:100%;border-collapse:collapse;font-size:.86rem;margin-top:6px}
  th,td{padding:5px 7px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
  th:nth-child(1),td:nth-child(1),th:nth-child(2),td:nth-child(2){text-align:left}
  th{position:sticky;top:0;background:var(--panel);cursor:pointer;user-select:none;color:var(--mut);font-weight:600}
  th[aria-sort="ascending"]::after{content:" ▴"}
  th[aria-sort="descending"]::after{content:" ▾"}
  tr:hover{background:rgba(198,120,221,.08)}
  .pos{color:var(--grn)} .neg{color:var(--red)}
  .tag{font-size:.72rem;padding:1px 4px;border-radius:4px;margin-left:3px}
  .hot{background:rgba(248,81,73,.2);color:#ff9b94}
  .risk{background:rgba(198,120,221,.22);color:#e0baff}
  .calm{background:rgba(63,185,80,.16);color:#7ee787}
  .mut{color:var(--mut);font-size:.78rem;margin-top:14px;border-top:1px solid var(--border);padding-top:8px}
  #src{color:var(--mut);font-size:.78rem}
  th:focus{outline:2px solid var(--acc);outline-offset:-2px}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.15rem}table{font-size:.8rem}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="wild-warn" data-i18n="note"></div>
<div class="chips" id="chips"></div>
<div style="overflow-x:auto"><table id="tbl"></table></div>
<div id="src"></div>
<div class="mut" data-i18n="foot"></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/wildpool.json";

/* 出格池板块色盘 — 暗紫红系 */
const SEC={
  "meme":"#f85149",
  "加密":"#c678dd",
  "加密矿":"#9d4edd",
  "券商":"#58a6ff",
  "金融科技":"#4fc3f7",
  "科技":"#a371f7",
  "游戏":"#e3a008",
  "博彩":"#f7a74a",
  "电动车":"#3fb950",
  "充电":"#56d4dd",
  "AI硬件":"#ff6e96",
  "量子":"#b39ddb",
  "卫星":"#7986cb",
  "火箭":"#ef5350",
  "合成生物":"#66bb6a",
  "地产科技":"#8d6e63",
  "AI":"#ce93d8",
  "语音AI":"#f48fb1",
  "航天":"#4db6ac",
  "飞行汽车":"#ffd54f"
};
const SEC_EN={
  "meme":"Meme",
  "加密":"Crypto",
  "加密矿":"Crypto Mining",
  "券商":"Broker",
  "金融科技":"FinTech",
  "科技":"Tech",
  "游戏":"Gaming",
  "博彩":"Betting",
  "电动车":"EV",
  "充电":"Charging",
  "AI硬件":"AI HW",
  "量子":"Quantum",
  "卫星":"Satellite",
  "火箭":"Rocket",
  "合成生物":"SynBio",
  "地产科技":"PropTech",
  "AI":"AI",
  "语音AI":"Voice AI",
  "航天":"Space",
  "飞行汽车":"Air Taxi"
};

const I18N={
  title:{zh:"🔥 D·A 出格池 · Wild Pool",en:"🔥 D·A Wild Pool · Speculative Picks"},
  note:{
    zh:"<strong>⚠️ 150外野票 · 高投机性</strong>——这里的标的均在 Valpha150 主池之外，以 meme股/妖股/次新/加密相关为主。<br>涨幅榜 = <b>已经涨过的</b>（幸存者偏差）。<b>非荐股 · 非预测</b>——高波动常伴高回撤，过去涨幅不代表未来。看结构，别照单追涨。",
    en:"<strong>⚠️ Outside Valpha150 · High Speculation</strong> — tickers here are meme stocks, high-volatility names, crypto-adjacent and early-stage themes excluded from the main board.<br>A gainers board = <b>what already rose</b> (survivorship bias). <b>Not a recommendation · not a forecast</b> — high volatility comes with high drawdowns. Read the structure, don't chase."
  },
  foot:{
    zh:"点列头排序。🔥6月涨≥50% · ⚠️波动≥70% · 🏰波动≤25%。数据：实时 wildpool.json，描述性历史、非预测。",
    en:"Click a header to sort. 🔥6M≥50% · ⚠️vol≥70% · 🏰vol≤25%. Data: live wildpool.json — descriptive history, not a forecast."
  },
  cn:{zh:"名称",en:"Name"},
  csec:{zh:"板块",en:"Sector"},
  c6:{zh:"6月%",en:"6M%"},
  c1:{zh:"1年%",en:"1Y%"},
  cv:{zh:"波动%",en:"Vol%"},
  cfh:{zh:"距52周高%",en:"vs 52W%"},
  ctag:{zh:"标签",en:"Tags"},
  all:{zh:"全部",en:"All"},
  live:{zh:"实时 ✓",en:"Live ✓"},
  err:{zh:"拉不到 wildpool.json——确认已部署。",en:"Can't load wildpool.json — check deployment."},
  asof:{zh:"数据日",en:"as of"}
};

const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let LANG="zh";
try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;

let DATA=[],sortCol="c6",dir=-1,filt="";

function tagOf(d){
  let x="";
  if((d.c6??0)>=50)x+='<span class="tag hot">🔥</span>';
  if((d.v??0)>=70)x+='<span class="tag risk">⚠️</span>';
  if((d.v??99)<=25)x+='<span class="tag calm">🏰</span>';
  return x;
}
function pn(v){
  if(v==null)return '<span class="mut">—</span>';
  return `<span class="${v>=0?'pos':'neg'}">${v>=0?'+':''}${v}</span>`;
}
function secName(s){return LANG==="en"?(SEC_EN[s]||s):s;}
function nm(d){return LANG==="en"?d.t:`${esc(d.n)} <span class="mut">${d.t}</span>`;}

function applyStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));
  $("lang").textContent=LANG==="zh"?"EN":"中";
  document.documentElement.lang=LANG==="zh"?"zh-CN":"en";
}

function render(){
  const COLS=[["n","cn"],["sec","csec"],["c6","c6"],["c1","c1"],["v","cv"],["fh","cfh"],["tag","ctag"]];
  let rows=DATA.filter(d=>!filt||d.sec===filt);
  rows.sort((a,b)=>{
    const x=a[sortCol],y=b[sortCol];
    if(x==null)return 1;if(y==null)return -1;
    return (typeof x==="number")?(y-x)*dir*-1:String(x).localeCompare(String(y),'zh')*dir*-1;
  });
  let h="<thead><tr>";
  COLS.forEach(([k,lk])=>{
    const on=k===sortCol;
    h+=`<th data-k="${k}" scope="col" tabindex="0" role="button" aria-sort="${on?(dir<0?'descending':'ascending'):'none'}" class="${on?'s':''}">${t(lk)}</th>`;
  });
  h+="</tr></thead><tbody>";
  rows.forEach(d=>{
    h+=`<tr><td>${nm(d)}</td>
    <td><span class="dot" style="background:${SEC[d.sec]||'#888'}"></span>${esc(secName(d.sec))}</td>
    <td>${pn(d.c6)}</td><td>${pn(d.c1)}</td>
    <td>${d.v==null?'<span class="mut">—</span>':d.v}</td>
    <td>${pn(d.fh)}</td>
    <td style="text-align:left">${tagOf(d)}</td></tr>`;
  });
  h+="</tbody>";
  $("tbl").innerHTML=h;
  $("tbl").querySelectorAll("th").forEach(th=>{
    const sort=()=>{
      const k=th.dataset.k;
      if(k===sortCol)dir*=-1;else{sortCol=k;dir=-1;}
      render();
    };
    th.onclick=sort;
    th.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();sort();}};
  });
}

function chips(){
  const cnt={};
  DATA.forEach(d=>cnt[d.sec]=(cnt[d.sec]||0)+1);
  let h=`<span class="chip ${filt===''?'on':''}" data-s="" tabindex="0" role="button">${t("all")} ${DATA.length}</span>`;
  /* 按 SEC 定义顺序展示板块 chip */
  Object.keys(SEC).forEach(s=>{
    if(cnt[s])h+=`<span class="chip ${filt===s?'on':''}" data-s="${s}" tabindex="0" role="button"><span class="dot" style="background:${SEC[s]}"></span>${esc(secName(s))} ${cnt[s]}</span>`;
  });
  $("chips").innerHTML=h;
  $("chips").querySelectorAll(".chip").forEach(c=>{const act=()=>{filt=c.dataset.s;chips();render();};c.onclick=act;c.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();act();}};});
}

function redraw(){applyStatic();chips();render();}
$("lang").onclick=()=>{
  LANG=LANG==="zh"?"en":"zh";
  try{localStorage.setItem("valpha_lang",LANG);}catch(e){}
  redraw();
  $("src").textContent=(DATA.length?`${t("live")} ${DATA.length} · ${t("asof")} ${window._gen||""}`:"");
};

async function load(){
  applyStatic();
  $("tbl").innerHTML='<tbody>'+'<tr><td colspan="7" style="border:0;padding:0"><div class="skel"></div></td></tr>'.repeat(6)+'</tbody>';
  try{
    const r=await fetch(LIVE,{cache:"no-store"});
    if(!r.ok)throw 0;
    const j=await r.json();
    DATA=j.stocks||[];
    window._gen=j.generated;
    $("src").textContent=`${t("live")} ${DATA.length} · ${t("asof")} ${j.generated}`;
    chips();render();
  }catch(e){
    $("src").textContent=t("err");
  }
}
load();
</script>
</body>
</html>
