<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valpha Lab</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--amb:#d29922;--acc:#a371f7;--blu:#58a6ff}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 500px at 50% -200px,rgba(163,113,247,.10),transparent),var(--bg);color:var(--fg);font:15px/1.6 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:18px;max-width:960px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:1.7rem;margin:.1em 0;font-weight:800;letter-spacing:.5px}
  h1 .hex{color:var(--acc)}
  .tag{color:var(--mut);font-size:.9rem}
  #lang{margin-left:auto;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.84rem}
  .baseline{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.3);border-radius:10px;padding:11px 14px;font-size:.9rem;margin:14px 0;color:#cfe3ff}
  .hero{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;background:linear-gradient(135deg,rgba(163,113,247,.13),rgba(88,166,255,.06));border:1px solid var(--acc);border-radius:14px;padding:16px 18px;margin:16px 0}
  .hero canvas{display:block}
  .hero-lbl{font-size:.74rem;letter-spacing:.4px}
  .hero-stance{font-size:1.95rem;font-weight:800;line-height:1.05;margin-top:2px}
  .hero-call{font-size:1.05rem;margin-top:5px}
  .hero-read{font-size:.86rem;color:#d8e0ea;margin-top:9px;line-height:1.5}
  .hero-tilt{font-size:.82rem;color:var(--mut);margin-top:7px}
  .hero-acct{display:inline-block;margin-top:10px;font-size:.8rem;color:var(--acc);text-decoration:none;border:1px solid var(--acc);border-radius:20px;padding:3px 12px}
  .hero-acct:hover{background:rgba(163,113,247,.15)}
  @media(max-width:560px){.hero{grid-template-columns:1fr;text-align:center}.hero-stance{font-size:1.65rem}.hero canvas{margin:0 auto}.hero-acct{margin-left:auto;margin-right:auto}}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin:14px 0}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
  .card h3{margin:0 0 8px;font-size:.92rem;color:var(--mut);font-weight:600}
  .big{font-size:1.6rem;font-weight:700}
  .pill{display:inline-block;font-size:.72rem;padding:2px 8px;border-radius:20px;margin:2px 3px 2px 0;background:#0d1117;border:1px solid var(--border);color:var(--mut)}
  .facts{list-style:none;padding:0;margin:0;font-size:.88rem}
  .facts li{padding:4px 0;border-bottom:1px solid var(--border)}.facts li:last-child{border:0}
  .tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:16px 0}
  .tool{display:block;text-decoration:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;color:var(--fg);transition:.14s}
  .tool:hover{border-color:var(--acc);transform:translateY(-2px)}
  .tool .ico{font-size:1.5rem}.tool .nm{font-weight:700;margin-top:4px}.tool .ds{color:var(--mut);font-size:.78rem;margin-top:2px}
  .mut{color:var(--mut)}.note{color:var(--amb);font-size:.8rem}
  footer{color:var(--mut);font-size:.78rem;margin-top:20px;border-top:1px solid var(--border);padding-top:10px}
  @media(max-width:560px){body{padding:12px}h1{font-size:1.32rem}.cards,.tools{gap:9px}.cards{grid-template-columns:1fr}.tools{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}}
</style>
</head>
<body>
<header>
  <h1><span class="hex">⬡</span> Valpha Lab</h1>
  <span class="tag" data-i18n="tag"></span>
  <button id="lang" aria-label="切换语言 / switch language"></button>
</header>
<div class="hero" id="hero">
  <div><canvas id="gauge" width="240" height="140" aria-label="今日倾向仪表"></canvas></div>
  <div>
    <div class="hero-lbl mut" data-i18n="heroLbl"></div>
    <div class="hero-stance" id="h-stance">—</div>
    <div class="hero-call" id="h-call"></div>
    <div class="hero-read" id="h-read"></div>
    <div class="hero-tilt" id="h-tilt"></div>
    <a class="hero-acct" href="scorecard.html" id="h-acct"></a>
  </div>
</div>
<div class="baseline" data-i18n="baseline"></div>

<div class="cards">
  <div class="card"><h3 data-i18n="c_sig"></h3>
    <div class="big" id="sig">—</div>
    <div class="note" id="signote"></div></div>
  <div class="card"><h3 data-i18n="c_env"></h3>
    <div id="env" style="font-size:.9rem">—</div>
    <div class="mut" id="envas" style="font-size:.76rem;margin-top:6px"></div></div>
  <div class="card"><h3 data-i18n="c_dig"></h3>
    <ul class="facts" id="dig"></ul></div>
  <div class="card"><h3 data-i18n="c_paper"></h3>
    <div id="paper" style="font-size:.92rem"></div>
    <div class="note" id="papernote" style="margin-top:6px"></div></div>
  <div class="card"><h3 data-i18n="c_heat"></h3>
    <div id="heat" style="font-size:.95rem">—</div>
    <div class="note" id="heatnote" style="margin-top:6px"></div></div>
  <div class="card"><h3 data-i18n="c_bottom"></h3>
    <div id="bottom" style="font-size:.95rem;line-height:1.65">—</div></div>
</div>

<div class="tools" id="tools"></div>
<footer data-i18n="foot"></footer>

<script>
const B="https://vambrocop.github.io/valpha-lab/";
const I18N={
  tag:{zh:"美股诚实统计",en:"Honest US-stock statistics"},
  baseline:{zh:"<b>敢给当下倾向与方向——但每条都公开计分、敢认账</b>　|　诚实统计打底,预测/LLM 前沿逐步扩张;不打包票、会错,看战绩自己判断。",
            en:"<b>We give a current tilt &amp; direction — and publicly score every call</b>　|　honest stats underneath, prediction/LLM frontier expanding; no guarantees, we can be wrong — judge by the track record."},
  heroLbl:{zh:"今日综合读数 · 敢给倾向 · 已公开计分",en:"TODAY'S READ · WE LEAN · PUBLICLY SCORED"},
  hCall:{zh:"看涨",en:"Bullish"},hBear:{zh:"看跌",en:"Bearish"},hAcct:{zh:"敢说也敢认账 · 公开战绩卡 →",en:"We own our calls · public scorecard →"},
  c_sig:{zh:"📊 纳指信号（实验性）",en:"📊 Nasdaq signal (experimental)"},
  c_env:{zh:"🌡️ 市场环境（描述性）",en:"🌡️ Market environment (descriptive)"},
  c_dig:{zh:"📋 今日摘要",en:"📋 Today's digest"},
  c_paper:{zh:"💼 模拟盘问责",en:"💼 Paper trading"},papernote:{zh:"前向竞技 · 无法事后美化",en:"forward-tested · no hindsight polishing"},
  c_heat:{zh:"🔥 板块热度",en:"🔥 Sector heat"},c_bottom:{zh:"🧭 今日底线",en:"🧭 Bottom line"},
  heatnote:{zh:"最热=追涨区，往往高波动；看结构别照单买",en:"Hottest = chase zone, usually high vol; read structure, don't just buy"},
  signote:{zh:"walk-forward 未发现样本外优势——当心，别当预测",en:"No out-of-sample edge in walk-forward — caution, not a forecast"},
  foot:{zh:"数据实时拉自流水线 · 描述性历史、非预测 · 仅供学习研究。这是优化版着陆原型，正式站见「完整仪表盘」。",
        en:"Data pulled live from the pipeline · descriptive history, not forecasts · for study only. This is an optimized landing prototype; see 'Full dashboard' for the live site."},
  t_board:{zh:"大盘",en:"Board"},t_board_d:{zh:"152 只·按板块·可排序",en:"152 names · by sector · sortable"},
  t_sec:{zh:"板块",en:"Sectors"},t_sec_d:{zh:"12 板块均值·可排序",en:"12 sectors · averages · sortable"},
  t_radar:{zh:"雷达",en:"Radar"},t_radar_d:{zh:"个股六维体检",en:"6-axis stock checkup"},
  t_adv:{zh:"配置",en:"Allocator"},t_adv_d:{zh:"出格区·配置建议",en:"out-of-bounds · allocation"},
  t_wild:{zh:"野蛮专区",en:"Wild Zone"},t_wild_d:{zh:"出格娱乐·非建议",en:"out-of-bounds fun · not advice"},
  t_ipo:{zh:"IPO 雷达",en:"IPO radar"},t_ipo_d:{zh:"将上市·已申报/传闻分级",en:"upcoming · filed/rumor tiers"},
  t_method:{zh:"诚实门方法",en:"Honesty gates"},t_method_d:{zh:"大白话讲诚实统计门",en:"the honest-stats gates, plainly"},
  t_grow:{zh:"自生长",en:"Self-growing"},t_grow_d:{zh:"测28→剩5的诚实总账",en:"28 tested → 5 survive, honestly"},
  t_kronos:{zh:"试 Kronos",en:"We tested Kronos"},t_kronos_d:{zh:"诚实测 AAAI 金融大模型·没 edge 也认账",en:"honestly tested an AAAI model · owned the null"},
  t_full:{zh:"完整仪表盘",en:"Full dashboard"},t_full_d:{zh:"全部诚实统计 + 登记簿",en:"all honest stats + registry"},
  t_heat2:{zh:"热力图",en:"Heatmap"},t_heat2_d:{zh:"板块网格·红绿涨跌结构",en:"sector grid · gain/loss structure"},
  t_index:{zh:"宽基指数指南",en:"Index guide"},t_index_d:{zh:"不想选股？定投宽基怎么买（澳洲实操）",en:"skip stock-picking · DCA index guide · AU practical"},
  t_opt:{zh:"期权教学",en:"Options 101"},t_opt_d:{zh:"搭腿看盈亏+希腊字母沙盒·纯教学非荐股",en:"payoff + Greeks sandbox · teaching, not advice"},
  t_read:{zh:"综合读数",en:"Composite Read"},t_read_d:{zh:"出格区·诚实证据加权的当下倾向",en:"out-of-bounds · evidence-weighted tilt"},
  t_cycle:{zh:"周期季节性",en:"Cycles"},t_cycle_d:{zh:"三层透明·原始计数+校正前后",en:"3-layer · raw counts + pre/post-FDR"}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
let SIG=null,REG=null,DIG=null,PAPER=null,V150=null,CR=null,OUT=null,LLM=null;
const STANCE_EN={"强防御":"Strong defense","偏防御":"Lean defensive","中性":"Neutral","偏积极":"Lean bullish","强积极":"Strong bullish","数据不足":"Insufficient data"};
const CALL_EN={"看涨":"Bullish","看跌":"Bearish","中性":"Neutral","偏多":"Lean long"};
function drawGauge(score){
  const cv=$("gauge"); if(!cv) return;
  const ctx=cv.getContext("2d"),dpr=window.devicePixelRatio||1,W=cv.clientWidth||240,H=140;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H-22,R=Math.min(W/2-16,H-34),A=s=>Math.PI+(s+1)/2*Math.PI;
  const zone=(s0,s1,c)=>{ctx.beginPath();ctx.lineWidth=14;ctx.strokeStyle=c;ctx.arc(cx,cy,R,A(s0),A(s1));ctx.stroke();};
  zone(-1,-0.13,"#f85149");zone(-0.13,0.13,"#6e7681");zone(0.13,1,"#3fb950");
  if(score!=null){const th=A(Math.max(-1,Math.min(1,score)));
    ctx.beginPath();ctx.lineWidth=3;ctx.strokeStyle="#e6edf3";ctx.moveTo(cx,cy);ctx.lineTo(cx+(R-4)*Math.cos(th),cy+(R-4)*Math.sin(th));ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,5,0,6.29);ctx.fillStyle="#e6edf3";ctx.fill();}
  ctx.fillStyle="#9da7b3";ctx.font="10px sans-serif";
  ctx.textAlign="left";ctx.fillText(LANG==="en"?"defense":"防御",cx-R-2,cy+13);
  ctx.textAlign="right";ctx.fillText(LANG==="en"?"bullish":"积极",cx+R+2,cy+13);
  ctx.textAlign="center";ctx.fillText(LANG==="en"?"neutral":"中性",cx,cy-R-5);
}
function actionEN(s){return s==null?"—":s>=0.4?"BUY · add actively":s>=0.13?"Lean long · buy dips":s>-0.13?"HOLD · wait":s>-0.4?"Trim · cut vol":"AVOID · raise cash";}
const CONF_EN={"高":"high","中":"med","低":"low"};
function nasdaqPlain(ic){
  if(!ic||ic.prob==null) return "";
  const pct=Math.round(ic.prob*100),hz=LANG==="en"?"short-term":(esc(ic.horizon)||"短期");
  const dir=ic.prob<0.5?(LANG==="en"?"down":"偏跌"):(LANG==="en"?"up":"偏涨");
  const note=Math.abs(pct-50)<=4
    ?(LANG==="en"?"≈coin-flip · no proven edge, don't bank on it":"≈掷硬币，无验证优势，别当真")
    :(LANG==="en"?"short-term direction is hard for anyone · reference only":"短期方向谁都难测，仅参考");
  return LANG==="en"
    ? ` · <span class="mut">Nasdaq ${hz} ~${pct}% ${dir} (${note})</span>`
    : ` · <span class="mut">纳指${hz}约 ${pct}% ${dir}（${note}）</span>`;
}
const GLOSS=[["VIX","衡量市场恐慌情绪，越高越慌"],["收益率曲线","不同期限国债利率的高低对比，倒挂常被当衰退预警"],["信用利差","企业借钱比国债贵多少，越大=市场越担心违约"],["相关性","各只股票是不是一起涨跌，越高越像同涨同跌"],["分散性","不同股票走势分化的程度，分化大=分散投资更有效"]];
function plainify(text){
  if(!text||LANG!=="zh") return text;                 // 只给中文段补注；英文段原样
  let out=text;
  for(const [term,exp] of GLOSS){
    const p=out.indexOf(term); if(p<0) continue;
    const after=out.charAt(p+term.length);
    if(after==="（"||after==="(") continue;            // LLM 已自解释就不重复
    out=out.slice(0,p+term.length)+`（${exp}）`+out.slice(p+term.length);
  }
  return out;
}
function renderHero(){
  drawGauge(CR?CR.score:null);
  if(!CR){return;}
  const _d=CR.asof||CR.date||"";
  const _le=document.querySelector('.hero-lbl[data-i18n="heroLbl"]');
  if(_le&&_d)_le.textContent=t("heroLbl")+(LANG==="en"?" · as of "+_d:" · 数据截至 "+_d);
  const sc=CR.score;
  const act=LANG==="en"?actionEN(sc):(CR.action||CR.stance);
  const col=sc==null?"var(--mut)":sc>0.13?"var(--grn)":sc<-0.13?"var(--red)":"var(--fg)";
  $("h-stance").innerHTML=`<span style="color:${col}">${esc(act)}</span>`;
  const stance=LANG==="en"?(STANCE_EN[CR.stance]||CR.stance):CR.stance;
  const cf=CR.confidence_level?(LANG==="en"?"conf "+(CONF_EN[CR.confidence_level]||CR.confidence_level):"把握"+CR.confidence_level):"";
  const sub=`${esc(stance)}${cf?" · "+cf:""}`;
  const ch=nasdaqPlain(OUT&&OUT.index_call);
  $("h-call").innerHTML=`<span class="mut">${sub}</span>${ch}`;
  $("h-read").textContent=(LANG==="zh"&&LLM&&LLM.text)?plainify(LLM.text):"";
  $("h-tilt").textContent=CR.usable_tilt||"";
  $("h-acct").textContent=t("hAcct");
}

function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}
function tools(){
  const T=[["t_board","🛰️","valpha150.html"],["t_sec","📊","sectors.html"],["t_radar","📡","radar.html"],["t_heat2","🔳","heatmap.html"],["t_adv","🎲","advisor.html"],["t_wild","🔥","wildhub.html"],["t_read","🧠","composite.html"],["t_cycle","🔄","seasonal.html"],["t_ipo","🛫","ipo.html"],["t_method","🛡️","methodology.html"],["t_grow","🌱","self_growing.html"],["t_kronos","🔬","kronos.html"],["t_full","🧭","dashboard.html"],["t_index","📘","indexing.html"],["t_opt","🎓","options.html"]];
  $("tools").innerHTML=T.map(([k,ico,href])=>`<a class="tool" href="${href}"><div class="ico">${ico}</div><div class="nm">${t(k)}</div><div class="ds">${t(k+"_d")}</div></a>`).join("");
}
function paint(){
  applyStatic();tools();renderHero();
  if(SIG){$("sig").innerHTML=`tier ${esc(String(SIG.latest_tier??"—"))} · <span class="mut" style="font-size:1rem">prob</span> ${(SIG.latest_prob??0).toFixed(2)}`;$("signote").textContent=t("signote");}
  if(REG){$("env").textContent=REG.composite||"—";$("envas").textContent=(LANG==="en"?"as of ":"数据日 ")+(REG.asof||"");}
  if(DIG){$("dig").innerHTML=(DIG.tier1_facts||[]).map(f=>`<li>${esc(f)}</li>`).join("")||`<li class="mut">—</li>`;}
  if(PAPER){const ss=Object.values(PAPER.strategies||{}).sort((a,b)=>(b.ret_pct||0)-(a.ret_pct||0));
    $("paper").innerHTML=ss.map(s=>`<div style="display:flex;justify-content:space-between;padding:3px 0"><span>${esc(s.label)}</span><span style="color:${(s.ret_pct||0)>=0?'var(--grn)':'var(--red)'};font-weight:600">${(s.ret_pct||0)>=0?'+':''}${s.ret_pct}%</span></div>`).join("");$("papernote").textContent=t("papernote");}
  // 🔥 板块热度（最热/最冷板块·近6月均值）+ 🧭 今日底线
  let hotSec=null;
  if(V150&&V150.stocks){
    const g={};V150.stocks.forEach(d=>{if(d&&d.sec!=null&&d.c6!=null)(g[d.sec]||(g[d.sec]=[])).push(d.c6);});
    const secs=Object.keys(g).map(s=>({s,a:g[s].reduce((x,y)=>x+y,0)/g[s].length})).sort((x,y)=>y.a-x.a);
    if(secs.length){const hot=secs[0],cold=secs[secs.length-1];hotSec=hot.s;
      const HOT=LANG==="en"?"Hottest":"最热",COLD=LANG==="en"?"Coldest":"最冷";
      $("heat").innerHTML=`🔥 ${HOT} <b>${esc(hot.s)}</b> ${hot.a>=0?'+':''}${hot.a.toFixed(0)}%　❄️ ${COLD} <b>${esc(cold.s)}</b> ${cold.a>=0?'+':''}${cold.a.toFixed(0)}%`;
      $("heatnote").textContent=t("heatnote");}
  }
  const _act=CR?(LANG==="en"?actionEN(CR.score):(CR.action||CR.stance)):null;
  const _call=(OUT&&OUT.index_call)?OUT.index_call.call:null;
  const _ct=_call?(LANG==="en"?` · Nasdaq ${esc(CALL_EN[_call]||_call)}`:` · 纳指${esc(_call)}`):"";
  $("bottom").innerHTML = LANG==="en"
    ? `Today: <b>${_act?esc(_act):"—"}</b>${_ct}${hotSec?`; heat in <b>${esc(hotSec)}</b>`:''}. <span class="mut">Every call is scored — not a guarantee, we can be wrong.</span>`
    : `今日：<b>${_act?esc(_act):"—"}</b>${_ct}${hotSec?`；热度在<b>${esc(hotSec)}</b>`:''}。<span class="mut">每条判断都进了公开计分——非保证、会错,自己拍。</span>`;
}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG);}catch(e){}paint();};
async function get(f){try{const r=await fetch(B+f,{cache:"no-store"});return r.ok?await r.json():null;}catch(e){return null;}}
(async()=>{
  paint();
  [SIG,REG,DIG,PAPER,V150,CR,OUT,LLM]=await Promise.all([get("signals.json"),get("market_regime.json"),get("digest.json"),get("paper.json"),get("valpha150.json"),get("composite_read.json"),get("outlook.json"),get("llm_read.json")]);
  paint();
  // Error state: if all critical data sources failed, show a friendly inline notice
  if(!SIG&&!REG&&!DIG&&!CR&&!V150){
    const msg=LANG==="en"?"Failed to load — refresh later":"加载失败，请稍后刷新";
    $("sig").textContent=msg;$("env").textContent=msg;
  }
})();
window.addEventListener("resize",()=>drawGauge(CR?CR.score:null));
</script>
</body>
</html>
