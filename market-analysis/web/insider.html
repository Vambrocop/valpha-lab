<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🕵️ 内部人买入 · 公开计分</title>
<link rel="stylesheet" href="vp.css">
<style>
  :root{--amb:#d29922}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:900px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  .sub{color:var(--mut);font-size:.82rem;margin:0 0 8px;line-height:1.55}
  .verdict{background:rgba(198,120,221,.12);border:2px solid var(--acc);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:.92rem;line-height:1.7}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
  .stat{flex:1 1 130px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center}
  .stat .v{font-size:1.5rem;font-weight:800;line-height:1.15}.stat .l{color:var(--mut);font-size:.74rem;margin-top:3px}
  .launchbox{background:rgba(210,153,34,.1);border:1px solid var(--amb);border-radius:8px;padding:10px 13px;margin:10px 0;font-size:.85rem;color:#e8c96a;line-height:1.55}
  h2{font-size:1rem;margin:18px 0 6px}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2),th:nth-child(3),td:nth-child(3){text-align:left}
  th{color:var(--mut);font-weight:600}
  td:nth-child(2){white-space:normal;max-width:230px;color:var(--mut);font-size:.8rem}
  .pos{color:var(--grn)}.neg{color:var(--red)}
  .badge{display:inline-block;font-size:.72rem;padding:1px 7px;border-radius:20px;border:1px solid var(--border);color:var(--mut)}
  .meth{color:var(--mut);font-size:.82rem;line-height:1.65;margin:6px 0}
  .meth b{color:var(--fg)}
  .mut{color:var(--mut);font-size:.76rem;margin-top:16px;border-top:1px solid var(--border);padding-top:8px;line-height:1.6}
  #src{color:var(--mut);font-size:.78rem;margin-top:6px}
  @media(max-width:560px){
    body{padding:11px}h1{font-size:1.12rem}
    table{font-size:.78rem}th,td{padding:5px 5px}
    td:nth-child(2){max-width:120px;font-size:.72rem}
    .stat{flex:1 1 45%}
  }
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="vp-takeaway" data-i18n="takeaway"></div>
<p class="sub" data-i18n="intro"></p>
<div class="verdict" id="verdict"></div>
<div class="stats" id="stats"></div>
<div class="launchbox" id="launch" style="display:none"></div>
<h2 data-i18n="hRecent" style="margin-top:18px"></h2>
<p class="sub" data-i18n="sRecent"></p>
<div style="overflow-x:auto"><table id="recent"></table></div>
<details class="vp-more"><summary data-i18n="more_exp"></summary>
  <div class="meth" id="meth"></div>
  <div class="meth" data-i18n="disc" style="margin-top:8px"></div>
  <div class="mut" id="caveat" style="border:0;margin-top:8px;padding-top:0"></div>
</details>
<div id="src"></div>
<div class="mut" data-i18n="foot"></div>

<script>
// fetch order: relative same-origin (China-accessible) first, then live GitHub Pages fallback
const REL="insider_signal.json";
const LIVE="https://vambrocop.github.io/valpha-lab/insider_signal.json";
const I18N={
  title:{zh:"🕵️ 内部人买入 · 公开计分",en:"🕵️ Insider buys · publicly scored"},
  takeaway:{
    zh:"🕵️ <b>「跟内部人开市买入」到底有没有用？我们公开计分、边跑边认账。</b>内部人 = 公司高管 / 董事 / 持股 10% 以上的大股东；他们自掏腰包买自家股票，历史上常被当成「聪明钱」信号之一。<b>本页不是荐股、不是跟单信号</b>——只是诚实地记录「披露后再跟、持有 30 天 vs SPY」到底跑赢没。",
    en:"🕵️ <b>Does 'follow insider open-market buys' actually beat the market? We score it publicly and own the result.</b> Insiders = company officers / directors / 10%+ owners who buy their own stock with their own money — historically seen as one 'smart money' signal. <b>This is NOT a stock tip and NOT a copy-trade signal</b> — just an honest record of whether following them (post-disclosure, 30-day hold vs SPY) actually wins."},
  intro:{
    zh:"我们抓 SEC Form 4 的开市买入（代码 P · ≥ $5 万），披露后 +3 日才「可跟单」（不抢跑），持有 30 个日历日，记相对 SPY 的超额收益——append-only 公开账本，结算只填空、不改历史。",
    en:"We pull open-market BUYS from SEC Form 4 (code P · ≥ $50k), make them 'followable' only +3 days after disclosure (no front-running), hold 30 calendar days, and record excess return vs SPY — an append-only public ledger; settlement only fills blanks, never rewrites history."},
  more_exp:{zh:"方法 & 全部诚实免责（展开看专业细节）",en:"Method & full honest disclaimers (expand for expert detail)"},
  hRecent:{zh:"近期值得注意的内部人买入",en:"Recent notable insider buys"},
  sRecent:{zh:"按交易日排序的近期样本——大多还在「挂账」（30 天窗口没走完，无超额可言）。这是透明展示跟踪了哪些买入，不是「该买这些」。",
           en:"Recent sample sorted by transaction date — most are still 'pending' (the 30-day window hasn't elapsed, so no excess yet). Shown for transparency of what we track, NOT 'you should buy these'."},
  disc:{zh:"<b>诚实边界：</b>非荐股 · 非跟单信号 · 会错 · 过去 ≠ 未来 · 不可交易（真做有手续费 / 滑点 / 税，本页不计）。前向计分样本早期极小，别当结论；幸存者偏差（退市 / 无价的代码会被丢弃）、重叠窗口、相关 ≠ 因果都未被排除。",
        en:"<b>Honest limits:</b> not advice · not a copy-trade signal · we can be wrong · past ≠ future · not tradable (real trades incur fees / slippage / tax, none modeled here). Forward-scored sample is tiny early on — not a conclusion; survivorship bias (delisted / unpriced tickers get dropped), overlapping windows, and correlation ≠ causation are all unaddressed."},
  foot:{zh:"数据：SEC EDGAR Form 4（开市买入 P）→ 前向公开计分。描述性、非预测、非荐股、非投资建议。Valpha Lab。",
        en:"Data: SEC EDGAR Form 4 (open-market buys, code P) → forward public scoring. Descriptive, not a forecast, not a recommendation, not investment advice. Valpha Lab."},
  // stat labels
  sSettled:{zh:"已结算笔数",en:"settled events"},
  sBeat:{zh:"跑赢 SPY%",en:"beat SPY%"},
  sMean:{zh:"平均超额%",en:"mean excess%"},
  sMedian:{zh:"中位超额%",en:"median excess%"},
  sPend:{zh:"挂账(待结算)",en:"pending"},
  sDrop:{zh:"丢弃(退市/无价)",en:"dropped"},
  // launch (0 settled) state
  launch:{zh:"⏳ <b>还没有已结算战绩，正在累积。</b>跟买的 30 天窗口要约 1 个月后才走完——首批超额 / 跑赢率届时才会出现在上面的卡片里。现在能看的只有「跟踪了哪些买入」（下表），数字暂时都是「攒战绩中」。",
          en:"⏳ <b>No settled track record yet — accumulating.</b> The 30-day follow window won't elapse until ~1 month from launch — the first batch of excess / win-rate numbers will appear in the cards above only then. For now you can only see WHICH buys we're tracking (table below); the figures read 'accumulating'."},
  // table headers
  cTk:{zh:"代码",en:"Ticker"},cIns:{zh:"内部人",en:"Insider"},cTit:{zh:"身份",en:"Title"},
  cDate:{zh:"交易日",en:"Txn date"},cVal:{zh:"买入额",en:"Buy size"},
  cStat:{zh:"状态",en:"Status"},cEx:{zh:"超额 vs SPY",en:"Excess vs SPY"},
  stSettled:{zh:"已结算",en:"settled"},stPending:{zh:"挂账",en:"pending"},stDropped:{zh:"已丢弃",en:"dropped"},
  accum:{zh:"攒战绩中(约1个月后出首批)",en:"accumulating (~1 mo to first batch)"},
  err:{zh:"拉不到 insider_signal.json——确认已部署 / 稍后再试。",en:"Can't load insider_signal.json — check deployment / try later."}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh";try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
const num=v=>(typeof v==="number"&&isFinite(v));

// format a $ buy size: $20.0M / $300k / $5.5k
function fmtVal(v){
  if(!num(v)) return "—";
  if(v>=1e6) return "$"+(v/1e6).toFixed(1)+"M";
  if(v>=1e3) return "$"+Math.round(v/1e3)+"k";
  return "$"+Math.round(v);
}
// strip simple **bold** markdown → plain (we render as text, so just drop the markers)
function stripMd(s){return String(s==null?"":s).replace(/\*\*/g,"");}

function applyStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));
  $("lang").textContent=LANG==="zh"?"EN":"中";
  document.documentElement.lang=LANG==="zh"?"zh-CN":"en";
}

function render(d){
  applyStatic();
  const tr=(d&&d.track_record)||{};
  const n=tr.n_settled||0;
  // verdict headline — use JSON verdict verbatim (honest, ready-made)
  $("verdict").innerHTML="🧭 "+esc(d.verdict||"");

  // scorecard — every numeric field can be null at launch → render "—" / accumulating, never null/NaN
  const beat=num(tr.beat_spy_pct)?tr.beat_spy_pct+"%":"—";
  const meVal=num(tr.mean_excess_pct), mdVal=num(tr.median_excess_pct);
  const me=meVal?(tr.mean_excess_pct>=0?"+":"")+tr.mean_excess_pct+"%":"—";
  const md=mdVal?(tr.median_excess_pct>=0?"+":"")+tr.median_excess_pct+"%":"—";
  const meCls=meVal?(tr.mean_excess_pct>=0?"pos":"neg"):"";
  const mdCls=mdVal?(tr.median_excess_pct>=0?"pos":"neg"):"";
  const pend=num(tr.n_pending)?tr.n_pending:"—";
  const dropPct=num(tr.dropped_pct)?tr.dropped_pct:0;
  const drop=(num(tr.n_dropped)?tr.n_dropped:0)+(LANG==="en"?" ("+dropPct+"%)":" ("+dropPct+"%)");

  $("stats").innerHTML=
     `<div class="stat"><div class="v">${n}</div><div class="l">${t("sSettled")}</div></div>`
    +`<div class="stat"><div class="v">${esc(beat)}</div><div class="l">${t("sBeat")}</div></div>`
    +`<div class="stat"><div class="v ${meCls}">${esc(me)}</div><div class="l">${t("sMean")}</div></div>`
    +`<div class="stat"><div class="v ${mdCls}">${esc(md)}</div><div class="l">${t("sMedian")}</div></div>`
    +`<div class="stat"><div class="v">${esc(String(pend))}</div><div class="l">${t("sPend")}</div></div>`
    +`<div class="stat"><div class="v" style="color:var(--mut)">${esc(drop)}</div><div class="l">${t("sDrop")}</div></div>`;

  // friendly 0-settled launch state
  const lb=$("launch");
  if(n===0){lb.style.display="";lb.innerHTML=t("launch");}
  else{lb.style.display="none";}

  // recent table
  let h=`<tr><th>${t("cTk")}</th><th>${t("cIns")}</th><th>${t("cTit")}</th>`
       +`<th>${t("cDate")}</th><th>${t("cVal")}</th><th>${t("cStat")}</th><th>${t("cEx")}</th></tr>`;
  (d.recent||[]).forEach(r=>{
    let status,exCell;
    if(r.dropped){status=`<span class="badge">${t("stDropped")}</span>`;exCell="—";}
    else if(r.settled){
      status=`<span class="badge">${t("stSettled")}</span>`;
      if(num(r.excess_pct)){
        const cls=r.excess_pct>=0?"pos":"neg";
        exCell=`<span class="${cls}">${(r.excess_pct>=0?"+":"")+r.excess_pct}%</span>`;
      } else exCell="—";
    } else {status=`<span class="badge">${t("stPending")}</span>`;exCell="—";}
    h+=`<tr><td>${esc(r.ticker||"—")}</td><td>${esc(r.insider||"—")}</td>`
      +`<td>${esc(r.title||"—")}</td><td>${esc(r.txn_date||"—")}</td>`
      +`<td>${esc(fmtVal(r.value))}</td><td>${status}</td><td>${exCell}</td></tr>`;
  });
  $("recent").innerHTML=h;

  // expert methodology line
  const hold=num(d.hold_days)?d.hold_days:"?",lag=num(d.filing_lag_days)?d.filing_lag_days:"?";
  const mv=num(d.min_value)?fmtVal(d.min_value):"?",bm=esc(d.benchmark||"SPY");
  $("meth").innerHTML=LANG==="en"
    ?`<b>Method:</b> hold ${hold} calendar days · followable +${lag} days after disclosure · notable threshold ${esc(mv)} buy · benchmark ${bm}. Cluster buys (same ticker, same entry day, multiple insiders) counted once. Append-only ledger.`
    :`<b>方法：</b>持有 ${hold} 个日历日 · 披露后 +${lag} 日才可跟单 · 值得注意门槛 ${esc(mv)} · 基准 ${bm}。同一标的同一入场日多名内部人(集群买入)只计一次。append-only 公开账本。`;

  // full caveat from JSON (strip **markdown** bold markers; render as text)
  $("caveat").textContent="⚠️ "+stripMd(d.caveat||"");

  // source line
  const gen=esc((d.generated||"").slice(0,10));
  $("src").textContent=LANG==="en"
    ?`Source: ${esc(d.source||"SEC EDGAR Form 4")} · generated ${gen} · hold ${hold}d vs ${bm}`
    :`数据：${esc(d.source||"SEC EDGAR Form 4")} · 生成 ${gen} · 持有 ${hold} 日 vs ${bm}`;
}

$("lang").onclick=()=>{
  LANG=LANG==="zh"?"en":"zh";
  try{localStorage.setItem("valpha_lang",LANG);}catch(e){}
  if(window._d) render(window._d); else applyStatic();
};

(async()=>{
  applyStatic();
  let d=null;
  for(const u of [REL,LIVE]){
    try{const r=await fetch(u,{cache:"no-store"});if(r.ok){d=await r.json();break;}}catch(e){}
  }
  if(d){window._d=d;render(d);}
  else{$("verdict").textContent=t("err");}
})();
</script>
<script src="vp_gloss.js"></script>
</body>
</html>
