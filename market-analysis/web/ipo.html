<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPO 雷达 · IPO radar</title>
<link rel="stylesheet" href="vp.css">
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--acc:#a371f7;--amber:#e3a008}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:1080px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .note{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:9px 12px;font-size:.84rem;margin:10px 0;color:#ffb3ad}
  .stale-warn{background:rgba(227,160,8,.12);border:1px solid var(--amber);border-radius:8px;padding:9px 12px;font-size:.84rem;margin:10px 0 0;color:#f0c975}
  h2.tier{font-size:1.02rem;margin:22px 0 4px;display:flex;align-items:center;gap:8px}
  h2.tier .tag{font-size:.66rem;font-weight:600;border-radius:99px;padding:2px 9px;letter-spacing:.02em}
  .sub{color:var(--mut);font-size:.78rem;margin:0 0 8px}
  /* tier accent tags */
  .t-listed .tag{background:rgba(63,185,80,.16);color:var(--grn);border:1px solid var(--grn)}
  .t-filed  .tag{background:rgba(88,166,255,.16);color:#58a6ff;border:1px solid #58a6ff}
  .t-rumor  .tag{background:rgba(139,148,158,.14);color:var(--mut);border:1px dashed var(--mut)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:6px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 13px;position:relative}
  .card .co{font-weight:700;font-size:.98rem;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .card .tk{font-size:.7rem;color:var(--mut);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-family:ui-monospace,monospace}
  .card .sec{font-size:.74rem;color:var(--mut);margin:3px 0 6px}
  .card .det{font-size:.84rem;color:var(--fg)}
  /* listed = solid green left bar */
  .t-listed .card{border-left:3px solid var(--grn)}
  /* filed = solid blue left bar */
  .t-filed .card{border-left:3px solid #58a6ff}
  /* rumor = dimmed, dashed, "?" mark, hatch wash, lower opacity */
  .t-rumor .card{border-left:3px dashed var(--mut);opacity:.82;background:repeating-linear-gradient(135deg,var(--panel),var(--panel) 9px,rgba(139,148,158,.04) 9px,rgba(139,148,158,.04) 18px)}
  .t-rumor .card .co{color:var(--mut)}
  .t-rumor .card .q{color:var(--mut);font-weight:700;font-size:1.1rem;margin-left:auto}
  .mut{color:var(--mut);font-size:.78rem;margin-top:20px;border-top:1px solid var(--border);padding-top:8px}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.15rem}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="vp-takeaway" data-i18n="takeaway"></div>
<details class="vp-more"><summary data-i18n="more_note"></summary>
  <div class="note" data-i18n="note" style="margin-top:6px"></div>
</details>
<div id="tiers"></div>

<h2 class="tier" style="margin-top:30px" data-i18n="autoHead"></h2>
<p class="sub" data-i18n="autoSub"></p>
<div id="autoipo"></div>

<div class="mut" data-i18n="foot"></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;

const I18N={
  title:{zh:"🛫 IPO 雷达",en:"🛫 IPO radar"},
  takeaway:{zh:"🛫 <b>三档清晰分开</b>：已上市（可买）· 已递交 S-1（递交≠确定上市）· 传闻预期（未证实·可能根本不来）。<b>非投资建议。上方三档为 2026-06 人工策展快照；下方「SEC 近期申报」每交易日自动刷新。IPO 计划常变。</b>",
            en:"🛫 <b>Three tiers, clearly separated</b>: Listed (tradable) · Filed S-1 (filed ≠ guaranteed listing) · Rumor / expected (unconfirmed · may never happen). <b>Not investment advice. The three tiers are a manually-curated 2026-06 snapshot; the “Recent SEC filings” feed below auto-refreshes every trading day. IPO plans change often.</b>"},
  more_note:{zh:"展开看：三档定义 + 注意事项",en:"Expand: tier definitions + caveats"},
  note:{zh:"<b>上方三档为 2026-06 人工策展快照（IPO 计划常变，可能延期或取消）；下方「SEC 近期申报」读 SEC EDGAR、每交易日自动刷新。「已申报」= 已递交 S-1（公开或保密）；「传闻/预期」= 未证实、可能根本不上市。非投资建议。</b>",
        en:"<b>The three tiers above are a 2026-06 manually-curated snapshot (IPO plans change often and may be delayed or cancelled); the “Recent SEC filings” feed below reads SEC EDGAR and auto-refreshes every trading day. “Filed” = an S-1 has been submitted (public or confidential); “Rumor / expected” = unconfirmed and may never list at all. Not investment advice.</b>"},
  foot:{zh:"分三档：已上市 / 已申报 S-1 / 传闻预期。三档视觉刻意分开——「传闻」更灰、虚线、带「?」，不代表确认。描述性快照、非预测、非荐股。",
        en:"Three tiers: Listed / Filed S-1 / Rumor or expected. Tiers are deliberately styled apart — “rumor” is dimmer, dashed and marked “?”, never shown as confirmed. Descriptive snapshot, not a forecast, not stock advice."},
  // tier headers
  tListed:{zh:"已上市",en:"Listed"},
  tFiled:{zh:"已申报 S-1",en:"Filed S-1"},
  tRumor:{zh:"传闻 / 预期",en:"Rumor / expected"},
  // tier status chips
  gListed:{zh:"已交易",en:"TRADING"},
  gFiled:{zh:"已递交",en:"SUBMITTED"},
  gRumor:{zh:"未证实",en:"UNCONFIRMED"},
  // tier sublines
  sListed:{zh:"已在交易所挂牌、可买卖。本站观察池已纳入。",en:"Listed on an exchange and tradable. Already in this site's watch pool."},
  sFiled:{zh:"已正式向 SEC 递交 S-1（公开或保密）。递交 ≠ 一定上市，时间与定价仍可能变。",en:"An S-1 has been formally filed with the SEC (public or confidential). Filing ≠ guaranteed listing; timing and pricing can still change."},
  sRumor:{zh:"尚未正式申报，仅见于报道或市场预期。可能延期、改道，或根本不上市。",en:"Not yet formally filed — only reported or market-expected. May be delayed, take another route, or never happen."},
  noadv:{zh:"未证实",en:"unconfirmed"},
  // ---- auto section (SEC EDGAR live filings) ----
  autoHead:{zh:"📡 SEC 近期申报（自动抓取 · 每交易日刷新）",en:"📡 Recent SEC filings (auto-updated each trading day)"},
  autoSub:{zh:"直接读 SEC EDGAR 近 30 天 S-1 / 424B 申报。⚠ 这是【全体】申报、含大量小盘/微盘/SPAC/空壳，非策展、非上方明星快照；仅为客观事实流，非荐股非预测。",
           en:"Pulled straight from SEC EDGAR — all S-1 / 424B filings in the last 30 days. ⚠ This is the FULL feed: mostly small / micro-cap / SPAC / shell companies, not curated and not the marquee snapshot above. A raw factual stream only — not advice, not a forecast."},
  autoFiled:{zh:"已递交招股书 S-1",en:"Filed prospectus (S-1)"},
  autoPriced:{zh:"已定价 / 生效 424B",en:"Priced / effective (424B)"},
  autoFiledSub:{zh:"已向 SEC 递交 S-1（或 S-1/A 修订）。递交 ≠ 一定上市。",en:"S-1 (or S-1/A amendment) filed with the SEC. Filing ≠ guaranteed listing."},
  autoPricedSub:{zh:"已递交 424B 定价招股书，更接近真正挂牌。",en:"A 424B priced prospectus is filed — closer to an actual listing."},
  autoStamp:{zh:"每日自动更新 · 最后抓取",en:"Auto-updated daily · last fetch"},
  autoNone:{zh:"暂无数据（SEC 抓取未配置或近 30 天无申报）。",en:"No data yet (SEC fetch not configured, or no filings in the last 30 days)."},
  autoNoTk:{zh:"无代码",en:"no ticker"},
  // ---- curated-snapshot staleness banner (>2 months since CURATED_ASOF) ----
  staleWarn:{zh:"⚠ 策展快照 {ASOF}，距今 {N} 个月，个别条目可能已过时；下方「📡 SEC 近期申报」为最新事实。",
             en:"⚠ Curated snapshot from {ASOF}, {N} month(s) old — some entries may be stale. The “Recent SEC filings” feed below reflects current facts."},
  // ---- always-visible curated-layer cadence stamp ----
  curatedStamp:{zh:"策展快照 2026-06 · 人工维护 · 下方 SEC 申报每日自动更新",
                en:"Curated snapshot 2026-06 · manually maintained · SEC filings below auto-update daily"}
};

// 策展三档快照月份（人工维护，随策展内容更新时同步改）；>2 个月自动提醒渐旧，≤2 个月不打扰。
const CURATED_ASOF="2026-06";
function monthsSinceAsof(asof){
  const m=/^(\d{4})-(\d{2})$/.exec(asof); if(!m) return 0;
  const y=+m[1], mo=+m[2];
  const now=new Date();
  return Math.max(0,(now.getFullYear()-y)*12+(now.getMonth()-(mo-1)));
}
function staleBanner(){
  const n=monthsSinceAsof(CURATED_ASOF);
  if(n<=2) return "";
  const msg=t("staleWarn").replace("{ASOF}",CURATED_ASOF).replace("{N}",n);
  return `<div class="stale-warn">${msg}</div>`;
}

// ---- Static snapshot data (2026-06). Each row carries bilingual sector + detail. ----
const TIERS=[
  {
    id:"listed", cls:"t-listed", head:"tListed", tag:"gListed", sub:"sListed",
    rows:[
      {co:"SpaceX", tk:"SPCX",
       sec:{zh:"航天",en:"Aerospace"},
       det:{zh:"2026-06-12 挂牌（发行价 $135），已纳入本站观察池；实时价见个股页。",
            en:"Listed 2026-06-12 (IPO price $135); in this site's watch pool — live price on the stock page."}}
    ]
  },
  {
    id:"filed", cls:"t-filed", head:"tFiled", tag:"gFiled", sub:"sFiled",
    rows:[
      {co:"Cerebras", tk:null,
       sec:{zh:"半导体 / AI",en:"Semiconductors / AI"},
       det:{zh:"2026-04-17 公开递交 S-1。",
            en:"Public S-1 filed 2026-04-17."}},
      {co:"Discord", tk:null,
       sec:{zh:"社交 / 科技",en:"Social / Tech"},
       det:{zh:"2026-01 保密递交，目标 Q2，约 150 亿美元。",
            en:"Confidential filing 2026-01; targeting Q2, ~$15B."}},
      {co:"Kraken", tk:null,
       sec:{zh:"加密货币交易所",en:"Crypto exchange"},
       det:{zh:"2025-11 保密递交。",
            en:"Confidential filing 2025-11."}},
      {co:"Anthropic", tk:null,
       sec:{zh:"AI",en:"AI"},
       det:{zh:"2026-06-01 保密递交 S-1。本 AI 的母公司，此处仅作中立陈述。",
            en:"Confidential S-1 filed 2026-06-01. This AI's parent company; stated here neutrally."}},
      {co:"Strava", tk:null,
       sec:{zh:"健身 / 科技",en:"Fitness / Tech"},
       det:{zh:"约 22 亿美元，据报与高盛筹备。",
            en:"~$2.2B; reportedly preparing with Goldman Sachs."}}
    ]
  },
  {
    id:"rumor", cls:"t-rumor", head:"tRumor", tag:"gRumor", sub:"sRumor",
    rows:[
      {co:"OpenAI", tk:null,
       sec:{zh:"AI",en:"AI"},
       det:{zh:"与投行保密筹备，估值近 1 万亿美元，尚未正式申报。",
            en:"Confidentially preparing with banks; ~$1T valuation talk; not yet formally filed."}},
      {co:"Databricks", tk:null,
       sec:{zh:"数据 / AI",en:"Data / AI"},
       det:{zh:"预计 2026 年初，未正式申报。",
            en:"Expected early 2026; not yet formally filed."}},
      {co:"Canva", tk:null,
       sec:{zh:"设计软件",en:"Design software"},
       det:{zh:"二级市场估值约 420 亿美元，未正式申报。",
            en:"~$42B secondary-market valuation; not yet formally filed."}}
    ]
  }
];

function applyStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));
  $("lang").textContent=LANG==="zh"?"EN":"中";
  document.documentElement.lang=LANG==="zh"?"zh-CN":"en";
}

function L(field){return (field && field[LANG]) || (field && field.zh) || "";}

function render(){
  let h=staleBanner()+`<p class="sub" style="margin:8px 0 0">${esc(t("curatedStamp"))}</p>`;
  TIERS.forEach(T=>{
    h+=`<section class="${T.cls}">`;
    h+=`<h2 class="tier">${esc(t(T.head))}<span class="tag">${esc(t(T.tag))}</span></h2>`;
    h+=`<p class="sub">${esc(t(T.sub))}</p>`;
    h+=`<div class="grid">`;
    T.rows.forEach(r=>{
      const isRumor=T.id==="rumor";
      h+=`<div class="card">`;
      h+=`<div class="co">${esc(r.co)}`;
      if(r.tk) h+=`<span class="tk">${esc(r.tk)}</span>`;
      if(isRumor) h+=`<span class="q" title="${esc(t("noadv"))}">?</span>`;
      h+=`</div>`;
      h+=`<div class="sec">${esc(L(r.sec))}</div>`;
      h+=`<div class="det">${esc(L(r.det))}</div>`;
      h+=`</div>`;
    });
    h+=`</div></section>`;
  });
  $("tiers").innerHTML=h;
}

// ---- auto section: read SEC EDGAR live filings (fetched by fetch_ipo.py) ----
let AUTO=null;   // ipo_filings.json payload, or null if unavailable

function renderAuto(){
  const box=$("autoipo"); if(!box) return;
  if(!AUTO){ box.innerHTML=`<p class="sub">${esc(t("autoNone"))}</p>`; return; }
  const stamp=(AUTO.generated||"").slice(0,10);
  const block=(rows,head,sub,cls)=>{
    let h=`<section class="${cls}">`;
    h+=`<h2 class="tier" style="font-size:.95rem">${esc(t(head))}<span class="tag">${esc(rows.length)}</span></h2>`;
    h+=`<p class="sub">${esc(t(sub))}</p><div class="grid">`;
    rows.forEach(r=>{
      h+=`<div class="card"><div class="co">${esc(r.company||"")}`;
      h+= r.ticker ? `<span class="tk">${esc(r.ticker)}</span>` : `<span class="tk" style="opacity:.6">${esc(t("autoNoTk"))}</span>`;
      h+=`</div>`;
      h+=`<div class="det">${esc(r.form||"")} · ${esc(r.filed||"")}</div>`;
      h+=`</div>`;
    });
    h+=`</div></section>`;
    return h;
  };
  let h="";
  h+=block(AUTO.priced||[], "autoPriced", "autoPricedSub", "t-listed");
  h+=block(AUTO.filed||[],  "autoFiled",  "autoFiledSub",  "t-filed");
  if(stamp) h+=`<p class="sub" style="margin-top:10px">${esc(t("autoStamp"))} ${esc(stamp)} · SEC EDGAR</p>`;
  box.innerHTML=h;
}

function loadAuto(){
  fetch("ipo_filings.json",{cache:"no-store"})
    .then(r=>r.ok?r.json():null)
    .then(d=>{AUTO=(d&&Array.isArray(d.filed)&&Array.isArray(d.priced))?d:null;renderAuto();})
    .catch(()=>{AUTO=null;renderAuto();});
}

function redraw(){applyStatic();render();renderAuto();}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};redraw();};

redraw();
loadAuto();
</script>
<script src="vp_gloss.js" data-autoscan></script>
</body>
</html>
