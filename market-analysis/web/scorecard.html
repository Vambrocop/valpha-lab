<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📊 公开计分卡 · 校准</title>
<link rel="stylesheet" href="vp.css">
<style>
  :root{--amber:#e3a008}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:880px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  .verdict{background:rgba(198,120,221,.12);border:2px solid var(--acc);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:.9rem;line-height:1.65}
  h2{font-size:1rem;margin:18px 0 6px}.sub{color:var(--mut);font-size:.8rem;margin:0 0 6px}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--mut);font-weight:600}
  .bar{display:inline-block;height:9px;border-radius:4px;background:var(--acc);vertical-align:middle;margin-left:6px}
  .mut{color:var(--mut);font-size:.76rem;margin-top:16px;border-top:1px solid var(--border);padding-top:8px;line-height:1.6}
  #src{color:var(--mut);font-size:.78rem;margin-top:6px}
  #out{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin:8px 0 4px}
  .ocard{background:var(--card,rgba(255,255,255,.03));border:1px solid var(--border);border-radius:10px;padding:11px 13px}
  .ocard .oh{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
  .ocard .oh b{font-size:.92rem}
  .ocard a.olink{color:var(--acc);text-decoration:none;font-size:.76rem;margin-left:auto}
  .ocard .obody{font-size:.85rem;line-height:1.5}
  .ocard .otag{display:inline-block;font-size:.7rem;color:var(--amber);border:1px solid var(--amber);border-radius:6px;padding:1px 5px;margin:5px 0 2px}
  .ocard .ocav{color:var(--mut);font-size:.72rem;margin-top:7px;line-height:1.45}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.12rem}table{font-size:.8rem}#out{grid-template-columns:1fr}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<p class="sub" data-i18n="intro"></p>
<div id="track" style="background:rgba(63,185,80,.1);border:1px solid var(--grn);border-radius:10px;padding:11px 14px;margin:12px 0;font-size:.92rem;line-height:1.6"></div>
<div class="verdict" id="reads"></div>
<h2 data-i18n="hCal"></h2>
<p class="sub" data-i18n="sCal"></p>
<details class="vp-more"><summary data-i18n="more_cal"></summary><div style="overflow-x:auto"><table id="cal"></table></div></details>
<h2 data-i18n="hLive"></h2>
<p class="sub" data-i18n="sLive"></p>
<details class="vp-more"><summary data-i18n="more_live"></summary><div style="overflow-x:auto"><table id="live"></table></div></details>
<h2 data-i18n="hOut"></h2>
<p class="sub" data-i18n="sOut"></p>
<div id="out"></div>
<div id="src"></div>
<div class="mut" id="note"></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/scorecard.json";
const I18N={
  title:{zh:"📊 公开计分卡 · 校准",en:"📊 Public scorecard · calibration"},
  intro:{zh:"满大街「AI 叫你买」却没人亮战绩。这里把所有预测的命中+校准公开——敢预测就敢认账。",
         en:"Everyone's 'AI tells you to buy' but nobody shows their track record. Here every prediction's hit-rate + calibration is public — we own our calls."},
  hCal:{zh:"① 模型 OOS 校准（2012-2024 真历史）",en:"① Model OOS calibration (2012-2024 real history)"},
  sCal:{zh:"按模型自报置信分桶，看实际胜率。真有料的话应随置信单调上升；若不单调=「高置信≠更准」=没有 OOS edge（诚实）。",
        en:"Bucket by the model's stated confidence, show realized win-rate. With real edge it rises monotonically; if not, high confidence isn't more right = no OOS edge (honest)."},
  hLive:{zh:"② Live 预测追踪（刚起步·随时间填充）",en:"② Live prediction tracking (just started · fills over time)"},
  sLive:{zh:"综合读数倾向/纳指信号的实盘命中，未走完前向窗的标「待验」。tipjar 是故意的掷硬币基准。",
         en:"Live hit-rate of composite tilt / NASDAQ signal; calls whose forward window hasn't elapsed are 'pending'. tipjar is the deliberate coin-flip baseline."},
  more_cal:{zh:"展开看校准曲线（自报把握度 vs 实际胜率·分桶）",en:"Expand: calibration curve (stated confidence vs real win-rate)"},
  more_live:{zh:"展开看各预测源命中明细",en:"Expand: per-source hit details"},
  cBucket:{zh:"自报置信",en:"stated conf"},cReal:{zh:"实际胜率",en:"real win%"},cN:{zh:"样本",en:"n"},
  cSrc:{zh:"预测源",en:"source"},cHit:{zh:"命中率",en:"hit%"},cScored:{zh:"已记/待验",en:"scored/pending"},
  err:{zh:"拉不到 scorecard.json——确认已部署。",en:"Can't load scorecard.json — check deployment."},asof:{zh:"前向",en:"horizon"},
  hOut:{zh:"③ 出格区·各方向公开战绩（敢预测敢认账）",en:"③ Out-of-bounds · public record per direction (we own our calls)"},
  sOut:{zh:"每条用它自己的口径，别跨着加总——不同的赌注，各自认账。",
        en:"Each scored on its own terms — different bets, no misleading grand total."},
  cInsider:{zh:"内部人买入",en:"Insider buys"},
  cSenate:{zh:"参议院跟单",en:"Senate copy-trade"},
  cOver:{zh:"极端下跌→次日反弹",en:"Crash → next-day bounce"},
  cBtc:{zh:"BTC 动量→纳指",en:"BTC momentum → NASDAQ"},
  btcTag:{zh:"历史回测结论·非前向计分",en:"Backtest conclusion · not a forward record"},
  defCav:{zh:"非荐股 · 会错 · 过去≠未来",en:"Not advice · can be wrong · past ≠ future"},
  // honest body strings (filled with numbers in JS)
  insSettled:{zh:"跟买跑赢 SPY {beat}% · 平均超额 {exc}%（已结算 {ns} · 挂账 {np}）",
              en:"Following the buys beat SPY {beat}% · avg excess {exc}% (settled {ns} · pending {np})"},
  insPending:{zh:"攒战绩中（挂账 {np} · 约 1 个月后首批结算）",
              en:"Building the record (pending {np} · first settlements ~1 month out)"},
  senOK:{zh:"披露后跟买 ~3 月：超额 {exc}% · 跑赢 SPY {beat}%（n={n}）",
         en:"Copy the buys after disclosure, ~3 mo: excess {exc}% · beat SPY {beat}% (n={n})"},
  senLow:{zh:"样本不足",en:"Sample too small"},
  ovrSettled:{zh:"次日上涨命中 {hit}% · 平均次日 {avg}%（已结算 {ns} · 挂账 {np}）",
              en:"Next-day-up hit {hit}% · avg next day {avg}% (settled {ns} · pending {np})"},
  ovrPending:{zh:"等极端下跌日触发（挂账 {np}）",
              en:"Waiting for an extreme down day to trigger (pending {np})"}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh";try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}
function render(d){
  applyStatic();
  const mc=d.model_calibration||{};
  $("reads").innerHTML="🧭 <b>"+esc(mc.reads||"样本不足")+"</b>"+(mc.n_total?` <span style="color:var(--mut);font-weight:400">· n=${mc.n_total}</span>`:"");
  {const cur=mc.curve||[],wr=cur.map(c=>c.real_wr_pct).filter(x=>x!=null);
   if(wr.length){const lo=Math.min(...wr),hi=Math.max(...wr),H=d.horizon_days||20,br=mc.base_rate_pct!=null?mc.base_rate_pct:65;
     $("track").innerHTML=LANG==="en"
       ? `📦 <b>${mc.n_total||0} OOS predictions</b> (2012-2024) frozen, settled &amp; public — real ${H}-day win-rate <b>${lo}–${hi}%</b>. Honest: the market itself rises ~${br}% of ${H}-day windows (drift, computed from the data), so a high win% ≠ skill; high-confidence buckets aren't more right (no timing edge) — and we say so. <b>That honesty is the moat.</b>`
       : `📦 <b>${mc.n_total||0} 条 OOS 预测</b>（2012-2024）冻结 · 结算 · 公开——真实 ${H} 日胜率 <b>${lo}–${hi}%</b>。诚实说：市场本身 ${H} 天里约 <b>${br}%</b> 在涨（自然漂移·按数据算出非拍脑袋），所以高胜率 ≠ 本事；高置信桶并不更准（无择时 edge）——我们照样标。<b>这份诚实才是护城河。</b>`;}}
  let h=`<tr><th>${t("cBucket")}</th><th>${t("cReal")}</th><th></th><th>${t("cN")}</th></tr>`;
  (mc.curve||[]).forEach(c=>{const w=Math.round((c.real_wr_pct||0)*1.1);
    h+=`<tr><td>${c.prob_mean_pct}%</td><td><b>${c.real_wr_pct}%</b></td><td style="text-align:left"><span class="bar" style="width:${w}px"></span></td><td style="color:var(--mut)">${c.n}</td></tr>`;});
  $("cal").innerHTML=h||"";
  let l=`<tr><th>${t("cSrc")}</th><th>${t("cHit")}</th><th>${t("cScored")}</th></tr>`;
  Object.entries(d.sources||{}).forEach(([k,v])=>{l+=`<tr><td>${esc(k)}</td><td><b>${v.hit_pct==null?'—':v.hit_pct+'%'}</b></td><td style="color:var(--mut)">${v.n_scored}/${v.n_pending}</td></tr>`;});
  $("live").innerHTML=l;
  $("note").textContent="⚠️ "+(d.honest_note||"");
  $("src").textContent=`${t("asof")} ${d.horizon_days}d · ${esc((d.generated||"").slice(0,10))}`;
}
// ③ 出格区 —— each card scored on its OWN metric; never aggregated.
const GH="https://vambrocop.github.io/valpha-lab/";
const fmt=(k,m)=>{let s=t(k);for(const p in m)s=s.split("{"+p+"}").join(esc(m[p]));return s;};
async function loadJSON(file){
  for(const url of [file,GH+file]){
    try{const r=await fetch(url,{cache:"no-store"});if(r.ok)return await r.json();}catch(e){}
  }
  return null;
}
function caveatLine(d){
  const c=d&&typeof d.caveat==="string"?d.caveat.trim():"";
  if(c)return c.length>90?c.slice(0,90)+"…":c;
  return t("defCav");
}
// returns body-html string or null (skip card if null)
function buildBody(spec,d){
  if(spec==="insider"){
    const tr=(d&&d.track_record)||{};const ns=tr.n_settled;
    if(typeof ns==="number"&&ns>0&&tr.beat_spy_pct!=null&&tr.mean_excess_pct!=null)
      return esc(fmt("insSettled",{beat:tr.beat_spy_pct,exc:tr.mean_excess_pct,ns:ns,np:tr.n_pending}));
    return esc(fmt("insPending",{np:tr.n_pending==null?0:tr.n_pending}));
  }
  if(spec==="senate"){
    const o=d&&d.overall;
    if(o&&o.mean_excess_pct!=null&&o.beat_mkt_pct!=null&&o.n!=null)
      return esc(fmt("senOK",{exc:o.mean_excess_pct,beat:o.beat_mkt_pct,n:o.n}));
    return esc(t("senLow"));
  }
  if(spec==="over"){
    const tr=(d&&d.track_record)||{};const ns=tr.n_settled;
    if(typeof ns==="number"&&ns>0&&tr.hit_pct!=null&&tr.avg_next_pct!=null)
      return esc(fmt("ovrSettled",{hit:tr.hit_pct,avg:tr.avg_next_pct,ns:ns,np:tr.n_pending}));
    return esc(fmt("ovrPending",{np:tr.n_pending==null?0:tr.n_pending}));
  }
  if(spec==="btc"){
    const v=d&&typeof d.verdict==="string"?d.verdict.trim():"";
    if(!v)return null;
    const body=v.length>140?v.slice(0,140)+"…":v;
    return `<span class="otag">${esc(t("btcTag"))}</span><br>${esc(body)}`;
  }
  return null;
}
function cardHTML(c,d){
  const body=buildBody(c.spec,d);
  if(body==null)return "";
  const link=c.link?`<a class="olink" href="${esc(c.link)}">›</a>`:"";
  return `<div class="ocard"><div class="oh"><span aria-hidden="true">${c.icon}</span>`
    +`<b>${esc(t(c.key))}</b>${link}</div>`
    +`<div class="obody">${body}</div>`
    +`<div class="ocav">${esc(caveatLine(d))}</div></div>`;
}
const OUT_CARDS=[
  {spec:"insider",file:"insider_signal.json",icon:"🕵️",key:"cInsider",link:"insider.html"},
  {spec:"senate", file:"senate_signal.json", icon:"🏛️",key:"cSenate", link:"senate.html"},
  {spec:"over",   file:"overreaction_signal.json",icon:"📉",key:"cOver",link:null},
  {spec:"btc",    file:"btc_nasdaq.json",   icon:"₿", key:"cBtc",    link:"btcread.html"}
];
async function renderOut(){
  const data=await Promise.all(OUT_CARDS.map(c=>loadJSON(c.file)));
  let html="";
  OUT_CARDS.forEach((c,i)=>{if(data[i])html+=cardHTML(c,data[i]);});
  if($("out"))$("out").innerHTML=html;
}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};if(window._d)render(window._d);renderOut();};
(async()=>{applyStatic();
  try{const r=await fetch(LIVE,{cache:"no-store"});if(!r.ok)throw 0;window._d=await r.json();render(window._d);}
  catch(e){
    const msg=LANG==="en"?"Failed to load — refresh later":"加载失败，请稍后刷新";
    $("reads").textContent=t("err");
    $("track").textContent=msg;
    $("cal").innerHTML=`<tr><td style="padding:14px;color:var(--mut)">${msg}</td></tr>`;
    $("live").innerHTML=`<tr><td style="padding:14px;color:var(--mut)">${msg}</td></tr>`;
  }
  renderOut(); // ③ out-of-bounds cards — independent of scorecard.json
})();
</script>
</body>
</html>
