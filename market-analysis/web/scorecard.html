<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📊 公开计分卡 · 校准</title>
<link rel="stylesheet" href="vp.css">
<style>
  :root{--amber:#e3a008}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:880px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  .verdict{background:rgba(198,120,221,.12);border:2px solid var(--acc);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:.9rem;line-height:1.65}
  h2{font-size:1rem;margin:18px 0 6px}.sub{color:var(--mut);font-size:.8rem;margin:0 0 6px}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--mut);font-weight:600}
  .bar{display:inline-block;height:9px;border-radius:4px;background:var(--acc);vertical-align:middle;margin-left:6px}
  .mut{color:var(--mut);font-size:.76rem;margin-top:16px;border-top:1px solid var(--border);padding-top:8px;line-height:1.6}
  #src{color:var(--mut);font-size:.78rem;margin-top:6px}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.12rem}table{font-size:.8rem}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:var(--mut);text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<p class="sub" data-i18n="intro"></p>
<div id="track" style="background:rgba(63,185,80,.1);border:1px solid var(--grn);border-radius:10px;padding:11px 14px;margin:12px 0;font-size:.92rem;line-height:1.6"></div>
<div class="verdict" id="reads"></div>
<h2 data-i18n="hCal"></h2>
<p class="sub" data-i18n="sCal"></p>
<div style="overflow-x:auto"><table id="cal"></table></div>
<h2 data-i18n="hLive"></h2>
<p class="sub" data-i18n="sLive"></p>
<div style="overflow-x:auto"><table id="live"></table></div>
<div id="src"></div>
<div class="mut" id="note"></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/scorecard.json";
const I18N={
  title:{zh:"📊 公开计分卡 · 校准",en:"📊 Public scorecard · calibration"},
  intro:{zh:"满大街「AI 叫你买」却没人亮战绩。这里把所有预测的命中+校准公开——敢预测就敢认账。",
         en:"Everyone's 'AI tells you to buy' but nobody shows their track record. Here every prediction's hit-rate + calibration is public — we own our calls."},
  hCal:{zh:"① 模型 OOS 校准（2012-2024 真历史）",en:"① Model OOS calibration (2012-2024 real history)"},
  sCal:{zh:"按模型自报置信分桶，看实际胜率。真有料的话应随置信单调上升；若不单调=「高置信≠更准」=没有 OOS edge（诚实）。",
        en:"Bucket by the model's stated confidence, show realized win-rate. With real edge it rises monotonically; if not, high confidence isn't more right = no OOS edge (honest)."},
  hLive:{zh:"② Live 预测追踪（刚起步·随时间填充）",en:"② Live prediction tracking (just started · fills over time)"},
  sLive:{zh:"综合读数倾向/纳指信号的实盘命中，未走完前向窗的标「待验」。tipjar 是故意的掷硬币基准。",
         en:"Live hit-rate of composite tilt / NASDAQ signal; calls whose forward window hasn't elapsed are 'pending'. tipjar is the deliberate coin-flip baseline."},
  cBucket:{zh:"自报置信",en:"stated conf"},cReal:{zh:"实际胜率",en:"real win%"},cN:{zh:"样本",en:"n"},
  cSrc:{zh:"预测源",en:"source"},cHit:{zh:"命中率",en:"hit%"},cScored:{zh:"已记/待验",en:"scored/pending"},
  err:{zh:"拉不到 scorecard.json——确认已部署。",en:"Can't load scorecard.json — check deployment."},asof:{zh:"前向",en:"horizon"}
};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh";try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}
function render(d){
  applyStatic();
  const mc=d.model_calibration||{};
  $("reads").innerHTML="🧭 <b>"+esc(mc.reads||"样本不足")+"</b>"+(mc.n_total?` <span style="color:var(--mut);font-weight:400">· n=${mc.n_total}</span>`:"");
  {const cur=mc.curve||[],wr=cur.map(c=>c.real_wr_pct).filter(x=>x!=null);
   if(wr.length){const lo=Math.min(...wr),hi=Math.max(...wr),H=d.horizon_days||20,br=mc.base_rate_pct!=null?mc.base_rate_pct:65;
     $("track").innerHTML=LANG==="en"
       ? `📦 <b>${mc.n_total||0} OOS predictions</b> (2012-2024) frozen, settled &amp; public — real ${H}-day win-rate <b>${lo}–${hi}%</b>. Honest: the market itself rises ~${br}% of ${H}-day windows (drift, computed from the data), so a high win% ≠ skill; high-confidence buckets aren't more right (no timing edge) — and we say so. <b>That honesty is the moat.</b>`
       : `📦 <b>${mc.n_total||0} 条 OOS 预测</b>（2012-2024）冻结 · 结算 · 公开——真实 ${H} 日胜率 <b>${lo}–${hi}%</b>。诚实说：市场本身 ${H} 天里约 <b>${br}%</b> 在涨（自然漂移·按数据算出非拍脑袋），所以高胜率 ≠ 本事；高置信桶并不更准（无择时 edge）——我们照样标。<b>这份诚实才是护城河。</b>`;}}
  let h=`<tr><th>${t("cBucket")}</th><th>${t("cReal")}</th><th></th><th>${t("cN")}</th></tr>`;
  (mc.curve||[]).forEach(c=>{const w=Math.round((c.real_wr_pct||0)*1.1);
    h+=`<tr><td>${c.prob_mean_pct}%</td><td><b>${c.real_wr_pct}%</b></td><td style="text-align:left"><span class="bar" style="width:${w}px"></span></td><td style="color:var(--mut)">${c.n}</td></tr>`;});
  $("cal").innerHTML=h||"";
  let l=`<tr><th>${t("cSrc")}</th><th>${t("cHit")}</th><th>${t("cScored")}</th></tr>`;
  Object.entries(d.sources||{}).forEach(([k,v])=>{l+=`<tr><td>${esc(k)}</td><td><b>${v.hit_pct==null?'—':v.hit_pct+'%'}</b></td><td style="color:var(--mut)">${v.n_scored}/${v.n_pending}</td></tr>`;});
  $("live").innerHTML=l;
  $("note").textContent="⚠️ "+(d.honest_note||"");
  $("src").textContent=`${t("asof")} ${d.horizon_days}d · ${esc((d.generated||"").slice(0,10))}`;
}
$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};if(window._d)render(window._d);};
(async()=>{applyStatic();
  try{const r=await fetch(LIVE,{cache:"no-store"});if(!r.ok)throw 0;window._d=await r.json();render(window._d);}
  catch(e){$("reads").textContent=t("err");}
})();
</script>
</body>
</html>
