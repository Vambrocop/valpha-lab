<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自生长 · Self-growing</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--mut:#9da7b3;--grn:#3fb950;--red:#f85149;--acc:#a371f7;--amber:#e3a008}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;padding:14px;max-width:1080px;margin:0 auto}
  h1{font-size:1.3rem;margin:.2em 0;display:inline-block}
  #lang{float:right;background:#161b22;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.82rem}
  .lead{color:var(--mut);font-size:.9rem;margin:8px 0 4px}
  .note{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:9px 12px;font-size:.84rem;margin:10px 0;color:#ffb3ad}
  .hero{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;margin:14px 0}
  .hero .b{flex:1 1 150px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .hero .big{font-size:2.2rem;font-weight:800;line-height:1.1}
  .hero .l{color:var(--mut);font-size:.78rem;margin-top:4px}
  .arrow{display:flex;align-items:center;font-size:1.5rem;color:var(--mut)}
  h2{font-size:1.05rem;margin:22px 0 4px}
  .sub{color:var(--mut);font-size:.78rem;margin:0 0 8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 13px;border-left:3px solid var(--grn)}
  .card .lab{font-weight:700;font-size:.92rem}
  .card .meta{font-size:.74rem;color:var(--mut);margin-top:3px}
  .card.decayed{border-left-color:var(--amber)}
  .dbadge{font-size:.66rem;background:rgba(227,160,8,.16);color:var(--amber);border:1px solid var(--amber);border-radius:5px;padding:1px 5px;margin-left:5px}
  .grave{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .gchip{font-size:.76rem;color:var(--mut);background:#0d1117;border:1px dashed var(--border);border-radius:6px;padding:3px 8px;opacity:.8}
  .fam{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .fbar{font-size:.78rem;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:5px 9px}
  .fbar b{color:var(--grn)}
  .verdict{background:rgba(163,113,247,.08);border:1px solid var(--acc);border-radius:8px;padding:10px 12px;font-size:.86rem;margin:14px 0;color:#d2c2f5}
  .mut{color:var(--mut);font-size:.78rem;margin-top:18px;border-top:1px solid var(--border);padding-top:8px}
  #src{color:var(--mut);font-size:.78rem}
  @media(max-width:560px){body{padding:11px}h1{font-size:1.15rem}.hero .big{font-size:1.7rem}}
</style>
</head>
<body>
<a href="#" onclick="if(history.length>1){history.back()}else{location.href='index.html'};return false" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:10px" title="返回上一页">↩ 返回</a>
<a href="index.html" style="color:#8b949e;text-decoration:none;font-size:.82rem;margin-right:12px">← Valpha Lab</a>
<button id="lang" aria-label="切换语言 / switch language"></button>
<h1 data-i18n="title"></h1>
<div class="lead" data-i18n="lead"></div>
<div class="note" data-i18n="note"></div>

<div class="hero" id="hero"></div>
<div class="verdict" id="verdict"></div>

<h2 data-i18n="hReg"></h2>
<p class="sub" data-i18n="sReg"></p>
<div class="grid" id="registry"></div>

<h2 data-i18n="hFam"></h2>
<div class="fam" id="families"></div>

<h2 data-i18n="hGrave"></h2>
<p class="sub" data-i18n="sGrave"></p>
<div class="grave" id="graveyard"></div>

<h2 data-i18n="hAuto"></h2>
<p class="sub" data-i18n="sAuto"></p>
<div id="autoSummary" class="sub"></div>
<div class="grave" id="autodisc"></div>

<div id="src"></div>
<div class="mut" data-i18n="foot"></div>
<div id="modal" onclick="if(event.target===this)closeD()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;align-items:center;justify-content:center;padding:16px"><div id="mbody" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:460px;width:100%"></div></div>

<script>
const LIVE="https://vambrocop.github.io/valpha-lab/fdr_crossfamily.json";
const PLACEBO="https://vambrocop.github.io/valpha-lab/placebo_tests.json";
const AUTODISC="https://vambrocop.github.io/valpha-lab/autodiscovery.json";
const ALPHA=0.05;
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let LANG="zh"; try{LANG=localStorage.getItem("valpha_lang")||"zh";}catch(e){}
const t=k=>(I18N[k]&&I18N[k][LANG])||k;
let D=null,PLAC=null,AD=null,ADC=[],CLAIMS=[],DECAY={};
const VCLR={survive:"var(--grn)",faded:"var(--amber)",dead:"var(--mut)",inconclusive:"#8b949e"};

const I18N={
  title:{zh:"🌱 自生长 · 诚实知识库",en:"🌱 Self-growing · honest knowledge base"},
  lead:{zh:"本站把<b>每一个</b>测过的显著性主张都汇进一个池子，做跨族多重检验校正——校正后还站得住的，才认作「真规律」；没站住的坦白进坟场。这页就是那本活账。",
        en:"Every significance claim we've tested is pooled together and run through a cross-family multiple-testing correction. Only what survives is accepted as a 'real pattern'; the rest is honestly buried. This page is that living ledger."},
  note:{zh:"<b>这是全站的魂，不是炫技。</b>自动发现规律最容易变成「测一千个、挑最好看的」——那是 p-hacking。把试过的全算进去校正，是逼自己别自欺。存活 ≠ 未来重演，更非买卖建议。",
        en:"<b>This is the soul of the site, not a flex.</b> Auto-discovering patterns easily becomes 'test a thousand, keep the prettiest' — that's p-hacking. Counting everything you tried into the correction is how you stop fooling yourself. Surviving ≠ repeating; not advice."},
  hTested:{zh:"测过的假设",en:"hypotheses tested"},
  hLuck:{zh:"≈ 纯靠运气(p<.05)",en:"≈ by luck alone (p<.05)"},
  hSurv:{zh:"跨族校正后站得住",en:"survive correction"},
  hReg:{zh:"📋 登记簿 · 经得起的真规律",en:"📋 Registry · patterns that held up"},
  sReg:{zh:"跨族 Benjamini-Yekutieli（任意相关稳健）q<0.10 存活，<b>全部保留</b>。标 ⚠️ 的=近年已淡：全样本(几十年)真过、但现代段(2000后)测不到——看多少年不一样，很可能被套利。<b>不删，只诚实标注</b>。",en:"Survived cross-family Benjamini-Yekutieli (correlation-robust) at q<0.10 — <b>all kept</b>. ⚠️ = faded lately: real over decades but not detectable post-2000 — it depends on the window, likely arbitraged. <b>We keep them, just annotate honestly.</b>"},
  decayed:{zh:"⚠️ 近年已淡",en:"⚠️ faded lately"},
  decaynote:{zh:"全样本(几十年)真过，但近 25 年(2000后)测不到——很可能被套利；真过 ≠ 还能用",en:"real over decades, but not detectable in the last ~25y (post-2000) — likely arbitraged; was real ≠ still usable"},
  hFam:{zh:"🔬 按检验族",en:"🔬 By test family"},
  hGrave:{zh:"🪦 坟场 · 试过但没经得起",en:"🪦 Graveyard · tested but didn't hold up"},
  sGrave:{zh:"这些当初看着「显著」，但把试过的全算进去后没站住——大概率是噪声。失败也公开。",
          en:"These looked 'significant' alone, but didn't survive once everything tested was counted in — most likely noise. We publish the failures too."},
  foot:{zh:"数据：实时 fdr_crossfamily.json（汇池：日历/事件因果/路径Granger/因子AUC）。探索性跨族 meta 校正，存活≠真发现，详见方法论页。",
        en:"Data: live fdr_crossfamily.json (pooled: calendar / event-causal / path-Granger / factor-AUC). Exploratory cross-family meta-correction; surviving ≠ a true discovery — see the methodology page."},
  err:{zh:"拉不到 fdr_crossfamily.json——确认已部署。",en:"Can't load fdr_crossfamily.json — check deployment."},
  asof:{zh:"数据日",en:"as of"},
  dClick:{zh:"点开看详情",en:"tap for detail"},dP:{zh:"校正前 p 值",en:"pre-FDR p"},dFam:{zh:"检验族",en:"family"},
  dCorr:{zh:"多重比较校正",en:"corrections"},dModern:{zh:"现代段(2000后)",en:"modern (post-2000)"},
  dFaded:{zh:"已淡——测不到、疑被套利",en:"faded — undetectable, likely arbitraged"},
  dStill:{zh:"仍在 / 未单独测",en:"still / not separately tested"},dClose:{zh:"关闭",en:"Close"},dPass:{zh:"过",en:"pass"},dFail:{zh:"未过",en:"—"},
  dRecent:{zh:"现代 p",en:"modern p"},dVerdict:{zh:"裁决",en:"verdict"},
  hAuto:{zh:"🔬 自动发现引擎 · 预注册候选",en:"🔬 Auto-discovery engine · pre-registered candidates"},
  sAuto:{zh:"引擎自动枚举有限候选(日历/超跌反弹/因子)、各路由到真统计、跨族 FDR 双栏裁决——<b>全部进分母、禁挑好看的</b>。点开看每条详情。",en:"The engine enumerates a finite candidate set (calendar / mean-reversion / factor), routes each to a real test, dual-column cross-family FDR — <b>all counted, no cherry-picking</b>. Tap for detail."},
  vSurvive:{zh:"真存活",en:"survive"},vFaded:{zh:"已淡",en:"faded"},vDead:{zh:"未过FDR",en:"dead"},vInconc:{zh:"检验力不足",en:"inconclusive"},
  wWin:{zh:"时间窗",en:"window"},wUp:{zh:"上涨率",en:"up%"},wBase:{zh:"基率",en:"base%"},
  wMulti:{zh:"多时间窗",en:"multi-window"},
  wNote:{zh:"上涨率=该组上涨期占比(直观)，绿>基率红<。反弹/因子：基率=全样本上涨率，p 检验上涨率差(与表同口径)。日历方向类(节前/圣诞/夏歇/世界杯/任期年)：基率=对照组上涨率，p 检验两组<b>平均收益</b>差(单边)——与上涨率通常同向但非同一指标。周几/月份为多组整体差异，无单一概率故只列 p。",
         en:"up% = share of up periods in that group (intuition); green &gt; base, red &lt;. Rebound/factor: base% = whole-sample up-rate and p tests the up-rate gap (same quantity shown). Calendar directional (holiday/santa/sell-in-May/World-Cup/term-year): base% = comparison group's up-rate and p tests the difference in <b>mean returns</b> (one-sided) — usually same sign as up%, but a different quantity. Day/month effects are multi-group omnibus — p only."},
  adLedger:{zh:"裁决账本追踪",en:"verdict ledger"},adDays:{zh:"天(累积中,供日后衰减追踪)",en:"d (accruing for decay tracking)"}
};
function renderAD(){
  if(!AD||!AD.candidates){$("autodisc").innerHTML=`<div class="mut">—</div>`;$("autoSummary").innerHTML="";return;}
  ADC=AD.candidates; const s=AD.summary||{};
  $("autoSummary").innerHTML=`${t("hTested")} ${s.m_total} · <b style="color:var(--grn)">${t("vSurvive")} ${s.n_survive}</b> · ${t("vFaded")} ${s.n_faded} · ${t("vInconc")} ${s.n_inconclusive} · ${t("vDead")} ${s.n_dead}`
    +(AD.days_tracked?` · 🌱 ${t("adLedger")} ${AD.days_tracked}${t("adDays")}`:"");
  const ord={survive:0,faded:1,inconclusive:2,dead:3};
  $("autodisc").innerHTML=[...ADC].sort((a,b)=>(ord[a.verdict]-ord[b.verdict])||(a.p-b.p))
    .map(c=>`<span class="gchip" style="cursor:pointer;border-style:solid;border-color:${VCLR[c.verdict]||'var(--border)'};color:${VCLR[c.verdict]||'var(--mut)'}" onclick="showAD('${esc(c.candidate_id)}')">${esc(c.key)}</span>`).join("");
}
function showAD(id){const c=ADC.find(x=>x.candidate_id===id);if(!c)return;
  const vl={survive:t("vSurvive"),faded:t("vFaded"),dead:t("vDead"),inconclusive:t("vInconc")}[c.verdict]||c.verdict;
  const pp=v=>v==null?"—":(+v).toPrecision(3);
  const wr=(c.windows||[]).map(w=>{
    const up=w.up_pct==null?"—":w.up_pct+"%",bs=w.base_pct==null?"—":w.base_pct+"%";
    const dp=(w.up_pct!=null&&w.base_pct!=null)?(w.up_pct>=w.base_pct?"var(--grn)":"var(--red)"):"var(--mut)";
    return `<tr><td style="padding:2px 0">${esc(w.label)}</td><td style="text-align:right;color:${dp};font-weight:600">${up}</td><td style="text-align:right;color:var(--mut)">${bs}</td><td style="text-align:right">${w.p==null?"—":w.p}</td><td style="text-align:right;color:var(--mut)">${w.n}</td></tr>`;
  }).join("");
  const wt=wr?`<div style="font-size:.75rem;color:var(--acc);margin-top:12px">📊 ${esc(c.effect||"")}（${t("wMulti")}）</div>
    <table style="width:100%;font-size:.8rem;margin-top:3px;border-collapse:collapse">
      <tr style="color:var(--mut);border-bottom:1px solid var(--border)"><td>${t("wWin")}</td><td style="text-align:right">${t("wUp")}</td><td style="text-align:right">${t("wBase")}</td><td style="text-align:right">p</td><td style="text-align:right">n</td></tr>${wr}</table>
    <div style="font-size:.7rem;color:var(--mut);margin-top:5px">${t("wNote")}</div>`:"";
  $("mbody").innerHTML=`<div style="font-weight:700;font-size:1.05rem;margin-bottom:8px">${esc(c.key)}</div>
    <div style="color:var(--mut);font-size:.85rem;line-height:1.9">
      ${t("dFam")}：<b style="color:var(--fg)">${esc(c.family)}</b> · ${t("dVerdict")}：<b style="color:${VCLR[c.verdict]||'var(--fg)'}">${vl}</b>${c.reason?` · ${esc(c.reason)}`:""}<br>
      ${t("dP")}：<b style="color:var(--fg)">${pp(c.p)}</b>（${t("dRecent")} ${pp(c.recent_p)}）· ${t("dModern")}：${esc(c.modern_status||"—")}
    </div>${wt}
    ${AD&&AD.caveat?`<div style="font-size:.68rem;color:var(--mut);margin-top:10px;border-top:1px solid var(--border);padding-top:7px;line-height:1.5">${esc(AD.caveat)}</div>`:""}
    <button onclick="closeD()" style="margin-top:14px;background:var(--acc);color:#fff;border:0;border-radius:8px;padding:7px 18px;cursor:pointer">${t("dClose")}</button>`;
  $("modal").style.display="flex";}
function showD(i){const c=CLAIMS[i];if(!c)return;const dead=DECAY[c.label];
  const yn=v=>v?`<span style="color:var(--grn)">✓${t("dPass")}</span>`:`<span style="color:var(--mut)">✗</span>`;
  $("mbody").innerHTML=`<div style="font-weight:700;font-size:1.1rem;margin-bottom:10px">${esc(c.label)}</div>
    <div style="color:var(--mut);font-size:.85rem;line-height:2">
      ${t("dFam")}：<b style="color:var(--fg)">${esc(c.family)}</b><br>
      ${t("dP")}：<b style="color:var(--fg)">${c.p==null?"—":(+c.p).toPrecision(3)}</b><br>
      ${t("dCorr")}：BY q&lt;0.10 ${yn(c.survive_by_10)} · BY q&lt;0.05 ${yn(c.survive_by_05)} · BH q&lt;0.10 ${yn(c.survive_bh_10)} · Bonferroni ${yn(c.survive_bonferroni_05)}<br>
      ${t("dModern")}：${dead?`<b style="color:var(--amber)">${t("dFaded")}</b>`:t("dStill")}
    </div>
    <button onclick="closeD()" style="margin-top:14px;background:var(--acc);color:#fff;border:0;border-radius:8px;padding:7px 18px;cursor:pointer">${t("dClose")}</button>`;
  $("modal").style.display="flex";}
function closeD(){$("modal").style.display="none";}
function showFam(fam){const cs=CLAIMS.filter(c=>c.family===fam);if(!cs.length)return;
  $("mbody").innerHTML=`<div style="font-weight:700;font-size:1.05rem;margin-bottom:10px">${esc(fam)}（${cs.filter(c=>c.survive_by_10).length}/${cs.length} ${t("hSurv")}）</div>
    <div style="font-size:.85rem;line-height:1.6;max-height:50vh;overflow:auto">${cs.sort((a,b)=>(a.p||1)-(b.p||1)).map(c=>`<div onclick="showD(${CLAIMS.indexOf(c)})" style="cursor:pointer;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:${c.survive_by_10?'var(--grn)':'var(--mut)'}">${c.survive_by_10?'✓':'✗'}</span> ${esc(c.label)} <span style="color:var(--mut)">p=${c.p==null?'—':(+c.p).toPrecision(2)}</span></div>`).join("")}</div>
    <button onclick="closeD()" style="margin-top:14px;background:var(--acc);color:#fff;border:0;border-radius:8px;padding:7px 18px;cursor:pointer">${t("dClose")}</button>`;
  $("modal").style.display="flex";}

function applyStatic(){document.querySelectorAll("[data-i18n]").forEach(el=>el.innerHTML=t(el.dataset.i18n));$("lang").textContent=LANG==="zh"?"EN":"中";document.documentElement.lang=LANG==="zh"?"zh-CN":"en";}

function render(){
  applyStatic();
  renderAD();
  if(!D){$("src").textContent=t("err");return;}
  const m=D.m_total||0, surv=D.n_survive_by_10||0, luck=Math.round(m*ALPHA);
  $("hero").innerHTML=`
    <div class="b"><div class="big">${m}</div><div class="l">${t("hTested")}</div></div>
    <div class="arrow">▶</div>
    <div class="b"><div class="big" style="color:var(--amber)">~${luck}</div><div class="l">${t("hLuck")}</div></div>
    <div class="arrow">▶</div>
    <div class="b"><div class="big" style="color:var(--grn)">${surv}</div><div class="l">${t("hSurv")}</div></div>`;
  $("verdict").innerHTML=D.verdict?esc(D.verdict):"";
  const claims=D.claims||[]; CLAIMS=claims; DECAY={}; if(PLAC&&PLAC.tests)PLAC.tests.forEach(tt=>{if(tt.recent_significant===false)DECAY[tt.panel]=true;});
  const reg=claims.filter(c=>c.survive_by_10), grave=claims.filter(c=>!c.survive_by_10), decay=DECAY;
  $("registry").innerHTML=reg.map(c=>{const dead=decay[c.label];
    return `<div class="card${dead?' decayed':''}" style="cursor:pointer" onclick="showD(${claims.indexOf(c)})"><div class="lab">${esc(c.label)}${dead?`<span class="dbadge">${t("decayed")}</span>`:""}</div>
    <div class="meta">${esc(c.family)} · p=${c.p==null?"—":(+c.p).toPrecision(2)}${dead?` · ${t("decaynote")}`:c.survive_bonferroni_05?" · 连最严的 Bonferroni 都过":""} · <span style="color:var(--acc)">${t("dClick")}</span></div></div>`;}).join("")||`<div class="mut">—</div>`;
  $("families").innerHTML=(D.by_family||[]).map(f=>`<span class="fbar" style="cursor:pointer" onclick="showFam('${esc(f.family)}')">${esc(f.family)}: <b>${f.n_survive_by_10}</b>/${f.n}</span>`).join("");
  $("graveyard").innerHTML=grave.map(c=>`<span class="gchip" style="cursor:pointer" onclick="showD(${claims.indexOf(c)})" title="${esc(c.family)} p=${c.p==null?"—":(+c.p).toPrecision(2)}">${esc(c.label)}</span>`).join("")||`<div class="mut">—</div>`;
  $("src").textContent=D.generated?`${t("asof")} ${esc(D.generated.slice(0,10))}`:"";
}

$("lang").onclick=()=>{LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("valpha_lang",LANG)}catch(e){};render();};
(async()=>{applyStatic();const g=u=>fetch(u,{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null);[D,PLAC,AD]=await Promise.all([g(LIVE),g(PLACEBO),g(AUTODISC)]);render();})();
</script>
</body>
</html>
